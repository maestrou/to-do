<script>
const STORAGE_KEY = "kolon_personal_todos_v3";
const PRIO = { high: "긴급", medium: "보통", low: "여유" };
const PRIO_ORDER = { high: 0, medium: 1, low: 2 };
const CALENDAR_EVENTS = [
  { date: "2026-05-04", weekday: "월", events: [] },

  { date: "2026-05-07", weekday: "목", events: [] },
  { date: "2026-05-08", weekday: "금", events: [] },
];
let state = { tasks: [], filter: "all", expandedId: null, editingPriority: "medium", saveTimer: null, lastSavedAt: null, showAllGroups: false, showAllHours: false, showAllDays: false, isMobile: false };
function detectMobile() { state.isMobile = window.innerWidth < 768; }
const SEED_TASKS = [
  { id: 1, text: "2단계 교육 프로그램/실습과제 내용 확정", priority: "high", done: false, note: "", createdAt: "2026-04-28", dueDate: "", completedAt: "" },
  { id: 2, text: "KMG 과제정의서 3개 작성", priority: "high", done: false, note: "", createdAt: "2026-04-28", dueDate: "", completedAt: "" },
  { id: 3, text: "한화 발표자료 작성", priority: "medium", done: false, note: "", createdAt: "2026-04-28", dueDate: "", completedAt: "" },
  { id: 4, text: "KII 과제별 센터장 보고자료 점검", priority: "high", done: false, note: "", createdAt: "2026-04-29", dueDate: "2026-04-30", completedAt: "" },
  { id: 5, text: "개인별 personal goal 계획 알림", priority: "medium", done: false, note: "", createdAt: "2026-04-29", dueDate: "2026-04-30", completedAt: "" },
  { id: 6, text: "sas 발표자료 시나리오 확인", priority: "high", done: false, note: "", createdAt: "2026-04-29", dueDate: "2026-04-30", completedAt: "" },
  { id: 7, text: "데이터플랫폼 KLS 탈퇴 회의 개최 방안 논의", priority: "medium", done: false, note: "", createdAt: "2026-04-29", dueDate: "2026-04-30", completedAt: "" },
  { id: 8, text: "KMG 계약서 날인", priority: "high", done: false, note: "", createdAt: "2026-04-29", dueDate: "2026-04-30", completedAt: "" },
  { id: 9, text: "KMG 임원급, 팀장, 실무자 오전 교육 프로그램 확정", priority: "high", done: false, note: "", createdAt: "2026-04-29", dueDate: "2026-04-30", completedAt: "" },
  { id: 10, text: "한화솔루션 발표자료 수정", priority: "high", done: false, note: "", createdAt: "2026-04-29", dueDate: "2026-04-30", completedAt: "" },
];
function loadFromStorage() { try { const raw = localStorage.getItem(STORAGE_KEY); if (!raw) { const old = localStorage.getItem("kolon_personal_todos_v2"); return old ? JSON.parse(old) : null; } return JSON.parse(raw); } catch (e) { return null; } }
function saveToStorage(silent = true) { try { const now = new Date(); localStorage.setItem(STORAGE_KEY, JSON.stringify({ tasks: state.tasks, savedAt: now.toISOString() })); state.lastSavedAt = now; updateSaveStatus(false); if (!silent) showToast("저장되었습니다", "success"); } catch (e) { showToast("저장 실패: " + e.message); } }
function scheduleAutoSave() { updateSaveStatus(true); if (state.saveTimer) clearTimeout(state.saveTimer); state.saveTimer = setTimeout(() => saveToStorage(true), 600); }
function todayISO() { return new Date().toISOString().split('T')[0]; }
function getDday(dueDate) { if (!dueDate) return null; const today = new Date(); today.setHours(0, 0, 0, 0); const due = new Date(dueDate); due.setHours(0, 0, 0, 0); return Math.ceil((due - today) / (1000 * 60 * 60 * 24)); }
function ddayLabel(d) { if (d === null) return ""; if (d === 0) return "D-Day"; if (d < 0) return `+${Math.abs(d)}`; return `D−${d}`; }
function ddayClass(d) { if (d === null) return "dday-none"; if (d < 0) return "dday-overdue"; if (d === 0) return "dday-today"; if (d <= 3) return "dday-urgent"; if (d <= 7) return "dday-warn"; return "dday-safe"; }
function formatDate(s) { if (!s) return ""; const d = new Date(s); return `${d.getMonth() + 1}.${String(d.getDate()).padStart(2, "0")}`; }
function formatDateTime(date) { if (!date) return ""; const m = date.getMonth() + 1, d = date.getDate(); const hh = String(date.getHours()).padStart(2, "0"); const mm = String(date.getMinutes()).padStart(2, "0"); return `${m}/${d} ${hh}:${mm}`; }
function getDateHeader() { const d = new Date(); const w = ["일","월","화","수","목","금","토"][d.getDay()]; return `${d.getFullYear()}년 ${d.getMonth() + 1}월 ${d.getDate()}일 ${w}요일`; }
function getTargetWorkday() { const today = new Date(); const todayStr = todayISO(); const dayOfWeek = today.getDay(); const hour = today.getHours(); const isWeekend = dayOfWeek === 0 || dayOfWeek === 6; const todayEvent = CALENDAR_EVENTS.find(e => e.date === todayStr); const isHolidayToday = todayEvent && todayEvent.isHoliday; const isAfterWork = hour >= 18; if (!isWeekend && !isHolidayToday && !isAfterWork) { return { date: todayStr, label: "오늘", isToday: true }; } const next = new Date(today); if (isAfterWork && !isWeekend && !isHolidayToday) next.setDate(next.getDate() + 1); let safety = 0; while (safety++ < 14) { const nDay = next.getDay(); const nStr = next.toISOString().split('T')[0]; const nEvent = CALENDAR_EVENTS.find(e => e.date === nStr); if (nDay !== 0 && nDay !== 6 && !(nEvent && nEvent.isHoliday)) { const m = next.getMonth() + 1; const d = next.getDate(); const w = ["일","월","화","수","목","금","토"][nDay]; const diff = Math.round((next - today) / (1000 * 60 * 60 * 24)); let label; if (diff === 1) label = `내일 ${m}/${d}(${w})`; else label = `${m}/${d}(${w})`; return { date: nStr, label, isToday: false }; } next.setDate(next.getDate() + 1); } return { date: todayStr, label: "다음 근무일", isToday: true }; }
function computeStats() { const tasks = state.tasks.filter(t => !t.done); const all = state.tasks.length; const done = state.tasks.filter(t => t.done).length; const pending = tasks.length; const overdue = tasks.filter(t => t.dueDate && getDday(t.dueDate) < 0).length; const today = tasks.filter(t => t.dueDate && getDday(t.dueDate) === 0).length; const danger = overdue + today; const soon = tasks.filter(t => t.dueDate && getDday(t.dueDate) > 0 && getDday(t.dueDate) <= 3).length; const target = getTargetWorkday(); const todayEvent = CALENDAR_EVENTS.find(e => e.date === target.date); const meetings = (todayEvent?.events || []).filter(e => !e.allDay).length; const availableHours = Math.max(0, 9 - meetings - 1 - 1); const capacity = Math.floor(availableHours * 1.5); return { all, done, pending, danger, overdue, today, soon, availableHours, capacity, target }; }
function filteredTasks() { return state.tasks.filter(t => { if (state.filter === "active") return !t.done; if (state.filter === "done") return t.done; return true; }); }
function render() { const stats = computeStats(); document.getElementById("dangerValue").textContent = stats.danger; document.getElementById("dangerLabel").textContent = stats.overdue > 0 ? "지연 + D-Day" : "D-Day"; document.getElementById("dangerDetail").textContent = stats.overdue > 0 ? `지연 ${stats.overdue}건 · 오늘 ${stats.today}건` : `오늘 마감 ${stats.today}건`; document.getElementById("metricDanger").classList.toggle("has-overdue", stats.overdue > 0); document.getElementById("timeValue").textContent = `${stats.availableHours}h`; document.getElementById("timeDetail").textContent = `${stats.target.label} 가용 시간`; document.getElementById("capacityValue").textContent = stats.capacity; document.getElementById("capacityDetail").textContent = stats.pending > stats.capacity ? `미배정 ${stats.pending - stats.capacity}건 발생` : `여유 ${stats.capacity - stats.pending}건`; document.getElementById("cntAll").textContent = stats.all; document.getElementById("cntActive").textContent = stats.pending; document.getElementById("cntDone").textContent = stats.done; document.querySelectorAll(".tab").forEach(tab => tab.classList.toggle("active", tab.dataset.filter === state.filter)); document.getElementById("qsAll").textContent = stats.all; document.getElementById("qsPending").textContent = stats.pending; document.getElementById("qsOverdue").textContent = stats.danger; document.getElementById("qsSoon").textContent = stats.soon; document.getElementById("qsDone").textContent = stats.done; renderTaskGroups(); renderTimeline(stats); renderCalendar(); }
function renderTaskGroups() { const list = document.getElementById("list"); const tasks = filteredTasks(); if (tasks.length === 0) { list.innerHTML = `<div class="empty"><div class="empty-icon">○</div><div class="empty-text">${state.filter === "done" ? "완료한 할 일이 없습니다" : state.filter === "active" ? "진행 중인 할 일이 없습니다" : "할 일이 없습니다"}</div></div>`; return; } const groups = { urgent: [], soon: [], later: [], nodue: [], done: [] }; tasks.forEach(t => { if (t.done) groups.done.push(t); else { const d = getDday(t.dueDate); if (d === null) groups.nodue.push(t); else if (d <= 0) groups.urgent.push(t); else if (d <= 3) groups.soon.push(t); else groups.later.push(t); } }); Object.keys(groups).forEach(k => { groups[k].sort((a, b) => { if (PRIO_ORDER[a.priority] !== PRIO_ORDER[b.priority]) return PRIO_ORDER[a.priority] - PRIO_ORDER[b.priority]; if (a.dueDate && b.dueDate) return a.dueDate.localeCompare(b.dueDate); return 0; }); }); const groupConfigs = [ { key: "urgent", title: "🔥 즉시 처리 (D-Day & 지연)", className: "group-urgent" }, { key: "soon", title: "⚡ 곧 마감 (D-3 이내)", className: "group-soon" }, { key: "later", title: "📅 여유 (D-7+)", className: "group-later" }, { key: "nodue", title: "📌 마감일 미정", className: "group-nodue" }, { key: "done", title: "✓ 완료", className: "group-done" }, ]; const visibleGroups = groupConfigs.filter(g => groups[g.key].length > 0); let groupsToRender = visibleGroups; let hiddenCount = 0; if (state.isMobile && !state.showAllGroups && visibleGroups.length > 1) { groupsToRender = [visibleGroups[0]]; hiddenCount = visibleGroups.slice(1).reduce((sum, g) => sum + groups[g.key].length, 0); } let html = groupsToRender.map(g => `<div class="task-group ${g.className}"><div class="group-header"><div class="group-icon-bar"></div><div class="group-title">${g.title}</div><div class="group-count">${groups[g.key].length}건</div></div>${groups[g.key].map(t => renderTask(t)).join("")}</div>`).join(""); if (state.isMobile && hiddenCount > 0 && !state.showAllGroups) { html += `<button class="show-more-btn" onclick="toggleShowAll('groups')">▼ 다른 그룹 보기 (${hiddenCount}건)</button>`; } else if (state.isMobile && state.showAllGroups && visibleGroups.length > 1) { html += `<button class="show-more-btn active" onclick="toggleShowAll('groups')">▲ 즉시 처리만 보기</button>`; } list.innerHTML = html; }
function renderTask(t) { const dday = getDday(t.dueDate), ddc = ddayClass(dday), dlbl = ddayLabel(dday); const isExpanded = state.expandedId === t.id; const metaParts = []; metaParts.push(`<span>입력 ${formatDate(t.createdAt) || "오늘"}</span>`); if (t.done && t.completedAt) metaParts.push(`<span class="dot">·</span><span class="completed-tag">✓ 완료 ${formatDate(t.completedAt)}</span>`); else if (t.dueDate) metaParts.push(`<span class="dot">·</span><span>마감 ${formatDate(t.dueDate)}</span>`); if (t.note && !isExpanded) { const sn = t.note.length > 25 ? t.note.slice(0, 25) + "…" : t.note; metaParts.push(`<span class="dot">·</span><span>${escapeHtml(sn)}</span>`); } const ddayBadge = t.done ? `<div class="dday-badge dday-done">✓ 완료</div>` : t.dueDate ? `<div class="dday-badge ${ddc}">${dlbl}</div>` : `<div class="dday-none">—</div>`; return `<div class="task" data-id="${t.id}"><div class="task-bar bar-${t.priority}"></div><div class="task-row" onclick="onTaskClick(${t.id}, event)"><div class="check ${t.done ? "done" : ""} priority-${t.priority}" onclick="onCheckClick(${t.id}, event)">${t.done ? '<svg width="12" height="12" viewBox="0 0 14 14" fill="none"><path d="M2 7L5.5 10.5L12 4" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>' : ''}</div><div class="task-content"><div class="task-text ${t.done ? "done" : ""}">${escapeHtml(t.text)}</div><div class="task-meta">${metaParts.join("")}</div></div><div class="task-right"><div class="priority-badge ${t.priority}">${PRIO[t.priority]}</div>${ddayBadge}</div></div>${isExpanded ? renderExpanded(t) : ""}</div>`; }
function renderExpanded(t) { return `<div class="expanded" onclick="event.stopPropagation()"><div><div class="field-label">업무 내용</div><input type="text" class="text-input" value="${escapeAttr(t.text)}" onchange="updateTask(${t.id}, 'text', this.value)" /></div><div><div class="field-label">우선순위</div><div class="priority-grid">${["high","medium","low"].map(p => `<button class="priority-btn ${t.priority === p ? "sel-" + p : ""}" onclick="updateTask(${t.id}, 'priority', '${p}')"><span class="pdot"></span>${PRIO[p]}</button>`).join("")}</div></div><div><div class="field-label">완료 예정일</div><input type="date" class="date-input" value="${t.dueDate || ""}" onchange="updateTask(${t.id}, 'dueDate', this.value)" /></div><div><div class="field-label">메모</div><textarea class="textarea" placeholder="메모를 추가하세요..." onchange="updateTask(${t.id}, 'note', this.value)">${escapeHtml(t.note)}</textarea></div><div style="display:flex;justify-content:space-between;align-items:center;padding-top:6px;border-top:1px solid #f1f5f9"><span style="font-size:11px;color:#94a3b8">생성: ${formatDate(t.createdAt) || "오늘"}${t.done && t.completedAt ? ` · 완료: <span style="color:#10b981;font-weight:600">${formatDate(t.completedAt)}</span>` : ""}</span><button class="delete-btn" onclick="deleteTask(${t.id})">삭제</button></div></div>`; }
function renderTimeline(stats) { const tlTitle = document.getElementById("tlTitle"); const tlSubtitle = document.getElementById("tlSubtitle"); const tlInsight = document.getElementById("tlInsight"); const timeline = document.getElementById("timeline"); const target = stats.target; tlTitle.textContent = `${target.label} 시간 배분`; tlSubtitle.textContent = `${stats.pending}건 미완료 · 가용 ${stats.availableHours}시간`; const insightText = stats.pending === 0 ? "🎉 모든 업무 완료! 다음 주 계획 점검 시간" : stats.pending > stats.capacity ? `⚠️ ${stats.pending - stats.capacity}건 미배정 · 우선순위 조정 또는 이월 검토 필요` : `✨ ${target.label} 계획대로 진행 시 모두 완료 가능`; tlInsight.innerHTML = `<div class="tl-insight-row"><span>${insightText}</span></div>`; const todayEvent = CALENDAR_EVENTS.find(e => e.date === target.date); const meetings = (todayEvent?.events || []).filter(e => !e.allDay).map(e => { const [h, m] = e.time.split(":").map(Number); const [eh, em] = e.endTime.split(":").map(Number); return { startHour: h, endHour: eh, title: e.title }; }); const pending = state.tasks.filter(t => !t.done).sort((a, b) => { if (PRIO_ORDER[a.priority] !== PRIO_ORDER[b.priority]) return PRIO_ORDER[a.priority] - PRIO_ORDER[b.priority]; if (a.dueDate && b.dueDate) return a.dueDate.localeCompare(b.dueDate); if (a.dueDate) return -1; if (b.dueDate) return 1; return 0; }); const hours = []; let taskIdx = 0; const currentHour = new Date().getHours(); const isToday = target.isToday; for (let h = 9; h <= 17; h++) { const meeting = meetings.find(m => m.startHour <= h && m.endHour > h); let row; if (h === 12) { row = { hour: h, type: "lunch", text: "점심 시간" }; } else if (h === 17) { row = { hour: h, type: "wrap", text: "정리 · 다음 일정 점검" }; } else if (meeting) { row = { hour: h, type: "busy", text: meeting.title }; } else if (taskIdx < pending.length) { const tasksHere = []; const cap = 1; for (let i = 0; i < cap && taskIdx < pending.length; i++, taskIdx++) { tasksHere.push(pending[taskIdx]); } const isUrg = tasksHere.length > 0 && (tasksHere[0].priority === "high" || (tasksHere[0].dueDate && getDday(tasksHere[0].dueDate) <= 0)); row = { hour: h, type: isUrg ? "task urgent" : "task", text: tasksHere.length > 0 ? tasksHere[0].text : "여유 시간", priority: tasksHere[0]?.priority }; } else { row = { hour: h, type: "empty", text: "여유 시간" }; } if (isToday && currentHour === h) { row.isNow = true; } hours.push(row); } let displayHours = hours; let hiddenHourCount = 0; if (state.isMobile && !state.showAllHours) { const refHour = (isToday && currentHour >= 9 && currentHour <= 17) ? currentHour : 9; displayHours = hours.filter(h => Math.abs(h.hour - refHour) <= 2); hiddenHourCount = hours.length - displayHours.length; } const hoursToRender = displayHours; timeline.innerHTML = hoursToRender.map((row, idx) => { const isLast = idx === hoursToRender.length - 1; const time = `${String(row.hour).padStart(2, "0")}:00`; let cellClass = ""; let tagClass = ""; let tagText = ""; if (row.isNow) { cellClass = "now-cell"; tagClass = "tag-now"; tagText = "NOW"; } else if (row.type === "busy") { cellClass = "busy"; tagClass = "tag-meeting"; tagText = "회의"; } else if (row.type.includes("task")) { cellClass = row.type.includes("urgent") ? "urgent-cell" : "task-cell"; tagClass = row.type.includes("urgent") ? "tag-urgent" : "tag-task"; tagText = row.type.includes("urgent") ? "긴급" : "업무"; } else if (row.type === "lunch") { cellClass = "lunch-cell"; tagClass = "tag-lunch"; tagText = "점심"; } else if (row.type === "wrap") { cellClass = "wrap-cell"; tagClass = "tag-wrap"; tagText = "정리"; } else { cellClass = "empty"; } const dotClass = row.isNow ? "now" : row.type.includes("task") ? `task ${row.type.includes("urgent") ? "urgent" : ""}` : row.type === "busy" ? "busy" : row.type === "lunch" ? "lunch" : row.type === "wrap" ? "wrap" : ""; const tagHtml = (cellClass !== "empty") ? `<span class="tl-cell-tag ${tagClass}">${tagText}</span>` : ""; const lineHtml = !isLast ? `<div class="tl-line" style="top:50%;bottom:-50%"></div>` : ""; return `<div class="tl-row ${row.isNow ? "now" : ""} ${row.type.replace(" ", ".")}"><div class="tl-hour">${time}</div><div class="tl-rail">${idx > 0 ? '<div class="tl-line" style="top:0;bottom:50%"></div>' : ''}${lineHtml}<div class="tl-dot ${dotClass}"></div></div><div class="tl-cell ${cellClass}">${tagHtml}<span class="tl-text">${escapeHtml(row.text)}</span></div></div>`; }).join(""); if (taskIdx < pending.length) { const remaining = pending.slice(taskIdx); timeline.innerHTML += `<div class="tl-warn"><div class="tl-warn-title">⚠️ 시간 부족 · 미배정 ${remaining.length}건</div>${remaining.slice(0, 3).map(t => `<div class="tl-warn-item"><span class="tl-warn-dot" style="background:${t.priority === "high" ? "#f43f5e" : t.priority === "medium" ? "#f59e0b" : "#10b981"}"></span>${escapeHtml(t.text.length > 30 ? t.text.slice(0, 30) + "…" : t.text)}</div>`).join("")}${remaining.length > 3 ? `<div style="font-size:10px;color:#9a3412;margin-top:3px;">외 ${remaining.length - 3}건</div>` : ""}</div>`; } if (state.isMobile && hiddenHourCount > 0 && !state.showAllHours) { timeline.innerHTML += `<button class="show-more-btn" style="margin:6px 9px 0;" onclick="toggleShowAll('hours')">▼ 전체 시간표 (${hiddenHourCount}시간 더)</button>`; } else if (state.isMobile && state.showAllHours) { timeline.innerHTML += `<button class="show-more-btn active" style="margin:6px 9px 0;" onclick="toggleShowAll('hours')">▲ 현재 시간만 보기</button>`; } }
function renderCalendar() { const today = new Date(); const todayStr = todayISO(); const calBody = document.getElementById("calendarBody"); const calCount = document.getElementById("calCount"); let upcoming = CALENDAR_EVENTS.filter(d => d.date >= todayStr); const totalEvents = upcoming.reduce((s, d) => s + d.events.length, 0); calCount.textContent = `${totalEvents}건`; let hiddenDayCount = 0; if (state.isMobile && !state.showAllDays && upcoming.length > 2) { hiddenDayCount = upcoming.length - 2; upcoming = upcoming.slice(0, 2); } if (upcoming.length === 0) { calBody.innerHTML = `<div style="padding:20px;text-align:center;color:#94a3b8;font-size:11px;">예정된 일정이 없습니다</div>`; return; } function getDayLabel(dateStr) { if (dateStr === todayStr) return "오늘"; const td = new Date(todayStr); const ed = new Date(dateStr); const diff = Math.round((ed - td) / (1000 * 60 * 60 * 24)); if (diff === 1) return "내일"; if (diff === 2) return "모레"; return `${ed.getMonth() + 1}/${ed.getDate()}`; } calBody.innerHTML = upcoming.map(day => { const isToday = day.date === todayStr; const dayLabel = getDayLabel(day.date); const labelClass = day.isHoliday ? "hol" : isToday ? "today" : "normal"; const dateColor = day.isHoliday ? "color:#be123c" : ""; const dayClass = day.isHoliday ? "holiday" : isToday ? "today" : ""; if (day.events.length === 0) { return `<div class="cal-day ${dayClass}"><div class="cal-day-head"><div class="cal-label ${labelClass}">${dayLabel}</div><div class="cal-date" style="${dateColor}">${formatDate(day.date)}(${day.weekday})</div><div class="cal-cnt-day">없음</div></div></div>`; } return `<div class="cal-day ${dayClass}"><div class="cal-day-head"><div class="cal-label ${labelClass}">${dayLabel}</div><div class="cal-date" style="${dateColor}">${formatDate(day.date)}(${day.weekday})</div><div class="cal-cnt-day">${day.events.length}건</div></div><div class="cal-events">${day.events.map(ev => `<div class="cal-event ${ev.isHoliday ? "hol" : ""}"><div class="cal-event-time ${ev.isHoliday ? "hol" : ""}">${ev.allDay ? "종일" : ev.time}</div><div class="cal-event-content"><div class="cal-event-title ${ev.isHoliday ? "hol" : ""}">${escapeHtml(ev.title)}</div>${ev.location ? `<div class="cal-event-loc">📍 ${escapeHtml(ev.location)}</div>` : ""}</div></div>`).join("")}</div></div>`; }).join(""); if (state.isMobile && hiddenDayCount > 0 && !state.showAllDays) { calBody.innerHTML += `<button class="show-more-btn" style="margin:6px 10px 8px;width:calc(100% - 20px);" onclick="toggleShowAll('days')">▼ 다음 일정 (${hiddenDayCount}일 더)</button>`; } else if (state.isMobile && state.showAllDays) { calBody.innerHTML += `<button class="show-more-btn active" style="margin:6px 10px 8px;width:calc(100% - 20px);" onclick="toggleShowAll('days')">▲ 오늘/내일만 보기</button>`; } }
function toggleShowAll(type) { if (type === "groups") state.showAllGroups = !state.showAllGroups; else if (type === "hours") state.showAllHours = !state.showAllHours; else if (type === "days") state.showAllDays = !state.showAllDays; render(); }
function escapeHtml(s) { return String(s || "").replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
function escapeAttr(s) { return escapeHtml(s).replace(/'/g, "&#39;"); }
function onTaskClick(id) { state.expandedId = state.expandedId === id ? null : id; render(); }
function onCheckClick(id, ev) { ev.stopPropagation(); const t = state.tasks.find(x => x.id === id); if (!t) return; const nowDone = !t.done; t.done = nowDone; t.completedAt = nowDone ? todayISO() : ""; scheduleAutoSave(); render(); }
function updateTask(id, field, value) { const t = state.tasks.find(x => x.id === id); if (!t) return; t[field] = value; scheduleAutoSave(); if (field === "priority" || field === "dueDate") render(); }
function deleteTask(id) { if (!confirm("이 할 일을 삭제하시겠습니까?")) return; state.tasks = state.tasks.filter(t => t.id !== id); state.expandedId = null; scheduleAutoSave(); render(); showToast("삭제되었습니다", "success"); }
function openAddSheet() { document.getElementById("newText").value = ""; document.getElementById("newDue").value = ""; state.editingPriority = "medium"; updatePrioGrid(); validateConfirm(); document.getElementById("overlay").classList.add("open"); document.getElementById("sheet").classList.add("open"); setTimeout(() => document.getElementById("newText").focus(), 350); }
function closeAddSheet() { document.getElementById("overlay").classList.remove("open"); document.getElementById("sheet").classList.remove("open"); }
function updatePrioGrid() { document.querySelectorAll("#prioGrid .priority-btn").forEach(btn => { btn.className = "priority-btn"; if (btn.dataset.prio === state.editingPriority) btn.classList.add("sel-" + btn.dataset.prio); }); }
function validateConfirm() { const text = document.getElementById("newText").value.trim(); document.getElementById("confirmBtn").disabled = !text; }
function confirmAdd() { const text = document.getElementById("newText").value.trim(); if (!text) return; const dueDate = document.getElementById("newDue").value; state.tasks.push({ id: Date.now(), text, priority: state.editingPriority, done: false, note: "", createdAt: todayISO(), dueDate, completedAt: "" }); scheduleAutoSave(); closeAddSheet(); render(); showToast("추가되었습니다", "success"); }
function updateSaveStatus(saving) { const el = document.getElementById("saveStatus"); const text = document.getElementById("saveText"); if (saving) { el.classList.add("saving"); el.querySelector("svg").style.display = "none"; text.textContent = "저장 중..."; } else { el.classList.remove("saving"); el.querySelector("svg").style.display = ""; text.textContent = state.lastSavedAt ? `저장됨 ${formatDateTime(state.lastSavedAt)}` : "자동 저장"; } }
let toastTimer; function showToast(message, type = "") { const t = document.getElementById("toast"); t.textContent = message; t.className = "toast show " + type; clearTimeout(toastTimer); toastTimer = setTimeout(() => t.className = "toast " + type, 1800); }
function init() { detectMobile(); document.getElementById("dateText").textContent = getDateHeader(); const data = loadFromStorage(); if (data && Array.isArray(data.tasks)) { state.tasks = data.tasks; if (data.savedAt) state.lastSavedAt = new Date(data.savedAt); } else { state.tasks = SEED_TASKS; saveToStorage(true); } updateSaveStatus(false); window.addEventListener("resize", () => { const wasMobile = state.isMobile; detectMobile(); if (wasMobile !== state.isMobile) render(); }); document.querySelectorAll(".tab").forEach(tab => { tab.addEventListener("click", () => { state.filter = tab.dataset.filter; state.expandedId = null; render(); }); }); document.getElementById("fab").addEventListener("click", openAddSheet); document.getElementById("overlay").addEventListener("click", closeAddSheet); document.getElementById("cancelBtn").addEventListener("click", closeAddSheet); document.getElementById("confirmBtn").addEventListener("click", confirmAdd); document.getElementById("newText").addEventListener("input", validateConfirm); document.getElementById("newText").addEventListener("keydown", e => { if (e.key === "Enter") confirmAdd(); }); document.querySelectorAll("#prioGrid .priority-btn").forEach(btn => { btn.addEventListener("click", () => { state.editingPriority = btn.dataset.prio; updatePrioGrid(); }); }); let touchStartY = 0; const sheet = document.getElementById("sheet"); sheet.addEventListener("touchstart", e => { touchStartY = e.touches[0].clientY; }, { passive: true }); sheet.addEventListener("touchmove", e => { const dy = e.touches[0].clientY - touchStartY; if (dy > 100) closeAddSheet(); }, { passive: true }); render(); setInterval(() => render(), 60000); }
document.addEventListener("DOMContentLoaded", init);
if ('serviceWorker' in navigator) { const swCode = `self.addEventListener('install', e => self.skipWaiting()); self.addEventListener('activate', e => self.clients.claim()); self.addEventListener('fetch', e => { e.respondWith(fetch(e.request).catch(() => caches.match(e.request))); });`; try { const blob = new Blob([swCode], { type: 'application/javascript' }); const url = URL.createObjectURL(blob); navigator.serviceWorker.register(url).catch(() => {}); } catch (e) {} }
