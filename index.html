<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>나의 할 일 · Sir</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable.css">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --canvas: #F7F4ED; --surface: #FFFFFF; --surfaceLow: #FBF8F1; --surfaceMute: #F2EEE3;
    --ink: #0A0E13; --muted: #7A7670; --faded: #B8B3A8;
    --hair: #E5DECC; --hairSoft: #EFE9D8;
    --amber: #B45309; --amberLight: #D97706; --amberMist: #FFFBEB; --amberHaze: #FEF3C7;
    --sage: #15803D; --sageLight: #16A34A; --sageMist: #F0FDF4; --sageHaze: #DCFCE7;
    --rose: #BE185D;
    --navy: #0E2841; --navyDeep: #091A2C; --navyMist: #EEF2F7;
    --gold: #A88445; --goldLight: #C9A35F; --goldHaze: #F5EDD8;
    --claude: #CC785C; --claudeMist: #FAF1ED; --claudeBorder: #EBC8B8;
    --github: #24292E; --githubMist: #F6F8FA;
    --fd: 'Pretendard Variable','Pretendard',-apple-system,sans-serif;
    --fm: 'JetBrains Mono','IBM Plex Mono',ui-monospace,Menlo,monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body { font-family: var(--fd); background: var(--canvas); background-image: radial-gradient(circle at 1px 1px, var(--hairSoft) 1px, transparent 0); background-size: 22px 22px; color: var(--ink); padding: 10px; font-size: 11.5px; line-height: 1.4; min-height: 100vh; }
  .wrap { width: 100%; max-width: 1500px; margin: 0 auto; }

  .topbar { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; padding: 6px 10px; background: var(--surface); border-radius: 9px; border: 1px solid var(--hair); border-left: 4px solid var(--navy); box-shadow: 0 1px 0 var(--hairSoft); flex-wrap: wrap; }
  .tb-kicker { font-size: 8.5px; font-weight: 700; color: var(--gold); letter-spacing: 0.22em; text-transform: uppercase; }
  .tb-title { font-size: 16px; font-weight: 800; color: var(--ink); letter-spacing: -0.025em; }
  .tb-holiday { display: inline-flex; align-items: center; gap: 5px; font-size: 10px; font-weight: 700; color: var(--amber); padding: 3px 8px; background: var(--amberMist); border: 1px solid var(--amberHaze); border-radius: 99px; }
  .tb-spacer { flex: 1; }
  .stats-mini { display: flex; align-items: center; gap: 1px; }
  .stat-mini { display: inline-flex; align-items: baseline; gap: 4px; padding: 3px 9px; border-right: 1px solid var(--hair); }
  .stat-mini:last-child { border-right: none; }
  .stat-mini-v { font-size: 14px; font-weight: 800; font-family: var(--fm); line-height: 1; letter-spacing: -0.02em; }
  .stat-mini-l { font-size: 8.5px; font-weight: 700; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; }

  /* Sync 상태 인디케이터 */
  .sync-status { display: inline-flex; align-items: center; gap: 5px; padding: 3px 9px; font-size: 10px; font-weight: 700; border-radius: 99px; cursor: pointer; transition: all 0.15s ease; }
  .sync-status.unconfigured { background: var(--surfaceMute); color: var(--muted); border: 1px solid var(--hair); }
  .sync-status.syncing { background: var(--goldHaze); color: var(--gold); border: 1px solid var(--goldLight); }
  .sync-status.synced { background: var(--sageMist); color: var(--sage); border: 1px solid var(--sageHaze); }
  .sync-status.error { background: var(--amberMist); color: var(--amber); border: 1px solid var(--amberHaze); }
  .sync-status:hover { transform: translateY(-1px); }
  .sync-dot { width: 6px; height: 6px; border-radius: 99px; }
  .sync-dot.unconfigured { background: var(--faded); }
  .sync-dot.syncing { background: var(--goldLight); animation: pulse 1s infinite; }
  .sync-dot.synced { background: var(--sageLight); }
  .sync-dot.error { background: var(--amberLight); }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

  .btn-settings { display: inline-flex; align-items: center; gap: 5px; height: 26px; padding: 0 11px; font-size: 10.5px; font-weight: 700; border-radius: 5px; border: 1px solid var(--hair); color: var(--ink); background: var(--surface); cursor: pointer; font-family: inherit; transition: all 0.15s ease; }
  .btn-settings:hover { border-color: var(--navy); }

  .sync-bar { display: flex; gap: 5px; margin-bottom: 7px; align-items: center; padding: 6px 10px; background: var(--claudeMist); border: 1px solid var(--claudeBorder); border-left: 3px solid var(--claude); border-radius: 8px; flex-wrap: wrap; }
  .sync-label { font-size: 9px; font-weight: 800; color: var(--claude); letter-spacing: 0.18em; text-transform: uppercase; padding-right: 6px; border-right: 1px solid var(--claudeBorder); margin-right: 4px; }
  .sync-btn { display: inline-flex; align-items: center; gap: 5px; height: 26px; padding: 0 11px; font-size: 10.5px; font-weight: 700; border-radius: 5px; border: 1px solid var(--claudeBorder); color: var(--claude); background: var(--surface); cursor: pointer; font-family: inherit; letter-spacing: 0.02em; transition: all 0.15s ease; }
  .sync-btn:hover { background: var(--claude); color: #fff; }
  .sync-btn.primary { background: var(--claude); color: #fff; border-color: var(--claude); }
  .sync-btn.primary:hover { background: #B26A50; }
  .sync-info { font-size: 9.5px; color: var(--muted); margin-left: auto; font-family: var(--fm); }

  .input-bar { display: flex; gap: 4px; margin-bottom: 7px; align-items: stretch; flex-wrap: wrap; padding: 4px; background: var(--surface); border-radius: 8px; border: 1px solid var(--hair); box-shadow: 0 1px 0 var(--hairSoft); }
  .inp { flex: 1; min-width: 140px; height: 27px; padding: 0 10px; font-size: 11.5px; border: 1px solid transparent; border-radius: 5px; background: transparent; font-family: inherit; color: var(--ink); outline: none; }
  .inp-pri { flex: 0 0 70px; min-width: 70px; padding: 0 7px; border-left: 1px solid var(--hair); border-radius: 0; font-weight: 600; }
  .inp-date { flex: 0 0 140px; min-width: 140px; padding: 0 9px; border-left: 1px solid var(--hair); border-radius: 0; color: var(--navy); font-weight: 600; font-family: var(--fm); font-size: 11px; }
  .btn-add { height: 27px; padding: 0 14px; font-size: 11px; font-weight: 700; border-radius: 5px; border: none; color: var(--surface); background: var(--navy); cursor: pointer; font-family: inherit; letter-spacing: 0.04em; }
  .btn-reset { height: 27px; padding: 0 11px; font-size: 10px; font-weight: 600; border-radius: 5px; border: 1px solid var(--hair); color: var(--muted); background: var(--surface); cursor: pointer; font-family: inherit; }
  .btn-reset:hover { color: var(--amber); border-color: var(--amberLight); }
  .vsep { width: 1px; background: var(--hair); margin: 2px 3px; }
  .filter-btn { height: 27px; padding: 0 11px; font-size: 11px; font-weight: 500; border-radius: 5px; border: none; color: var(--muted); background: transparent; cursor: pointer; font-family: inherit; letter-spacing: 0.03em; transition: all 0.15s ease; }
  .filter-btn.active { background: var(--navy); color: var(--surface); font-weight: 700; }

  .week-strip { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-bottom: 8px; }
  .day-pill { cursor: pointer; padding: 4px 4px; border-radius: 6px; border: 1px solid var(--hair); background: var(--surface); text-align: center; transition: all 0.15s ease; display: flex; align-items: center; justify-content: center; gap: 5px; }
  .day-pill:hover { border-color: var(--navy); }
  .day-pill.selected { background: var(--navyDeep); border-color: var(--navy); box-shadow: 0 3px 8px -2px rgba(14,40,65,0.4); }
  .day-pill.weekend { background: var(--surfaceLow); }
  .day-pill .wd { font-size: 8.5px; font-weight: 700; color: var(--muted); letter-spacing: 0.12em; }
  .day-pill.selected .wd { color: var(--faded); }
  .day-pill .dnum { font-size: 13px; font-weight: 800; font-family: var(--fm); letter-spacing: -0.04em; }
  .day-pill.selected .dnum { color: var(--surface); }
  .day-pill.today .dnum { color: var(--rose); }
  .day-pill.holiday .dnum { color: var(--amber); }
  .day-pill.weekend .dnum { color: var(--faded); }
  .day-pill .ddot { width: 4px; height: 4px; border-radius: 99px; }

  .main { display: grid; grid-template-columns: 1.7fr minmax(0, 1fr); gap: 9px; }
  @media (max-width: 768px) { .main { grid-template-columns: 1fr; } }
  .card { background: var(--surface); border-radius: 9px; border: 1px solid var(--hair); padding: 10px; box-shadow: 0 1px 0 var(--hairSoft); min-width: 0; }
  .st { display: flex; align-items: stretch; justify-content: space-between; margin-bottom: 7px; padding-bottom: 6px; border-bottom: 1px solid var(--hairSoft); }
  .st-l { display: flex; gap: 8px; align-items: stretch; }
  .st-bar { width: 3px; border-radius: 2px; }
  .st-bar.navy { background: var(--navy); }
  .st-bar.sage { background: var(--sage); }
  .st-k { font-size: 8.5px; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; line-height: 1; margin-bottom: 3px; }
  .st-k.navy { color: var(--navy); }
  .st-k.sage { color: var(--sage); }
  .st-t { font-size: 13px; font-weight: 800; color: var(--ink); letter-spacing: -0.02em; line-height: 1; }
  .st-r { display: flex; flex-direction: column; align-items: flex-end; gap: 2px; justify-content: center; }
  .st-c { font-size: 16px; font-weight: 800; font-family: var(--fm); line-height: 1; letter-spacing: -0.03em; }
  .st-c.navy { color: var(--navy); }
  .st-c.sage { color: var(--sage); }
  .st-h { font-size: 8px; font-weight: 600; color: var(--faded); letter-spacing: 0.1em; text-transform: uppercase; }

  .task-list { display: flex; flex-direction: column; min-height: 100px; }
  .task-row { display: flex; align-items: center; gap: 8px; padding: 5px 6px; border-radius: 4px; border-bottom: 1px solid var(--hairSoft); border-left: 2px solid transparent; cursor: pointer; transition: all 0.13s ease; overflow: hidden; }
  .task-row:hover { background: var(--claudeMist); border-left-color: var(--claude); }
  .task-row:hover .task-title { color: var(--claude); font-weight: 600; }
  .task-row.done { opacity: 0.7; background: rgba(220,252,231,0.3); }
  .task-row.done .task-title { color: var(--muted); text-decoration: line-through; }
  .checkbox { width: 14px; height: 14px; border-radius: 3px; cursor: pointer; flex-shrink: 0; border: 1.5px solid var(--hair); background: transparent; display: inline-flex; align-items: center; justify-content: center; transition: all 0.15s ease; }
  .checkbox.checked { border-color: var(--sage); background: var(--sage); }
  .pdot { display: inline-block; width: 6px; height: 6px; border-radius: 999px; flex-shrink: 0; }
  .pdot.urgent { background: var(--amberLight); box-shadow: 0 0 0 2px rgba(217,119,6,0.13); }
  .pdot.normal { background: var(--gold); box-shadow: 0 0 0 2px rgba(168,132,69,0.13); }
  .pdot.relax  { background: var(--sageLight); box-shadow: 0 0 0 2px rgba(22,163,74,0.13); }
  .task-title { flex: 1 1 0; min-width: 0; font-size: 12px; color: var(--ink); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 500; line-height: 1.3; transition: color 0.13s ease; }
  .date-badge { font-size: 9.5px; font-family: var(--fm); font-weight: 700; color: var(--muted); white-space: nowrap; flex-shrink: 0; }
  .date-badge.overdue { color: var(--amber); }
  .date-badge.done { font-size: 9px; padding: 2px 5px; border-radius: 3px; display: inline-flex; align-items: center; gap: 3px; background: var(--sageMist); border: 1px solid var(--sageHaze); }
  .date-badge.done.late { background: var(--amberMist); border-color: var(--amberHaze); }
  .status-pill { font-size: 7.5px; font-weight: 800; padding: 1px 3px; border-radius: 2px; color: #fff; letter-spacing: 0.04em; }
  .ico-btn { cursor: pointer; flex-shrink: 0; line-height: 1; text-align: center; transition: color 0.13s ease; color: var(--faded); }
  .ico-btn.edit { font-size: 11px; font-weight: 700; width: 14px; }
  .ico-btn.del  { font-size: 11px; font-weight: 500; width: 13px; }
  .task-row:hover .ico-btn.edit { color: var(--navy); }
  .task-row:hover .ico-btn.del { color: var(--amber); }
  .empty-state { padding: 30px 10px; text-align: center; color: var(--faded); font-size: 11px; font-style: italic; }
  .legend { margin-top: 6px; padding-top: 5px; border-top: 1px dashed var(--hairSoft); display: flex; flex-wrap: wrap; gap: 3px 11px; font-size: 9px; color: var(--faded); align-items: center; }
  .legend .claude-tag { color: var(--claude); font-weight: 700; }

  .right-col { display: flex; flex-direction: column; gap: 7px; min-width: 0; }
  .day-card { padding: 8px 10px; border-radius: 9px; border: 1px solid var(--hair); background: var(--surface); }
  .day-card.companyOff { background: linear-gradient(135deg, #FEF3C7 0%, #FDE68A 100%); border-color: var(--amberLight); }
  .day-card.holiday { background: linear-gradient(135deg, #FFFBEB 0%, #FEF3C7 100%); border-color: var(--amberHaze); }
  .day-card.today { background: linear-gradient(135deg, #FDF2F8 0%, #FCE7F3 100%); border-color: var(--rose); }
  .day-card.openday { background: linear-gradient(135deg, #F0FDF4 0%, #DCFCE7 100%); border-color: var(--sageLight); }
  .day-card-row { display: flex; align-items: center; gap: 9px; justify-content: space-between; }
  .day-card-l { display: flex; gap: 8px; align-items: center; min-width: 0; }
  .day-bar { width: 3px; height: 28px; border-radius: 2px; flex-shrink: 0; background: var(--navy); }
  .day-bar.amber { background: var(--amber); }
  .day-bar.rose { background: var(--rose); }
  .day-bar.sage { background: var(--sage); }
  .day-info { min-width: 0; }
  .day-wkk { font-size: 8px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; line-height: 1; margin-bottom: 3px; }
  .day-wkk.navy { color: var(--navy); }
  .day-wkk.amber { color: var(--amber); }
  .day-wkk.rose { color: var(--rose); }
  .day-wkk.sage { color: var(--sage); }
  .day-date { font-size: 16px; font-weight: 800; line-height: 1; letter-spacing: -0.03em; font-family: var(--fm); color: var(--ink); white-space: nowrap; }
  .day-wkkr { font-size: 10px; color: var(--muted); margin-left: 5px; font-family: var(--fd); font-weight: 600; }
  .day-tag { font-size: 9px; font-weight: 700; padding: 2px 7px; color: var(--surface); border-radius: 99px; letter-spacing: 0.05em; flex-shrink: 0; white-space: nowrap; }
  .day-tag.amber-bg { background: var(--amber); }
  .day-tag.amberLight-bg { background: var(--amberLight); }
  .day-tag.rose-bg { background: var(--rose); }
  .day-tag.sage-bg { background: var(--sage); }

  .hour-block { display: grid; grid-template-columns: 78px minmax(0, 1fr); gap: 6px; padding: 3px 7px; border-radius: 4px; align-items: center; min-height: 22px; border-left: 2px solid var(--navy); }
  .hour-block + .hour-block { margin-top: 2px; }
  .hour-block.meeting { border-left-color: var(--navy); background: var(--navyMist); }
  .hour-block.task { background: var(--surface); }
  .hour-block.task.urgent { border-left-color: var(--amberLight); }
  .hour-block.task.normal { border-left-color: var(--gold); }
  .hour-block.lunch { border-left-color: var(--faded); background: var(--surfaceMute); }
  .hour-block.buffer { border-left-color: var(--goldLight); background: var(--goldHaze); }
  .hour-block.flex { border-left-color: var(--sageLight); background: var(--sageMist); border: 1px dashed var(--sageHaze); border-left: 2px dashed var(--sageLight); }
  .hb-time { font-size: 9.5px; font-weight: 700; color: var(--ink); font-family: var(--fm); letter-spacing: -0.02em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .hb-time .arrow { color: var(--faded); }
  .hb-content { display: flex; align-items: center; gap: 5px; min-width: 0; overflow: hidden; }
  .hb-chip { font-size: 8px; font-weight: 800; padding: 1px 5px; border-radius: 2px; letter-spacing: 0.06em; flex-shrink: 0; }
  .hb-chip.meeting { background: var(--navy); color: #fff; }
  .hb-chip.lunch { background: var(--surfaceMute); color: var(--muted); border: 1px solid var(--hair); font-weight: 700; }
  .hb-chip.buffer { background: transparent; color: var(--gold); border: 1px solid var(--goldLight); font-weight: 700; }
  .hb-chip.flex { background: transparent; color: var(--sage); border: 1px dashed var(--sageLight); font-weight: 700; }
  .hb-title { flex: 1 1 0; min-width: 0; font-size: 10.5px; color: var(--ink); font-weight: 500; line-height: 1.3; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .hb-title.meeting { font-weight: 700; }
  .hb-title.lunch { color: var(--muted); font-style: italic; }
  .hb-loc { color: var(--muted); margin-left: 4px; font-size: 9.5px; font-style: italic; }
  .hb-note { color: var(--muted); margin-left: 4px; font-size: 9.5px; font-family: var(--fm); }
  .openday-banner { background: var(--sageMist); border: 1px solid var(--sageHaze); border-radius: 5px; padding: 5px 8px; margin-bottom: 5px; font-size: 9.5px; color: var(--sage); font-weight: 600; display: flex; align-items: center; gap: 6px; }
  .rest-card { padding: 18px 10px; text-align: center; background: linear-gradient(135deg, var(--amberMist) 0%, var(--amberHaze) 100%); border-radius: 7px; border: 1px dashed var(--amberLight); }
  .rest-icon { font-size: 24px; margin-bottom: 4px; line-height: 1; }
  .rest-title { font-size: 12px; font-weight: 800; color: var(--amber); margin-bottom: 3px; }
  .rest-sub { font-size: 10px; color: var(--amber); font-weight: 500; opacity: 0.85; }

  .edit-row { padding: 6px 6px; background: var(--navyMist); border-left: 2px solid var(--navy); border-bottom: 1px solid var(--hairSoft); border-radius: 4px; margin: 1px 0; box-shadow: 0 2px 8px -3px rgba(14,40,65,0.2); }
  .edit-grid { display: grid; grid-template-columns: 14px 1fr 24px 24px; gap: 6px; align-items: center; margin-bottom: 5px; }
  .edit-meta { display: flex; gap: 6px; align-items: center; padding-left: 20px; flex-wrap: wrap; }
  .edit-inp { width: 100%; height: 24px; padding: 0 8px; font-size: 11.5px; border: 1px solid var(--hair); border-radius: 4px; background: var(--surface); font-family: inherit; color: var(--ink); outline: none; }
  .edit-btn { width: 24px; height: 24px; border-radius: 4px; cursor: pointer; font-weight: 700; display: flex; align-items: center; justify-content: center; font-family: inherit; flex-shrink: 0; }
  .edit-btn.save { background: var(--sage); color: #fff; border: none; font-size: 12px; }
  .edit-btn.cancel { background: var(--surface); color: var(--muted); border: 1px solid var(--hair); font-size: 11px; }

  /* 모달 */
  .modal-backdrop { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(14,40,65,0.4); backdrop-filter: blur(3px); display: flex; align-items: center; justify-content: center; z-index: 999; padding: 16px; }
  .modal { background: var(--surface); border-radius: 12px; padding: 18px; max-width: 600px; width: 100%; box-shadow: 0 20px 60px -10px rgba(0,0,0,0.3); max-height: 90vh; overflow-y: auto; }
  .modal-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; padding-bottom: 10px; border-bottom: 1px solid var(--hairSoft); }
  .modal-title { font-size: 14px; font-weight: 800; color: var(--ink); flex: 1; }
  .modal-close { width: 24px; height: 24px; border-radius: 4px; border: 1px solid var(--hair); background: var(--surface); cursor: pointer; font-size: 13px; color: var(--muted); }
  .modal-body { display: flex; flex-direction: column; gap: 10px; }
  .modal-info { font-size: 11px; color: var(--muted); line-height: 1.5; }
  .modal-textarea { width: 100%; min-height: 100px; padding: 10px; border: 1px solid var(--hair); border-radius: 6px; font-family: var(--fm); font-size: 11px; color: var(--ink); resize: vertical; outline: none; background: var(--surfaceLow); }
  .modal-textarea:focus { border-color: var(--claude); background: var(--surface); }
  .modal-input { width: 100%; height: 32px; padding: 0 10px; font-size: 12px; border: 1px solid var(--hair); border-radius: 6px; font-family: var(--fm); color: var(--ink); outline: none; background: var(--surface); }
  .modal-input:focus { border-color: var(--navy); }
  .modal-input.password { font-family: var(--fm); }
  .modal-label { font-size: 10px; font-weight: 700; color: var(--ink); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 4px; }
  .modal-actions { display: flex; gap: 6px; justify-content: flex-end; margin-top: 8px; flex-wrap: wrap; }
  .modal-btn { height: 32px; padding: 0 14px; font-size: 12px; font-weight: 700; border-radius: 6px; cursor: pointer; font-family: inherit; }
  .modal-btn.primary { background: var(--claude); color: #fff; border: none; }
  .modal-btn.secondary { background: var(--surface); color: var(--muted); border: 1px solid var(--hair); }
  .modal-btn.danger { background: var(--surface); color: var(--amber); border: 1px solid var(--amberLight); }
  .modal-btn.github { background: var(--github); color: #fff; border: none; }

  /* 설정 모달 */
  .setup-step { padding: 10px 12px; border: 1px solid var(--hair); border-radius: 8px; background: var(--surfaceLow); }
  .setup-step-title { font-size: 11px; font-weight: 800; color: var(--ink); margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }

// ── localStorage 영속화 ──
function loadTasks() {
  try { const raw = localStorage.getItem(STORAGE_KEY); if (raw) { const p = JSON.parse(raw); if (Array.isArray(p) && p.length > 0) return p; } } catch (e) {}
  return SEED_TASKS.slice();
}
function saveTasksLocal() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks)); showSaveIndicator(); } catch (e) {}
}
function saveTasks() { saveTasksLocal(); debouncedPushToGist(); }
function resetTasks() {
  if (!confirm("초기 상태(시드 10건)로 되돌리시겠습니까?")) return;
  tasks = SEED_TASKS.slice(); saveTasks(); render(); showToast("초기 상태로 복원됨", "success");
}
let saveTimer = null;
function showSaveIndicator() {
  const el = document.querySelector(".save-indicator"); if (!el) return;
  el.classList.add("show");
  if (saveTimer) clearTimeout(saveTimer);
  saveTimer = setTimeout(() => el.classList.remove("show"), 1200);
}

// ── Gist 설정 ──
function loadGistConfig() {
  try { const raw = localStorage.getItem(GIST_CONFIG_KEY); return raw ? JSON.parse(raw) : null; } catch (e) { return null; }
}
function saveGistConfig(cfg) { localStorage.setItem(GIST_CONFIG_KEY, JSON.stringify(cfg)); }
function clearGistConfig() { localStorage.removeItem(GIST_CONFIG_KEY); }
function isGistConfigured() { const c = loadGistConfig(); return !!(c && c.gistId && c.pat); }

// ── Gist 동기화 ──
let gistETag = null;
let lastGistUpdatedAt = null;
let pushInProgress = false;

async function pullFromGist(force) {
  const cfg = loadGistConfig();
  if (!cfg || !cfg.gistId) return null;
  try {
    setSyncStatus("syncing");
    const headers = { "Accept": "application/vnd.github+json" };
    if (cfg.pat) headers["Authorization"] = "token " + cfg.pat;
    if (gistETag && !force) headers["If-None-Match"] = gistETag;
    const resp = await fetch("https://api.github.com/gists/" + cfg.gistId, { headers });
    if (resp.status === 304) { setSyncStatus("synced"); return { unchanged: true }; }
    if (!resp.ok) {
      let msg = "HTTP " + resp.status;
      try { const err = await resp.json(); msg = err.message || msg; } catch (e) {}
      throw new Error(msg);
    }
    gistETag = resp.headers.get("ETag");
    const data = await resp.json();
    const filename = cfg.filename || "data.json";
    const file = data.files[filename];
    if (!file) throw new Error("파일 없음: " + filename);
    let parsed;
    try { parsed = JSON.parse(file.content); } catch (e) { throw new Error("JSON 파싱 실패"); }
    setSyncStatus("synced");
    return {
      tasks: parsed.tasks || [],
      updatedAt: parsed.updatedAt || data.updated_at,
      device: parsed.device || "?",
      gistUpdatedAt: data.updated_at,
      raw: data
    };
  } catch (err) {
    console.error("pullFromGist failed:", err);
    setSyncStatus("error", err.message);
    return null;
  }
}

async function pushToGist() {
  const cfg = loadGistConfig();
  if (!cfg || !cfg.gistId || !cfg.pat) return false;
  if (pushInProgress) return false;
  pushInProgress = true;
  try {
    setSyncStatus("syncing");
    const filename = cfg.filename || "data.json";
    const payload = {
      version: "S1",
      updatedAt: new Date().toISOString(),
      device: cfg.device || "unknown",
      tasks: tasks
    };
    const body = { files: {} };
    body.files[filename] = { content: JSON.stringify(payload, null, 2) };
    const resp = await fetch("https://api.github.com/gists/" + cfg.gistId, {
      method: "PATCH",
      headers: { "Authorization": "token " + cfg.pat, "Accept": "application/vnd.github+json", "Content-Type": "application/json" },
      body: JSON.stringify(body)
    });
    if (!resp.ok) {
      let msg = "HTTP " + resp.status;
      try { const err = await resp.json(); msg = err.message || msg; } catch (e) {}
      throw new Error(msg);
    }
    gistETag = resp.headers.get("ETag");
    lastGistUpdatedAt = payload.updatedAt;
    setSyncStatus("synced");
    return true;
  } catch (err) {
    console.error("pushToGist failed:", err);
    setSyncStatus("error", err.message);
    return false;
  } finally {
    pushInProgress = false;
  }
}

let pushTimer = null;
function debouncedPushToGist() {
  if (!isGistConfigured()) return;
  if (pushTimer) clearTimeout(pushTimer);
  pushTimer = setTimeout(() => { pushToGist(); }, DEBOUNCE_PUSH_MS);
}

let pollTimer = null;
function startPolling() {
  if (pollTimer) clearInterval(pollTimer);
  pollTimer = setInterval(async () => {
    if (!isGistConfigured()) return;
    if (pushInProgress) return;
    if (pushTimer) return; // 푸시 대기 중일 때는 폴링 스킵
    const result = await pullFromGist(false);
    if (!result || result.unchanged) return;
    if (result.updatedAt && lastGistUpdatedAt && result.updatedAt <= lastGistUpdatedAt) return;
    if (JSON.stringify(result.tasks) === JSON.stringify(tasks)) {
      lastGistUpdatedAt = result.updatedAt; return;
    }
    tasks = result.tasks;
    lastGistUpdatedAt = result.updatedAt;
    saveTasksLocal();
    render();
    showToast("☁ Gist에서 " + result.tasks.length + "건 동기화됨 (" + (result.device || "?") + ")", "success");
  }, POLL_INTERVAL_MS);
}

function setSyncStatus(status, msg) {
  syncStatus = status;
  syncStatusMsg = msg || "";
  const el = document.querySelector(".sync-status");
  if (el) {
    el.className = "sync-status " + status;
    const dot = el.querySelector(".sync-dot");
    if (dot) dot.className = "sync-dot " + status;
    const text = el.querySelector(".sync-text");
    if (text) text.textContent = ({ unconfigured: "미연결", syncing: "동기화 중", synced: "동기화됨", error: "오류" })[status] || "?";
    if (msg) el.title = msg;
  }
}

let syncStatus = "unconfigured";
let syncStatusMsg = "";

// ── 동기화 코드 (S1: 형식, 수동 복사용) ──
function encodeState() {
  const compact = tasks.map(function (t) { return [t.id, t.p === "긴급" ? 0 : t.p === "보통" ? 1 : 2, t.title, t.due || "", t.createdAt || "", t.done ? 1 : 0, t.completedAt || ""]; });
  return SYNC_VERSION + ":" + btoa(unescape(encodeURIComponent(JSON.stringify(compact))));
}
function decodeState(code) {
  if (!code || typeof code !== "string") throw new Error("코드가 비어있습니다");
  let body = code.trim();
  if (body.indexOf(SYNC_VERSION + ":") === 0) body = body.substring(SYNC_VERSION.length + 1);
  const hashIdx = body.indexOf("#s=");
  if (hashIdx >= 0) body = body.substring(hashIdx + 3);
  body = body.split(/\s/)[0];
  if (!body) throw new Error("디코딩할 데이터 없음");
  const compact = JSON.parse(decodeURIComponent(escape(atob(body))));
  if (!Array.isArray(compact)) throw new Error("배열이 아님");
  return compact.map(function (c) { return { id: c[0], p: c[1] === 0 ? "긴급" : c[1] === 1 ? "보통" : "여유", title: c[2], due: c[3] || null, createdAt: c[4] || null, done: c[5] === 1, completedAt: c[6] || null }; });
}

function copySyncCode() {
  const code = encodeState();
  navigator.clipboard.writeText(code).then(() => showToast("📤 동기화 코드 복사됨", "success")).catch(() => showImportModal("복사", code, true));
}
function copyGistApiUrl() {
  const cfg = loadGistConfig();
  if (!cfg || !cfg.gistId) { showToast("Gist 미설정", "error"); return; }
  const url = "https://api.github.com/gists/" + cfg.gistId;
  navigator.clipboard.writeText(url).then(() => showToast("🔗 Gist API URL 복사됨 (Claude에 붙여넣기)", "success")).catch(() => showImportModal("복사", url, true));
}
function importSyncCode() { showImportModal(); }

function showImportModal(mode, prefill, readonly) {
  mode = mode || "import"; const isReadonly = !!readonly;
  const host = document.getElementById("modal-host");
  const title = isReadonly ? "📋 동기화 코드/URL" : "📥 Claude 동기화 코드 붙여넣기";
  const info = isReadonly ? "아래 텍스트를 복사해 Claude 채팅에 붙여넣으세요." : "Claude가 출력한 S1: 코드 또는 URL을 붙여넣으세요. 현재 데이터는 덮어써집니다.";
  host.innerHTML =
    '<div class="modal-backdrop" onclick="closeModal(event)">' +
      '<div class="modal" onclick="event.stopPropagation()">' +
        '<div class="modal-header"><div class="modal-title">' + title + '</div><button class="modal-close" onclick="closeModal()">✕</button></div>' +
        '<div class="modal-body">' +
          '<div class="modal-info">' + info + '</div>' +
          '<textarea class="modal-textarea" id="sync-textarea" placeholder="' + (isReadonly ? '' : 'S1:eyJrIjoxLCJ...') + '" ' + (isReadonly ? 'readonly' : '') + '>' + (prefill || "") + '</textarea>' +
          '<div class="modal-actions">' +
            (isReadonly ? '<button class="modal-btn secondary" onclick="closeModal()">닫기</button><button class="modal-btn primary" onclick="copyTextarea()">📋 복사</button>' : '<button class="modal-btn secondary" onclick="closeModal()">취소</button><button class="modal-btn primary" onclick="applyImport()">적용</button>') +
          '</div>' +
        '</div>' +
      '</div>' +
    '</div>';
  setTimeout(() => { const ta = document.getElementById("sync-textarea"); if (ta) { if (isReadonly) ta.select(); else ta.focus(); } }, 50);
}

function closeModal(e) { if (e && e.target && !e.target.classList.contains("modal-backdrop")) return; document.getElementById("modal-host").innerHTML = ""; }
function copyTextarea() { const ta = document.getElementById("sync-textarea"); if (!ta) return; ta.select(); document.execCommand("copy"); showToast("📋 복사됨", "success"); closeModal(); }
function applyImport() {
  const ta = document.getElementById("sync-textarea"); if (!ta) return;
  const code = ta.value.trim(); if (!code) { showToast("코드가 비어있음", "error"); return; }
  try {
    const incoming = decodeState(code);
    if (!Array.isArray(incoming) || incoming.length === 0) throw new Error("유효하지 않은 코드");
    tasks = incoming; saveTasks(); closeModal(); render();
    showToast("✓ Claude 데이터 적용됨 (" + incoming.length + "건)", "success");
  } catch (err) { showToast("❌ 파싱 실패: " + err.message, "error"); }
}

function showToast(msg, kind) {
  const host = document.getElementById("toast-host");
  const klass = kind === "error" ? "error" : kind === "success" ? "success" : "info";
  host.innerHTML = '<div class="toast ' + klass + '">' + msg + '</div>';
  const el = host.querySelector(".toast");
  setTimeout(() => el.classList.add("show"), 10);
  setTimeout(() => el.classList.remove("show"), 2800);
  setTimeout(() => host.innerHTML = "", 3200);
}

function showSettingsModal() {
  const cfg = loadGistConfig() || {};

async function testAndSaveGist() {
  const gistId = document.getElementById("cfg-gistId").value.trim();
  const pat = document.getElementById("cfg-pat").value.trim();
  const filename = document.getElementById("cfg-filename").value.trim() || "data.json";
  const device = document.getElementById("cfg-device").value.trim() || "unknown";
  if (!gistId) { showToast("Gist ID 필요", "error"); return; }
  if (!pat) { showToast("PAT 필요 (쓰기용)", "error"); return; }
  showToast("🔌 연결 테스트 중...", "info");
  try {
    const resp = await fetch("https://api.github.com/gists/" + gistId, { headers: { "Authorization": "token " + pat, "Accept": "application/vnd.github+json" } });
    if (!resp.ok) {
      let msg = "HTTP " + resp.status;
      try { const err = await resp.json(); msg = err.message || msg; } catch (e) {}
      throw new Error(msg);
    }
    const data = await resp.json();
    const file = data.files[filename];
    saveGistConfig({ gistId, pat, filename, device });
    closeModal();
    if (file) {
      let remoteData = null;
      try { remoteData = JSON.parse(file.content); } catch (e) {}
      if (remoteData && Array.isArray(remoteData.tasks) && remoteData.tasks.length > 0) {
        if (confirm("Gist에 " + remoteData.tasks.length + "건의 데이터가 있습니다.\n[OK] = Gist 데이터로 덮어쓰기 (다른 기기와 동기화)\n[취소] = 로컬 데이터를 Gist에 푸시 (현재 기기 데이터 유지)")) {
          tasks = remoteData.tasks; saveTasksLocal(); lastGistUpdatedAt = remoteData.updatedAt;
          showToast("✓ Gist에서 " + tasks.length + "건 가져옴", "success"); render();
        } else { await pushToGist(); showToast("✓ 로컬 " + tasks.length + "건을 Gist에 푸시", "success"); }
      } else { await pushToGist(); showToast("✓ 초기 푸시 완료 (" + tasks.length + "건)", "success"); }
    } else { await pushToGist(); showToast("✓ " + filename + " 신규 생성 완료", "success"); }
    startPolling(); render();
  } catch (err) { showToast("❌ 연결 실패: " + err.message, "error"); }
}

function disconnectGist() {
  if (!confirm("Gist 연결을 해제하시겠습니까?\n로컬 데이터는 유지됩니다.")) return;
  clearGistConfig();
  if (pollTimer) clearInterval(pollTimer);
  setSyncStatus("unconfigured");
  closeModal(); render();
  showToast("Gist 연결 해제됨", "info");
}

async function manualSync() {
  if (!isGistConfigured()) { showSettingsModal(); return; }
  showToast("🔄 수동 동기화 중...", "info");
  const result = await pullFromGist(true);
  if (!result) return;
  if (result.unchanged) { showToast("✓ 이미 최신 상태", "success"); return; }
  if (JSON.stringify(result.tasks) !== JSON.stringify(tasks)) {
    if (confirm("Gist 데이터가 다릅니다. Gist 데이터로 덮어쓰시겠습니까?\n[OK] = 가져오기 / [취소] = 로컬을 Gist에 푸시")) {
      tasks = result.tasks; lastGistUpdatedAt = result.updatedAt; saveTasksLocal(); render();
      showToast("✓ Gist에서 " + tasks.length + "건 가져옴", "success");
    } else { await pushToGist(); showToast("✓ 로컬 " + tasks.length + "건을 Gist에 푸시", "success"); }
  } else { showToast("✓ 동기화됨 (변경 없음)", "success"); }
}

function dateBadgeHtml(t) {
  if (t.done) {
    const delta = daysDiff(t.due, t.completedAt);

    let lbl = ""; if (delta === 0) lbl = "정시"; else if (isEarly) lbl = "D-" + Math.abs(delta); else if (isLate) lbl = "D+" + delta;

    return '<span class="date-badge done ' + (isLate?"late":"") + '"><span style="color:var(--muted)">' + fmtDue(t.due) + '</span><span style="color:' + c + '">→</span><span style="color:' + c + '">' + fmtDue(t.completedAt) + '</span>' + (lbl?'<span class="status-pill" style="background:' + c + '">' + lbl + '</span>':"") + '</span>';
  }
  const dd = daysBetween(t.due);
  const overdue = dd !== null && dd < 0;
  return '<span class="date-badge ' + (overdue?"overdue":"") + '">' + fmtDue(t.due) + (overdue?' +' + Math.abs(dd) + 'd':"") + '</span>';
}

        '<div class="st"><div class="st-l"><div class="st-bar navy"></div><div><div class="st-k navy">Tasks · → Claude</div><div class="st-t">할 일</div></div></div><div class="st-r"><div class="st-c navy">' + filtered.length + '</div><div class="st-h">' + (state.editingId ? "Edit" : state.filter !== "전체" ? state.filter : "Tap → Claude") + '</div></div></div>' +
        '<div class="task-list">' + taskListHtml + '</div>' +
        '<div class="legend"><span>☐ 완료</span><span class="claude-tag">📎 클릭=Claude↗</span><span>✎ 수정</span><span>✕ 삭제</span><span style="margin-left:auto;color:var(--sage);font-weight:700">' + (isConfigured ? "☁ Gist 동기화 중" : "💾 로컬 저장") + '</span></div>' +
      '</div>' +
      '<div class="right-col">' +
        '<div class="day-card ' + dayCardClass + '">' +
          '<div class="day-card-row"><div class="day-card-l"><div class="day-bar ' + dayBarClass + '"></div><div class="day-info"><div class="day-wkk ' + dayKickerClass + '">' + selected.weekday + '</div><div class="day-date">' + selected.date + '<span class="day-wkkr">' + selected.weekdayKr + '</span></div></div></div>' +
          (selected.isCompanyOff ? '<span class="day-tag amber-bg">⚠ 공동연차</span>' : selected.isHoliday ? '<span class="day-tag amberLight-bg">🎉 ' + selected.holidayName + '</span>' : selected.isToday ? '<span class="day-tag rose-bg">오늘</span>' : selected.isOpenDay ? '<span class="day-tag sage-bg">✓ 회의 없음</span>' : "") + '</div>' +
        '</div>' +
        '<div class="card">' +
          '<div class="st"><div class="st-l"><div class="st-bar sage"></div><div><div class="st-k sage">Hourly Plan</div><div class="st-t">시간대별 일과</div></div></div><div class="st-r"><div class="st-c sage">' + (selected.hourly && selected.hourly.kind === "blocks" ? selected.hourly.blocks.length : 0) + '</div><div class="st-h">' + (selected.hourly && selected.hourly.kind === "blocks" ? (selected.isOpenDay ? "자율 " + flexCount + " · 정리 " + (meetingCount + taskCount) : "회의" + meetingCount + "·업무" + taskCount) : "REST") + '</div></div></div>' +
          (selected.isOpenDay ? '<div class="openday-banner">💡 Outlook 회의 없음 — 자율 일정 권장 블록</div>' : "") +
          (selected.hourly && selected.hourly.kind === "blocks" ? '<div>' + selected.hourly.blocks.map((b) => hourBlockHtml(b)).join("") + '</div>' : '<div class="rest-card"><div class="rest-icon">' + (selected.hourly && selected.hourly.icon || "🌿") + '</div><div class="rest-title">' + esc(selected.hourly && selected.hourly.title || "휴무") + '</div><div class="rest-sub">' + esc(selected.hourly && selected.hourly.sub || "") + '</div></div>') +
        '</div>' +
      '</div>' +
    '</div>' +
    '<div class="footer"><span class="footer-brand">KOLON BENIT · 데이터분석팀</span><span class="footer-meta">' + (isConfigured ? "☁ Gist Cloud Sync" : "💾 Local-only") + ' · v20</span></div>';

  if (state.editingId) { const inp = document.getElementById("e-title"); if (inp) { inp.focus(); inp.setSelectionRange(inp.value.length, inp.value.length); } }
}

// ── 초기화 ──
async function bootstrap() {
  render();
  if (isGistConfigured()) {
    setSyncStatus("syncing");
    const result = await pullFromGist(true);
    if (result && !result.unchanged) {
      if (result.tasks.length > 0 && JSON.stringify(result.tasks) !== JSON.stringify(tasks)) {
        tasks = result.tasks; lastGistUpdatedAt = result.updatedAt; saveTasksLocal(); render();
        showToast("☁ Gist에서 " + tasks.length + "건 로드됨", "success");
      }
    }
    startPolling();
  } else { setSyncStatus("unconfigured"); }
}
bootstrap();
</script>
</body>
</html>
