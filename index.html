<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#F5F7FA" />
<title>Sir's Tasks · v27</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" rel="stylesheet">
<style>
:root{
/* Foundation — Cool slate neutrals */
--bg:#F5F7FA;--surface:#FFFFFF;--surface-2:#EBEEF3;
--hair:#DDE2EA;--hair-soft:#F0F2F6;--hair-d:#B8C0CD;
/* Text — Cool slate */
--t1:#0F172A;--t2:#475569;--t3:#94A3B8;--t-inv:#F5F7FA;
/* Vibrant jewel tones — Linear-inspired */
--c-red:#E11D48;--c-red-s:#FFE4E6;            /* Rose 600 — vivid magenta-red */
--c-emr:#4F46E5;--c-emr-s:#EEF2FF;            /* Indigo 600 — Linear vibrant */
--c-saf:#06B6D4;--c-saf-s:#ECFEFF;            /* Cyan 500 — electric */
--c-teal:#0EA5E9;--c-teal-s:#E0F2FE;          /* Sky 500 — vivid info */
--c-violet:#8B5CF6;--c-violet-s:#EDE9FE;      /* Violet 500 — extra accent */
--c-grn:#4F46E5;--c-grn-s:#EEF2FF;            /* Success = Indigo */
--c-blue:#0EA5E9;                              /* Info = Sky */
/* Due-chip gradients */
--grad-due-default:linear-gradient(135deg,#1E293B 0%,#4F46E5 100%);
--grad-due-urgent:linear-gradient(135deg,#9F1239 0%,#E11D48 100%);
--grad-due-overdue:linear-gradient(135deg,#881337 0%,#BE123C 100%);
--grad-due-high:linear-gradient(135deg,#312E81 0%,#4F46E5 100%);
--grad-due-normal:linear-gradient(135deg,#475569 0%,#64748B 100%);
--shadow-sm:0 1px 2px rgba(15,23,42,.04);
--shadow-md:0 1px 3px rgba(15,23,42,.06),0 4px 12px rgba(15,23,42,.04);
--shadow-lg:0 8px 28px rgba(15,23,42,.10);
--font-sans:'Pretendard Variable',Pretendard,-apple-system,BlinkMacSystemFont,sans-serif;
--font-mono:ui-monospace,SFMono-Regular,"SF Mono",Menlo,Consolas,monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:var(--font-sans);background:var(--bg);color:var(--t1);font-size:13px;line-height:1.5;font-feature-settings:"ss01","tnum";-webkit-font-smoothing:antialiased;overflow-x:hidden}
button{font:inherit;cursor:pointer;border:none;background:none;color:inherit}
.app{max-width:1280px;margin:0 auto;padding:24px 28px 36px}
.top{background:var(--surface);border:1px solid var(--hair);border-radius:14px;padding:14px 20px;display:grid;grid-template-columns:auto 1fr auto;gap:18px;align-items:center;margin-bottom:18px;box-shadow:var(--shadow-sm)}
.top-brand{display:flex;align-items:baseline;gap:10px}
.top-brand .ey{font-family:var(--font-mono);font-size:10px;font-weight:600;letter-spacing:.2em;color:var(--t3);text-transform:uppercase}
.top-brand .ti{font-size:18px;font-weight:700;color:var(--t1);letter-spacing:-.02em}
.top-brand .dt{font-family:var(--font-mono);font-size:12px;color:var(--t3);letter-spacing:.04em;margin-left:6px}
.top-input{display:flex;align-items:center;gap:8px;padding:6px 10px 6px 14px;border-radius:8px;background:var(--surface-2);border:1px solid transparent;transition:all 120ms;flex-wrap:wrap}
.top-input:focus-within{border-color:var(--hair-d);background:var(--surface)}
.top-input .plus{color:var(--t3);font-size:16px;font-weight:300}
.top-input input[type=text]{flex:1;border:none;outline:none;background:transparent;font:inherit;color:var(--t1);font-size:13px;min-width:120px;padding:4px 0}
.top-input input[type=text]::placeholder{color:var(--t3)}
.input-extras{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.input-extras input[type=date]{padding:5px 10px;font:inherit;font-size:11.5px;border:1px solid var(--hair);border-radius:6px;background:var(--surface);color:var(--t1);outline:none;font-family:var(--font-mono);width:115px;cursor:pointer;transition:border-color 120ms}
.input-extras input[type=date]:hover{border-color:var(--hair-d)}
.input-extras select{padding:5px 8px;font:inherit;font-size:11.5px;border:1px solid var(--hair);border-radius:6px;background:var(--surface);outline:none;cursor:pointer;font-weight:600;color:var(--t1);transition:all 120ms}
.input-extras select:hover{border-color:var(--hair-d)}
.input-extras select.pri-urg{color:var(--c-red);border-color:#F4B7C9;background:var(--c-red-s)}
.input-extras select.pri-hi{color:var(--c-emr);border-color:#A8C3F0;background:var(--c-emr-s)}
.input-extras select.pri-norm{color:var(--t2);border-color:var(--hair);background:var(--surface)}
.top-actions{display:flex;gap:6px}
.top-icon{width:34px;height:34px;border-radius:8px;background:var(--surface);border:1px solid var(--hair);display:flex;align-items:center;justify-content:center;color:var(--t2);font-size:16px;transition:all 120ms}
.top-icon:hover{background:var(--surface-2);color:var(--t1);border-color:var(--hair-d)}
.filters{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.fbtn{padding:8px 14px;border-radius:8px;background:var(--surface);border:1px solid var(--hair);font-size:12.5px;font-weight:500;color:var(--t2);display:inline-flex;align-items:center;gap:8px;transition:all 120ms;box-shadow:var(--shadow-sm)}
.fbtn:hover{background:var(--surface-2);color:var(--t1);border-color:var(--hair-d)}
.fbtn.on{background:var(--t1);color:var(--t-inv);border-color:var(--t1);font-weight:600}
.fbtn .cnt{font-family:var(--font-mono);font-size:11px;font-weight:600;color:var(--t3);letter-spacing:-.02em}
.fbtn.on .cnt{color:rgba(247,246,243,.6)}
.fbtn.danger.on{background:var(--c-red);border-color:var(--c-red)}
.fbtn.success.on{background:var(--c-emr);border-color:var(--c-emr)}
.body{display:grid;grid-template-columns:1.6fr 1fr;gap:18px;align-items:start}
.tcol{background:var(--surface);border:1px solid var(--hair);border-radius:14px;padding:18px 20px;min-height:400px;box-shadow:var(--shadow-md)}
.tcol-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px}
.tcol-head .sort{font-size:11px;color:var(--t3);font-weight:500;font-family:var(--font-mono);letter-spacing:.04em;text-transform:uppercase}
.grp{margin-top:18px}.grp:first-child{margin-top:0}
.grp-h{display:flex;align-items:baseline;gap:8px;padding-bottom:8px;margin-bottom:2px}
.grp-h .dot{width:6px;height:6px;border-radius:50%}
.grp-h .lbl{font-size:13px;font-weight:600;color:var(--t1);letter-spacing:-.005em}
.grp-h .cnt{font-family:var(--font-mono);font-size:12px;color:var(--t3);font-weight:500}
.grp.overdue .dot{background:var(--c-red)}.grp.overdue .lbl{color:var(--c-red)}
.grp.today .dot{background:var(--c-emr)}.grp.today .lbl{color:var(--c-emr)}
.grp.week .dot{background:var(--c-saf)}.grp.week .lbl{color:var(--c-saf)}
.grp.later .dot,.grp.done .dot{background:var(--hair-d)}
.grp.later .lbl,.grp.done .lbl{color:var(--t3)}
.grp-tasks-scroll{max-height:200px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--hair-d) transparent;border-radius:0 0 8px 8px}
.grp-tasks-scroll::-webkit-scrollbar{width:6px}
.grp-tasks-scroll::-webkit-scrollbar-track{background:transparent}
.grp-tasks-scroll::-webkit-scrollbar-thumb{background:var(--hair-d);border-radius:3px;opacity:.5}
.grp-tasks-scroll::-webkit-scrollbar-thumb:hover{background:var(--t3)}
.tk{display:grid;grid-template-columns:18px 1fr auto;gap:14px;align-items:start;padding:13px 14px 13px 18px;border-bottom:1px solid var(--hair-soft);position:relative;cursor:pointer;transition:background 120ms}
.tk:last-child{border-bottom:none}.tk:hover{background:var(--surface-2)}
.tk::before{content:'';position:absolute;left:0;top:8px;bottom:8px;width:2px;border-radius:2px;background:transparent}
.tk.bar-red::before{background:var(--c-red)}
.tk.bar-amb::before{background:var(--c-emr)}
.tk.bar-grn::before{background:var(--c-saf)}
.tk.bar-mute::before{background:var(--hair-d)}
.cb{width:18px;height:18px;border:1.5px solid var(--hair-d);border-radius:5px;background:var(--surface);position:relative;margin-top:1px;flex-shrink:0;transition:all 120ms}
.tk:hover .cb{border-color:var(--c-emr)}
.cb.on{background:var(--c-emr);border-color:var(--c-emr)}
.cb.on::after{content:'';position:absolute;left:5px;top:1px;width:5px;height:9px;border:solid white;border-width:0 1.6px 1.6px 0;transform:rotate(45deg)}
.tk-body{min-width:0}
.tk-title{font-size:14px;font-weight:600;color:var(--t1);letter-spacing:-.01em;line-height:1.4;word-break:keep-all}
.tk.done .tk-title{color:var(--t3);text-decoration:line-through;text-decoration-color:var(--hair-d);font-weight:500}
.tk-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-top:6px;font-size:12px}
.due-chip{font-family:var(--font-mono);font-size:11px;font-weight:700;padding:3px 10px;border-radius:5px;letter-spacing:-.01em;color:white;display:inline-flex;align-items:center;gap:3px}
.due-chip.normal{background:var(--grad-due-normal);box-shadow:0 1px 2px rgba(100,116,139,.15)}
.due-chip.high{background:var(--grad-due-high);box-shadow:0 1px 3px rgba(79,70,229,.22)}
.due-chip.urgent{background:var(--grad-due-urgent);box-shadow:0 1px 3px rgba(225,29,72,.28)}
.due-chip.overdue{background:var(--grad-due-overdue);box-shadow:0 1px 4px rgba(190,18,60,.32)}
.created-mini{font-family:var(--font-mono);font-size:11px;color:var(--t3);letter-spacing:-.01em}
.overdue-mini{color:#BE123C;font-size:10.5px;font-weight:700;font-family:var(--font-mono);letter-spacing:-.02em;padding:2px 6px;background:#FFE4E6;border-radius:4px}
.created-chip{font-family:var(--font-mono);font-size:10.5px;color:var(--t2);background:var(--surface-2);padding:2px 7px;border-radius:4px;font-weight:500;letter-spacing:-.01em;border:1px solid var(--hair)}
.badge-overdue{display:inline-flex;align-items:center;gap:3px;background:var(--c-red);color:white;font-size:10.5px;font-weight:600;padding:2px 7px;border-radius:4px;letter-spacing:-.005em}
.pri-urg{color:var(--c-red);font-weight:600;font-size:12px}
.pri-hi{color:var(--c-emr);font-weight:600;font-size:12px}
.pri-norm{color:var(--t3);font-weight:500;font-size:12px}
.tk-meta .dotsep{color:var(--hair-d);font-size:10px}
.tk-meta .info{color:var(--t2);font-size:12px}
.tk-actions{display:flex;gap:4px;opacity:0;transition:opacity 120ms;align-items:center;margin-top:1px}
.tk:hover .tk-actions{opacity:1}
.tk-act{width:28px;height:28px;border-radius:6px;background:var(--surface-2);border:1px solid var(--hair);color:var(--t2);font-size:12px;display:flex;align-items:center;justify-content:center;transition:all 120ms}
.tk-act:hover{background:var(--surface);color:var(--t1);border-color:var(--hair-d)}
.empty{padding:48px 24px;text-align:center;color:var(--t3);font-size:13px}
.empty-i{font-size:32px;margin-bottom:12px;opacity:.4}
.today{background:var(--surface);border:1px solid var(--hair);border-radius:14px;padding:18px 20px;box-shadow:var(--shadow-md)}
.today-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;color:var(--t2)}
.today-h-l{display:flex;align-items:center;gap:6px}
.today-h .ic{font-size:13px}
.today-h .lbl{font-family:var(--font-mono);font-size:11px;font-weight:600;letter-spacing:.14em;text-transform:uppercase}
.today-h .today-jump{font-family:var(--font-mono);font-size:10px;color:var(--c-teal);font-weight:600;cursor:pointer;padding:2px 8px;border-radius:5px;border:1px solid var(--hair);background:var(--surface);transition:all 120ms}
.today-h .today-jump:hover{background:var(--c-teal-s);border-color:#A8CFE6}
.today-h .today-jump.hide{display:none}
.today-d{font-size:20px;font-weight:700;color:var(--t1);letter-spacing:-.02em;margin-bottom:14px}
.today-d .day-label{font-family:var(--font-mono);font-size:11px;font-weight:600;color:var(--t2);letter-spacing:.08em;margin-left:8px;text-transform:uppercase;vertical-align:2px}
.today-d .day-label.today{color:var(--c-red)}
.today-d .day-label.future{color:var(--c-emr)}
.today-d .day-label.past{color:var(--t3)}
.day-nav{display:flex;align-items:center;gap:6px;margin-bottom:14px;padding:6px;background:var(--surface-2);border-radius:10px}
.day-arrow{width:26px;height:26px;border-radius:6px;color:var(--t2);font-size:14px;font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 120ms}
.day-arrow:hover{background:var(--surface);color:var(--t1);box-shadow:var(--shadow-sm)}
.day-strip{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;flex:1}
.day-chip{display:flex;flex-direction:column;align-items:center;padding:5px 0 7px;border-radius:6px;cursor:pointer;transition:all 100ms;position:relative;background:transparent;color:inherit;border:none;font:inherit}
.day-chip:hover{background:var(--surface)}
.day-chip .dow{font-family:var(--font-mono);font-size:9px;font-weight:600;color:var(--t3);letter-spacing:.04em;margin-bottom:2px}
.day-chip .num{font-family:var(--font-mono);font-size:13px;font-weight:600;color:var(--t1);letter-spacing:-.02em;line-height:1}
.day-chip.today .num{color:var(--c-red);font-weight:700}
.day-chip.today .dow{color:var(--c-red)}
.day-chip.selected{background:var(--t1)}
.day-chip.selected .dow{color:rgba(255,255,255,.5)}
.day-chip.selected .num{color:white}
.day-chip.selected.today .num{color:#FCA5BD}
.day-chip.selected.today .dow{color:#FCA5BD}
.day-chip .ev-dot{position:absolute;bottom:3px;width:3px;height:3px;border-radius:50%;background:var(--c-emr)}
.day-chip.selected .ev-dot{background:white}
.day-chip.weekend .num{color:var(--t3)}
.day-chip.weekend.today .num{color:var(--c-red)}
.day-chip.weekend.selected .num{color:rgba(255,255,255,.7)}
.cap-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px;font-size:11.5px;flex-wrap:wrap;gap:4px}
.cap-row .l{color:var(--t2);font-weight:500}
.cap-row .r{color:var(--t2);display:flex;flex-wrap:wrap;gap:8px}
.allday-bar{display:flex;flex-wrap:wrap;gap:6px;padding:7px 10px;background:#D1FAE5;border:1px solid #6EE7B7;border-radius:8px;margin-bottom:10px;align-items:center}
.allday-bar .label{font-family:var(--font-mono);font-size:9.5px;font-weight:600;color:#059669;letter-spacing:.12em;text-transform:uppercase;margin-right:2px}
.allday-chip{display:inline-flex;align-items:center;padding:2px 8px;background:var(--surface);border-radius:4px;color:#059669;font-weight:600;font-size:11.5px;border:1px solid #6EE7B7;letter-spacing:-.005em}
.slot.slot-allday .slot-t{color:#059669;font-family:var(--font-mono);font-size:10px;font-weight:700;letter-spacing:.08em;padding-top:8px}
.slot.slot-allday .slot-c{background:#D1FAE5;border-left:3px solid #059669;color:#065F46;font-weight:600;padding-left:11px}
.cap-row .r .seg{display:inline-flex;align-items:center;gap:3px}
.cap-row .r .seg::before{content:'';width:8px;height:8px;border-radius:2px;display:inline-block}
.cap-row .r .seg.busy::before{background:var(--c-emr)}
.cap-row .r .seg.rec::before{background:var(--c-saf)}
.cap-row .r .seg.free::before{background:var(--hair-d)}
.cap-row .r .seg b{font-weight:700;color:var(--t1)}
.cap-bar{display:flex;height:5px;border-radius:3px;overflow:hidden;background:var(--surface-2);margin-bottom:14px}
.cap-seg{height:100%}
.cap-seg.busy{background:var(--c-emr)}
.cap-seg.rec{background:var(--c-saf)}
.cap-seg.lunch{background:var(--c-red)}
.cap-seg.free{background:var(--hair-d)}
.slots{display:flex;flex-direction:column;gap:5px;margin-bottom:0}
.slot{display:grid;grid-template-columns:40px 1fr;gap:8px;align-items:start;min-height:24px}
.slot-t{font-family:var(--font-mono);font-size:11px;color:var(--t3);letter-spacing:-.02em;padding-top:6px}
.slot-c{border-radius:6px;padding:6px 10px 6px 12px;font-size:12.5px;font-weight:500;color:var(--t1);display:flex;align-items:center;gap:8px;line-height:1.3;border-left:3px solid transparent}
.slot-c.event,.slot-c.teal,.slot-c.lime,.slot-c.beige,.slot-c.teal-d{background:var(--c-emr-s);color:var(--c-emr);border-left-color:var(--c-emr)}
.slot-c .cnum{font-family:var(--font-mono);font-size:10.5px;font-weight:600;letter-spacing:-.02em;color:var(--c-emr);opacity:.7}
.slot-c.rec{background:var(--surface);border:1px solid var(--hair);border-left:3px solid var(--c-saf);display:flex;flex-direction:column;align-items:stretch;padding:5px 6px 5px 10px;gap:2px;color:var(--t1)}
.rec-task{display:flex;align-items:center;gap:7px;font-size:12px;font-weight:500;padding:4px 6px;border-radius:5px;cursor:pointer;transition:background 100ms;color:var(--t1)}
.rec-task:hover{background:var(--c-saf-s)}
.rec-pri{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.rec-pri.urg{background:var(--c-red)}
.rec-pri.hi{background:var(--c-emr)}
.rec-pri.norm{background:var(--t3)}
.rec-title{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-weight:500}
.rec-dur{font-family:var(--font-mono);font-size:10px;color:var(--t3);flex-shrink:0;font-weight:500}
.rec-overdue{color:var(--c-red);font-weight:700;font-family:var(--font-mono);font-size:10px}
.slot-empty{padding:5px 0;font-size:11.5px;color:var(--t3);font-style:italic;font-family:var(--font-mono);letter-spacing:-.01em;margin-left:48px}
.foot{margin-top:18px;padding-top:12px;display:flex;justify-content:space-between;align-items:center;font-family:var(--font-mono);font-size:10px;color:var(--t3);letter-spacing:.04em}
.foot .acts{display:flex;gap:14px}
.foot .acts a{color:var(--t2);cursor:pointer;text-decoration:none;transition:color 120ms}.foot .acts a:hover{color:var(--c-teal)}
.foot .live{display:inline-flex;align-items:center;gap:5px}
.foot .live::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--c-emr)}
.modal-bg{position:fixed;inset:0;background:rgba(26,24,20,.4);display:none;align-items:center;justify-content:center;z-index:100;padding:20px}
.modal-bg.on{display:flex}
.modal{background:var(--surface);border-radius:14px;width:540px;max-width:100%;max-height:90vh;overflow-y:auto;border:1px solid var(--hair);box-shadow:var(--shadow-lg)}
.modal-h{padding:18px 22px 14px;border-bottom:1px solid var(--hair);display:flex;justify-content:space-between;align-items:center}
.modal-h .ti{font-size:15px;font-weight:700;color:var(--t1);letter-spacing:-.01em}
.modal-h .x{width:28px;height:28px;border-radius:6px;color:var(--t3);font-size:18px;display:flex;align-items:center;justify-content:center;transition:all 120ms}
.modal-h .x:hover{background:var(--surface-2);color:var(--t1)}
.modal-b{padding:18px 22px}
.modal-b h3{font-size:11px;font-weight:600;color:var(--t2);text-transform:uppercase;letter-spacing:.1em;margin:16px 0 8px;font-family:var(--font-mono)}
.modal-b h3:first-child{margin-top:0}
.modal-b p{font-size:12.5px;color:var(--t2);margin-bottom:8px;line-height:1.55}
.modal-b input[type=text],.modal-b input[type=url],.modal-b input[type=date]{width:100%;padding:10px 12px;border:1px solid var(--hair);border-radius:7px;font-size:13px;background:var(--surface-2);font-family:var(--font-sans);color:var(--t1);outline:none;transition:all 120ms}
.modal-b input[type=date]{font-family:var(--font-mono)}
.modal-b input:focus{background:var(--surface);border-color:var(--c-emr)}
.modal-actions{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;align-items:center}
.btn{padding:9px 16px;border-radius:7px;font-size:12.5px;font-weight:600;background:var(--t1);color:var(--t-inv);transition:all 120ms;letter-spacing:-.005em}
.btn:hover{background:#000;transform:translateY(-1px);box-shadow:var(--shadow-md)}
.btn.sec{background:var(--surface-2);color:var(--t1);border:1px solid var(--hair)}
.btn.sec:hover{background:var(--surface);border-color:var(--hair-d);transform:translateY(-1px)}
.btn.danger{background:var(--c-red)}.btn.danger:hover{background:#9F1F44}
.btn.right{margin-left:auto}
.modal-msg{font-size:11.5px;color:var(--t2);margin-top:8px;padding:8px 12px;background:var(--surface-2);border-radius:6px;line-height:1.5;border:1px solid var(--hair)}
.modal-msg.ok{color:var(--c-emr);background:var(--c-emr-s);border-color:#A8C3F0}
.modal-msg.err{color:var(--c-red);background:var(--c-red-s);border-color:#F4B7C9}
.pri-chips{display:flex;gap:6px;flex-wrap:wrap}
.pri-chip{padding:9px 16px;border-radius:8px;font-size:13px;font-weight:600;background:var(--surface-2);border:1.5px solid var(--hair);color:var(--t2);cursor:pointer;transition:all 120ms}
.pri-chip:hover{background:var(--surface);border-color:var(--hair-d)}
.pri-chip.on[data-p="urgent"]{background:var(--c-red-s);border-color:var(--c-red);color:var(--c-red)}
.pri-chip.on[data-p="high"]{background:var(--c-emr-s);border-color:var(--c-emr);color:var(--c-emr)}
.pri-chip.on[data-p="normal"]{background:var(--surface);border-color:var(--hair-d);color:var(--t2)}
.task-meta-line{margin-top:14px;padding-top:12px;border-top:1px solid var(--hair);font-family:var(--font-mono);font-size:11px;color:var(--t3);display:flex;gap:14px}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--t1);color:var(--t-inv);padding:11px 20px;border-radius:8px;font-size:12.5px;font-weight:500;z-index:200;box-shadow:var(--shadow-lg)}
@media(max-width:768px){
  .app{padding:16px}
  .top{grid-template-columns:1fr;gap:10px;padding:12px 14px}
  .top-brand{justify-content:center}
  .input-extras input[type=date]{width:100%}
  .body{grid-template-columns:1fr;gap:14px}
}
</style>

      <input id="quickInput" type="text" placeholder="새 할 일 (Enter로 추가)" />

        <input id="quickDue" type="date" title="완성일자 (비우면 오늘)" />

</div>

<div class="modal-bg" id="modal">

    <div class="modal-h">

  ],
  lastSync:''
};

let state=load();
let activeFilter='all';
let selectedDate=null;
let editingTaskId=null;

function load(){
  try{
    const raw=localStorage.getItem(STORAGE_KEY);
    if(!raw)return structuredClone(SEED);
    const p=JSON.parse(raw);
    if(!p.tasks)p.tasks=[];if(!p.events)p.events=[];
    const result=mergeSeedOutlook(p.events);
    p.events=result.events;
    if(result.added>0){
      console.log(`[auto-merge:load] ${result.added}건 신규 outlook 일정 병합`);
      p._needsPush=true;
    }
    return p;
  }catch(e){return structuredClone(SEED)}
}
function save(){
  state.lastSync=new Date().toISOString();
  localStorage.setItem(STORAGE_KEY,JSON.stringify(state));
  render();
  autoPushToGist();
}

const fmtDate=(d)=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
const today=()=>fmtDate(new Date());
const dayDiff=(a,b)=>Math.round((new Date(a)-new Date(b))/86400000);
const weekday=['SUN','MON','TUE','WED','THU','FRI','SAT'];
const weekdayKR=['일','월','화','수','목','금','토'];
const PRI_ORDER={urgent:0,high:1,normal:2};

function getActiveDate(){return selectedDate||today()}
function getWeekStart(dateStr){
  const d=new Date(dateStr);
  const dow=d.getDay();
  d.setDate(d.getDate()-dow);
  return fmtDate(d);
}
function addDays(dateStr,n){
  const d=new Date(dateStr);
  d.setDate(d.getDate()+n);
  return fmtDate(d);
}

function group(t){
  if(t.done)return 'done';
  const d=dayDiff(t.due,today());
  if(d<0)return 'overdue';
  if(d===0)return 'today';
  if(d<=7)return 'week';
  return 'later';
}
function priLabel(p){return p==='urgent'?'긴급':(p==='high'?'보통':'여유')}
function priClass(p){return p==='urgent'?'pri-urg':(p==='high'?'pri-hi':'pri-norm')}
function priShort(p){return p==='urgent'?'urg':(p==='high'?'hi':'norm')}
function barClass(t){
  if(t.done)return 'bar-mute';
  const g=group(t);
  if(g==='overdue')return 'bar-red';
  if(g==='today')return t.priority==='urgent'?'bar-red':'bar-amb';
  if(g==='week')return 'bar-grn';
  return 'bar-mute';
}
function dueDisplay(t){
  if(!t.due)return null;
  const dt=new Date(t.due);
  return `${dt.getMonth()+1}.${dt.getDate()} 마감`;
}
function dueChipClass(t){
  if(t.done)return 'normal';
  if(dayDiff(t.due,today())<0)return 'overdue';
  if(t.priority==='urgent')return 'urgent';
  if(t.priority==='high')return 'high';
  return 'normal';
}
function createdAtLabel(t){
  if(t.createdAt){
    const dt=new Date(t.createdAt);
    if(!isNaN(dt))return `${dt.getMonth()+1}.${dt.getDate()}`;
  }
  const m=t.id&&t.id.match(/^t(\d{10,})$/);
  if(m){
    const ts=parseInt(m[1]);
    if(ts>1000000000000){
      const d=new Date(ts);
      return `${d.getMonth()+1}.${d.getDate()}`;
    }
  }
  return null;
}
function esc(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c])}

function render(){
  renderTopDate();renderFilters();renderTasks();renderDayPanel();renderFoot();
}

function renderTopDate(){
  const now=new Date();
  document.getElementById('topDate').textContent=`${now.getMonth()+1}.${now.getDate()} ${weekday[now.getDay()]}`;
}

function renderFilters(){
  const t=state.tasks;
  const tabs=[
    {k:'all',l:'전체',c:t.length,cls:''},
    {k:'today',l:'오늘',c:t.filter(x=>!x.done&&x.due===today()).length,cls:''},
    {k:'overdue',l:'지연',c:t.filter(x=>!x.done&&dayDiff(x.due,today())<0).length,cls:'danger'},
    {k:'done',l:'완료',c:t.filter(x=>x.done).length,cls:'success'}
  ];
  document.getElementById('filters').innerHTML=tabs.map(tb=>
    `<button class="fbtn ${tb.cls} ${activeFilter===tb.k?'on':''}" data-f="${tb.k}">${tb.l} <span class="cnt">${tb.c}</span></button>`
  ).join('');
  document.querySelectorAll('.fbtn').forEach(b=>b.addEventListener('click',()=>{activeFilter=b.dataset.f;render()}));
}

function renderTasks(){
  let list=state.tasks.slice();
  if(activeFilter==='today')list=list.filter(t=>!t.done&&t.due===today());
  else if(activeFilter==='overdue')list=list.filter(t=>!t.done&&dayDiff(t.due,today())<0);
  else if(activeFilter==='done')list=list.filter(t=>t.done);
  const groups={
    overdue:{lbl:'지연',cls:'overdue',tasks:[]},
    today:{lbl:'오늘 마감',cls:'today',tasks:[]},
    week:{lbl:'이번 주',cls:'week',tasks:[]},
    later:{lbl:'다음 주+',cls:'later',tasks:[]},
    done:{lbl:'완료',cls:'done',tasks:[]}
  };
  list.forEach(t=>groups[group(t)].tasks.push(t));
  Object.values(groups).forEach(g=>g.tasks.sort((a,b)=>(PRI_ORDER[a.priority]-PRI_ORDER[b.priority])||(a.due.localeCompare(b.due))));
  const order=['overdue','today','week','later','done'];
  const html=order.filter(k=>groups[k].tasks.length>0).map(k=>{
    const g=groups[k];
    const tasksHTML=g.tasks.map(taskHTML).join('');
    if(k==='done'){
      return `<div class="grp ${g.cls}"><div class="grp-h"><span class="dot"></span><span class="lbl">${g.lbl}</span><span class="cnt">${g.tasks.length}</span></div><div class="grp-tasks-scroll">${tasksHTML}</div></div>`;
    }
    return `<div class="grp ${g.cls}"><div class="grp-h"><span class="dot"></span><span class="lbl">${g.lbl}</span><span class="cnt">${g.tasks.length}</span></div>${tasksHTML}</div>`;
  }).join('');
  document.getElementById('taskList').innerHTML=html||`<div class="empty"><div class="empty-i">∅</div>표시할 항목이 없습니다</div>`;
  document.querySelectorAll('.tk').forEach(el=>{
    el.addEventListener('click',e=>{if(e.target.closest('.cb')||e.target.closest('.tk-act'))return;openTaskEdit(el.dataset.id)});
    el.querySelector('.cb').addEventListener('click',e=>{e.stopPropagation();toggleTask(el.dataset.id)});
    const sn=el.querySelector('.act-snooze');if(sn)sn.addEventListener('click',e=>{e.stopPropagation();snoozeTask(el.dataset.id)});
    const ed=el.querySelector('.act-edit');if(ed)ed.addEventListener('click',e=>{e.stopPropagation();openTaskEdit(el.dataset.id)});
  });
}

function taskHTML(t){
  const overdueDays=!t.done&&dayDiff(t.due,today())<0?Math.abs(dayDiff(t.due,today())):0;
  const overdueBadge=overdueDays>0?`<span class="overdue-mini">${overdueDays}d 지연</span>`:'';
  const dueLbl=dueDisplay(t);
  const created=createdAtLabel(t);
  return `<div class="tk ${barClass(t)}${t.done?' done':''}" data-id="${t.id}">
    <span class="cb${t.done?' on':''}"></span>
    <div class="tk-body">
      <div class="tk-title">${esc(t.title)}</div>
      <div class="tk-meta">
        <span class="${priClass(t.priority)}">${priLabel(t.priority)}</span>
        ${dueLbl?`<span class="dotsep">·</span><span class="info">${dueLbl}</span>`:''}
        ${overdueBadge}
        ${t.scheduled?`<span class="dotsep">·</span><span class="info">${t.scheduled} 배치</span>`:''}
        ${created?`<span class="dotsep">·</span><span class="created-mini">작성 ${created}</span>`:''}
      </div>
    </div>
    <div class="tk-actions">
      <button class="tk-act act-snooze" title="기한 +1일">⏱</button>
      <button class="tk-act act-edit" title="편집">✎</button>
    </div>
  </div>`;
}

function renderDayPanel(){
  const active=getActiveDate();
  const isToday=active===today();
  const isPast=dayDiff(active,today())<0;
  const diff=dayDiff(active,today());
  const dt=new Date(active);

  let dLabel='',dCls='';
  if(diff===0){dLabel='TODAY';dCls='today'}
  else if(diff===1){dLabel='+1d';dCls='future'}
  else if(diff===-1){dLabel='-1d';dCls='past'}
  else if(diff>0){dLabel=`+${diff}d`;dCls='future'}
  else{dLabel=`${diff}d`;dCls='past'}

  const weekStart=getWeekStart(active);
  const stripHTML=[];
  for(let i=0;i<7;i++){
    const d=addDays(weekStart,i);
    const dObj=new Date(d);
    const dow=dObj.getDay();
    const hasEvents=state.events.some(e=>e.date===d);
    const cls=[
      'day-chip',
      d===today()?'today':'',
      d===active?'selected':'',
      (dow===0||dow===6)?'weekend':''
    ].filter(Boolean).join(' ');
    stripHTML.push(`<button class="${cls}" data-date="${d}">
      <span class="dow">${weekdayKR[dow]}</span>
      <span class="num">${dObj.getDate()}</span>
      ${hasEvents?'<span class="ev-dot"></span>':''}
    </button>`);
  }

  const evs=state.events.filter(e=>e.date===active).sort((a,b)=>a.time.localeCompare(b.time));
  const isAlldayEv=e=>e.isAllDay||(e.duration||0)>=1440;
  const alldayEvs=evs.filter(isAlldayEv);
  const timedEvs=evs.filter(e=>!isAlldayEv(e));
  const hasAllday=alldayEvs.length>0;

  const todoPool=(isPast||hasAllday) ? [] : state.tasks
    .filter(t=>!t.done)
    .map(t=>({
      task:t,
      overdueDays:Math.max(0,-dayDiff(t.due,today())),
      priWeight:PRI_ORDER[t.priority]||99
    }))
    .sort((a,b)=>{
      // 1차: 지연일 큰 순서 (overdue 우선)
      if(a.overdueDays!==b.overdueDays)return b.overdueDays-a.overdueDays;
      // 2차: 중요도 (urgent > high > normal)
      if(a.priWeight!==b.priWeight)return a.priWeight-b.priWeight;
      // 3차: 마감일 빠른 순
      return a.task.due.localeCompare(b.task.due);
    })
    .map(x=>x.task);

  const occupiedHours=new Set();
  timedEvs.forEach(e=>{
    const [eh,em]=e.time.split(':').map(Number);
    const dur=e.duration||60;
    const startMin=eh*60+em;
    const endMin=startMin+dur;
    for(let m=startMin;m<endMin;m++){
      occupiedHours.add(Math.floor(m/60));
    }
  });
  const slotRecs={};
  let taskIdx=0;
  for(let h=9;h<=18;h++){
    if(occupiedHours.has(h))continue;
    const slotKey=String(h).padStart(2,'0');
    // 1시간 = 1 task 배치
    if(taskIdx<todoPool.length){
      slotRecs[slotKey]=[todoPool[taskIdx]];
      taskIdx++;
    }else{
      slotRecs[slotKey]=[];
    }
  }

  let busyMin=0;
  timedEvs.forEach(e=>{busyMin+=e.duration||60});
  const recMin=Object.values(slotRecs).reduce((s,arr)=>s+arr.length*60,0);
  const totalMin=10*60;
  const freeMin=Math.max(0,totalMin-busyMin-recMin);
  const busyPct=Math.min(100,(busyMin/totalMin)*100);
  const recPct=Math.min(100-busyPct,(recMin/totalMin)*100);
  const freePct=Math.max(0,100-busyPct-recPct);

  const slotsHTML=[];
  alldayEvs.forEach(e=>{
    slotsHTML.push(`<div class="slot slot-allday"><span class="slot-t">종일</span><div class="slot-c"><span>${esc(e.title)}</span></div></div>`);
  });
  // 9시 미만 시작 일정
  const earlyEvs=timedEvs.filter(e=>parseInt(e.time.split(':')[0])<9);
  earlyEvs.forEach(e=>{
    slotsHTML.push(`<div class="slot"><span class="slot-t">${e.time}</span><div class="slot-c event"><span>${esc(e.title)}</span></div></div>`);
  });
  for(let h=9;h<=18;h++){
    const hourLabel=String(h).padStart(2,'0');
    const hourEvs=timedEvs.filter(e=>parseInt(e.time.split(':')[0])===h);
    if(hourEvs.length>0){
      hourEvs.forEach(e=>{
        slotsHTML.push(`<div class="slot"><span class="slot-t">${e.time}</span><div class="slot-c event"><span>${esc(e.title)}</span></div></div>`);
      });
    }else if(occupiedHours.has(h)){
      slotsHTML.push(`<div class="slot-empty">${hourLabel}:00 회의 진행 중</div>`);
    }else{
      const recs=slotRecs[hourLabel]||[];
      if(recs.length>0){
        const recHTML=recs.map(t=>{
          const isOverdue=dayDiff(t.due,today())<0;
          const dueLbl=isOverdue?`<span class="rec-overdue">${Math.abs(dayDiff(t.due,today()))}d 지연</span>`:'';
          return `<div class="rec-task" data-task-id="${t.id}">
            <span class="rec-pri ${priShort(t.priority)}"></span>
            <span class="rec-title">${esc(t.title)}</span>
            ${dueLbl}
          </div>`;
        }).join('');
        slotsHTML.push(`<div class="slot"><span class="slot-t">${hourLabel}:00</span><div class="slot-c rec">${recHTML}</div></div>`);
      }else{
        slotsHTML.push(`<div class="slot-empty">${hourLabel}:00 ${isPast?'지난 시간':'빈 시간'}</div>`);
      }
    }
  }

  // 18시 초과 시작 일정
  const lateEvs=timedEvs.filter(e=>parseInt(e.time.split(':')[0])>18);
  lateEvs.forEach(e=>{
    slotsHTML.push(`<div class="slot"><span class="slot-t">${e.time}</span><div class="slot-c event"><span>${esc(e.title)}</span></div></div>`);
  });

  const dowKR=weekdayKR[dt.getDay()];
  const dayLabelHTML=`<span class="day-label ${dCls}">${dLabel}</span>`;
  const headerLabel=isPast?'PAST':(isToday?'TODAY':'PLANNING');

  document.getElementById('todayPanel').innerHTML=`
    <div class="today-h">
      <div class="today-h-l"><span class="ic">⏰</span><span class="lbl">${headerLabel}</span></div>
      <button class="today-jump ${isToday?'hide':''}" id="jumpToday">→ TODAY</button>
    </div>
    <div class="today-d">${dt.getMonth()+1}.${dt.getDate()} ${dowKR}요일${dayLabelHTML}</div>
    <div class="day-nav">
      <button class="day-arrow" id="prevWeek" title="이전 주">‹</button>
      <div class="day-strip">${stripHTML.join('')}</div>
      <button class="day-arrow" id="nextWeek" title="다음 주">›</button>
    </div>
    <div class="cap-row">
      <span class="l">가용 ${(totalMin/60).toFixed(0)}h</span>
      <span class="r">
        <span class="seg busy"><b>${(busyMin/60).toFixed(1)}h</b> 일정</span>
        <span class="seg rec"><b>${(recMin/60).toFixed(1)}h</b> 권고</span>
        <span class="seg free"><b>${(freeMin/60).toFixed(1)}h</b> 여유</span>
      </span>
    </div>
    <div class="cap-bar">
      <div class="cap-seg busy" style="width:${busyPct}%"></div>
      <div class="cap-seg rec" style="width:${recPct}%"></div>
      <div class="cap-seg free" style="width:${freePct}%"></div>
    </div>
    <div class="slots">${slotsHTML.join('')||'<div class="slot-empty">일정 없음</div>'}</div>`;

function parseICSDate(v){
  const isUTC=v.endsWith('Z');
  const clean=v.replace(/[TZ]/g,'').replace(/[-:]/g,'');
  const Y=parseInt(clean.substr(0,4));
  const M=parseInt(clean.substr(4,2))-1;
  const D=parseInt(clean.substr(6,2));
  const h=parseInt(clean.substr(8,2)||'0');
  const m=parseInt(clean.substr(10,2)||'0');
  return isUTC?new Date(Date.UTC(Y,M,D,h,m)):new Date(Y,M,D,h,m);
}
function parseICS(text){
  const unfolded=text.replace(/\r\n[ \t]/g,'').replace(/\n[ \t]/g,'');
  const lines=unfolded.split(/\r?\n/);
  const events=[];let cur=null;
  for(const line of lines){
    if(line==='BEGIN:VEVENT')cur={};
    else if(line==='END:VEVENT'&&cur){if(cur.dtstart)events.push(cur);cur=null}
    else if(cur){
      const idx=line.indexOf(':');if(idx<=0)continue;
      const rawKey=line.substring(0,idx);
      const key=rawKey.split(';')[0];
      const params=rawKey.split(';').slice(1);
      const val=line.substring(idx+1);
      if(key==='SUMMARY')cur.summary=val.replace(/\\,/g,',').replace(/\\n/g,' ');
      else if(key==='DTSTART'){
        cur.dtstart=parseICSDate(val);
        if(params.some(p=>p.toUpperCase().includes('VALUE=DATE'))||/^\d{8}$/.test(val))cur.isAllDay=true;
      }
      else if(key==='DTEND')cur.dtend=parseICSDate(val);
      else if(key==='UID')cur.uid=val;
    }
  }
  return events;
}
function icsToEvents(icsEvents){
  return icsEvents.map(e=>{
    const start=e.dtstart;
    if(e.isAllDay){
      return {date:fmtDate(start),time:'00:00',title:e.summary||'(제목 없음)',duration:0,type:'outlook',color:'event',isAllDay:true};
    }
    const end=e.dtend||new Date(start.getTime()+60*60*1000);
    const dur=Math.max(15,Math.round((end-start)/60000));
    // 자동 종일 감지: 00:00 시작 + 24h 배수 또는 dtend도 00:00
    const startsAtMidnight=start.getHours()===0&&start.getMinutes()===0;
    const endsAtMidnight=end.getHours()===0&&end.getMinutes()===0;
    const isAlldayAuto=startsAtMidnight&&(dur>=1440||(endsAtMidnight&&dur%1440===0));
    if(isAlldayAuto){
      return {date:fmtDate(start),time:'00:00',title:e.summary||'(제목 없음)',duration:0,type:'outlook',color:'event',isAllDay:true};
    }
    return {date:fmtDate(start),time:`${String(start.getHours()).padStart(2,'0')}:${String(start.getMinutes()).padStart(2,'0')}`,title:e.summary||'(제목 없음)',duration:dur,type:'outlook',color:'event'};
  });
}
async function fetchICS(url){
  try{
    const r=await fetch(url,{headers:{'Accept':'text/calendar'}});
    if(r.ok){const text=await r.text();if(text.includes('BEGIN:VCALENDAR'))return text}
  }catch(e){}
  const proxyUrl=`${WORKER_URL}/calendar?url=${encodeURIComponent(url)}&secret=${encodeURIComponent(SHARED_SECRET)}`;
  const r=await fetch(proxyUrl);
  if(r.ok)return await r.text();
  throw new Error(`직접 fetch 및 Worker proxy 모두 실패 (HTTP ${r.status})`);
}
async function importICSFromUrl(url){
  showIcsMsg('가져오는 중...','');
  try{
    const text=await fetchICS(url);
    const parsed=parseICS(text);
    if(parsed.length===0){showIcsMsg('VEVENT 0개 — URL은 가져왔으나 일정 없음','err');return}
    const evs=icsToEvents(parsed);
    state.events=state.events.filter(e=>e.type!=='outlook');
    state.events.push(...evs);
    localStorage.setItem(ICS_URL_KEY,url);
    save();showIcsMsg(`✓ ${evs.length}개 일정 가져옴`,'ok');
  }catch(e){showIcsMsg('❌ '+e.message,'err')}
}
function importICSFromFile(file){
  const r=new FileReader();
  r.onload=()=>{
    try{
      const parsed=parseICS(r.result);
      if(parsed.length===0){showIcsMsg('VEVENT 0개','err');return}
      const evs=icsToEvents(parsed);
      state.events=state.events.filter(e=>e.type!=='outlook');
      state.events.push(...evs);
      save();showIcsMsg(`✓ ${evs.length}개 일정 가져옴`,'ok');
    }catch(e){showIcsMsg('파싱 실패: '+e.message,'err')}
  };
  r.readAsText(file);
}

function applyHashSync(){
  const m=location.hash.match(/#s=([^&]+)/);if(!m)return;
  try{
    const binStr=atob(m[1]);
    const bytes=Uint8Array.from(binStr,c=>c.charCodeAt(0));
    const decoded=new TextDecoder('utf-8').decode(bytes);
    const incoming=JSON.parse(decoded);
    if(incoming.tasks)state.tasks=incoming.tasks;
    if(incoming.events)state.events=incoming.events;
    save();history.replaceState(null,'',location.pathname);
    flash('Claude → 사이트 동기화 완료');
  }catch(e){console.warn('hash sync failed',e)}
}

/* ─── SEED outlook events auto-merge (load + pull 양쪽 적용) ─── */
function mergeSeedOutlook(events){
  if(!events)events=[];
  const evKey=e=>`${e.date}|${e.time}|${e.title}`;
  const existingKeys=new Set(events.map(evKey));
  let added=0;
  SEED.events.filter(e=>e.type==='outlook').forEach(e=>{
    if(!existingKeys.has(evKey(e))){
      events.push(structuredClone(e));
      added++;
    }
  });
  return {events, added};
}

    const platform = isIpad ? 'ipad' : (isMac ? 'mac' : 'web');
    id = `${platform}-${Math.random().toString(36).slice(2,7)}`;

let pushTimer = null;
let isPulling = false;
let lastRemoteHash = '';

function dataHash(obj){
  return JSON.stringify({tasks:obj.tasks||[], events:obj.events||[]});
}

async function autoPullFromGist(){
  if(isPulling) return;
  isPulling = true;
  try{
    const r = await fetch(`${WORKER_URL}/?secret=${encodeURIComponent(SHARED_SECRET)}&_t=${Date.now()}`);
    if(!r.ok) return;
    const data = await r.json();
    if(!data || (!data.tasks && !data.events)) return;
    // Pull 받은 events에도 SEED outlook merge 적용 (옛 데이터 덮어씌움 방지)
    if(data.events){
      const result = mergeSeedOutlook(data.events);
      data.events = result.events;
      if(result.added > 0){
        console.log(`[auto-merge:pull] ${result.added}건 SEED outlook 보완`);
      }
    }
    const remoteHash = dataHash(data);
    if(remoteHash === lastRemoteHash) return;
    const localHash = dataHash(state);
    if(remoteHash !== localHash){
      if(data.tasks) state.tasks = data.tasks;
      if(data.events) state.events = data.events;
      state.lastSync = new Date().toISOString();
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      render();
      flash('🔄 다른 기기에서 갱신됨');
      // 다른 디바이스도 빨리 갱신받게 push
      autoPushToGist();
    }
    lastRemoteHash = remoteHash;
  }catch(e){
    console.warn('[auto-pull] failed:', e.message);
  }finally{
    isPulling = false;
  }
}

function autoPushToGist(){
  if(pushTimer) clearTimeout(pushTimer);
  pushTimer = setTimeout(async()=>{
    try{
      const json = JSON.stringify({tasks:state.tasks, events:state.events});
      const utf8 = new TextEncoder().encode(json);
      let bin = '';
      for(let i = 0; i < utf8.length; i++) bin += String.fromCharCode(utf8[i]);
      const r = await fetch(WORKER_URL, {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({secret:SHARED_SECRET, device:DEVICE_ID, data:btoa(bin)})
      });
      if(r.ok){
        lastRemoteHash = dataHash(state);
      }
    }catch(e){
      console.warn('[auto-push] failed:', e.message);
    }
  }, 1500);
}

applyHashSync();
// load() auto-merge로 추가된 일정이 있으면 즉시 push (다른 디바이스 동기화)
if(state._needsPush){
  delete state._needsPush;
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  autoPushToGist();
}
autoPullFromGist();
setInterval(autoPullFromGist, 30000);

// 자동 ICS sync — 페이지 로드 시 즉시 + 5분마다
async function autoSyncICS(silent){
  const url=localStorage.getItem(ICS_URL_KEY);
  if(!url)return;
  try{
    const text=await fetchICS(url);
    const parsed=parseICS(text);
    const newEvents=icsToEvents(parsed);
    if(!newEvents.length)return;
    // outlook type events만 교체 (수동 추가 일정 보존)
    const manualEvents=state.events.filter(e=>e.type!=='outlook');
    const merged=[...manualEvents,...newEvents];
    // SEED outlook도 보완 (auto-merge)
    const result=mergeSeedOutlook(merged);
    state.events=result.events;
    state.lastSync=new Date().toISOString();
    localStorage.setItem(STORAGE_KEY,JSON.stringify(state));
    render();
    autoPushToGist();
    if(!silent)flash(`📅 ICS sync ${newEvents.length}건`);
    console.log(`[auto-ics] ${newEvents.length}건 outlook 일정 동기화`);
  }catch(e){
    console.warn('[auto-ics] failed:',e.message);
  }
}
autoSyncICS(true);
setInterval(()=>autoSyncICS(true),5*60*1000);

render();
setInterval(renderTopDate,60000);
</script>
