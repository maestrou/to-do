<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>나의 할 일 · Sir</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/variable/pretendardvariable.css">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --canvas: #F7F4ED; --surface: #FFFFFF; --surfaceLow: #FBF8F1; --surfaceMute: #F2EEE3;
    --ink: #0A0E13; --muted: #5C5852; --faded: #A09B90;
    --hair: #E5DECC; --hairSoft: #EFE9D8;
    --amber: #B45309; --amberLight: #D97706; --amberMist: #FFFBEB; --amberHaze: #FEF3C7;
    --sage: #15803D; --sageLight: #16A34A; --sageMist: #F0FDF4; --sageHaze: #DCFCE7;
    --rose: #BE185D;
    --navy: #0E2841; --navyDeep: #091A2C; --navyMist: #EEF2F7;
    --gold: #A88445; --goldLight: #C9A35F; --goldHaze: #F5EDD8;
    --claude: #CC785C; --claudeMist: #FAF1ED; --claudeBorder: #EBC8B8;
    --github: #24292E; --githubMist: #F6F8FA;
    --fd: 'Pretendard Variable','Pretendard',-apple-system,sans-serif;
    --fm: 'JetBrains Mono','IBM Plex Mono',ui-monospace,Menlo,monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body { font-family: var(--fd); background: var(--canvas); background-image: radial-gradient(circle at 1px 1px, var(--hairSoft) 1px, transparent 0); background-size: 24px 24px; color: var(--ink); padding: 14px; font-size: 14px; line-height: 1.55; min-height: 100vh; }
  .wrap { width: 100%; max-width: 1700px; margin: 0 auto; }

  /* 상단바 */
  .topbar { display: flex; align-items: center; gap: 14px; margin-bottom: 12px; padding: 12px 16px; background: var(--surface); border-radius: 12px; border: 1px solid var(--hair); border-left: 5px solid var(--navy); box-shadow: 0 2px 0 var(--hairSoft); flex-wrap: wrap; }
  .tb-kicker { font-size: 11px; font-weight: 700; color: var(--gold); letter-spacing: 0.22em; text-transform: uppercase; margin-bottom: 2px; }
  .tb-title { font-size: 22px; font-weight: 800; color: var(--ink); letter-spacing: -0.025em; }
  .tb-date { display: inline-flex; align-items: center; gap: 8px; font-size: 14px; font-weight: 700; color: var(--ink); padding: 7px 14px; background: var(--navyMist); border: 1px solid var(--hair); border-radius: 99px; font-family: var(--fm); }
  .tb-date.holiday { background: var(--amberMist); color: var(--amber); border-color: var(--amberHaze); }
  .tb-date.weekend { background: var(--surfaceMute); color: var(--muted); }
  .tb-spacer { flex: 1; }
  .stats-mini { display: flex; align-items: center; gap: 0; }
  .stat-mini { display: inline-flex; align-items: baseline; gap: 7px; padding: 6px 14px; border-right: 1px solid var(--hair); }
  .stat-mini:last-child { border-right: none; }
  .stat-mini-v { font-size: 22px; font-weight: 800; font-family: var(--fm); line-height: 1; letter-spacing: -0.02em; }
  .stat-mini-l { font-size: 11px; font-weight: 700; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; }

  /* Sync 상태 */
  .sync-status { display: inline-flex; align-items: center; gap: 7px; padding: 6px 13px; font-size: 13px; font-weight: 700; border-radius: 99px; cursor: pointer; transition: all 0.15s ease; }
  .sync-status.unconfigured { background: var(--surfaceMute); color: var(--muted); border: 1px solid var(--hair); }
  .sync-status.syncing { background: var(--goldHaze); color: var(--gold); border: 1px solid var(--goldLight); }
  .sync-status.synced { background: var(--sageMist); color: var(--sage); border: 1px solid var(--sageHaze); }
  .sync-status.error { background: var(--amberMist); color: var(--amber); border: 1px solid var(--amberHaze); }
  .sync-status:hover { transform: translateY(-1px); }
  .sync-dot { width: 8px; height: 8px; border-radius: 99px; }
  .sync-dot.unconfigured { background: var(--faded); }
  .sync-dot.syncing { background: var(--goldLight); animation: pulse 1s infinite; }
  .sync-dot.synced { background: var(--sageLight); }
  .sync-dot.error { background: var(--amberLight); }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

  .btn-settings { display: inline-flex; align-items: center; gap: 7px; height: 34px; padding: 0 16px; font-size: 13px; font-weight: 700; border-radius: 7px; border: 1px solid var(--hair); color: var(--ink); background: var(--surface); cursor: pointer; font-family: inherit; transition: all 0.15s ease; }
  .btn-settings:hover { border-color: var(--navy); }

  /* Claude 동기화 바 */
  .sync-bar { display: flex; gap: 7px; margin-bottom: 10px; align-items: center; padding: 9px 14px; background: var(--claudeMist); border: 1px solid var(--claudeBorder); border-left: 4px solid var(--claude); border-radius: 10px; flex-wrap: wrap; }
  .sync-label { font-size: 12px; font-weight: 800; color: var(--claude); letter-spacing: 0.18em; text-transform: uppercase; padding-right: 9px; border-right: 1px solid var(--claudeBorder); margin-right: 6px; }
  .sync-btn { display: inline-flex; align-items: center; gap: 6px; height: 34px; padding: 0 14px; font-size: 13px; font-weight: 700; border-radius: 7px; border: 1px solid var(--claudeBorder); color: var(--claude); background: var(--surface); cursor: pointer; font-family: inherit; transition: all 0.15s ease; }
  .sync-btn:hover { background: var(--claude); color: #fff; }
  .sync-btn.primary { background: var(--claude); color: #fff; border-color: var(--claude); }
  .sync-btn.primary:hover { background: #B26A50; }
  .sync-info { font-size: 12px; color: var(--muted); margin-left: auto; font-family: var(--fm); }

  /* 입력 바 */
  .input-bar { display: flex; gap: 5px; margin-bottom: 10px; align-items: stretch; flex-wrap: wrap; padding: 6px; background: var(--surface); border-radius: 10px; border: 1px solid var(--hair); box-shadow: 0 1px 0 var(--hairSoft); }
  .inp { flex: 1; min-width: 180px; height: 36px; padding: 0 13px; font-size: 14px; border: 1px solid transparent; border-radius: 6px; background: transparent; font-family: inherit; color: var(--ink); outline: none; }
  .inp-pri { flex: 0 0 90px; min-width: 90px; padding: 0 9px; border-left: 1px solid var(--hair); border-radius: 0; font-weight: 600; }
  .inp-date { flex: 0 0 165px; min-width: 165px; padding: 0 11px; border-left: 1px solid var(--hair); border-radius: 0; color: var(--navy); font-weight: 600; font-family: var(--fm); font-size: 13px; }
  .btn-add { height: 36px; padding: 0 18px; font-size: 13px; font-weight: 700; border-radius: 6px; border: none; color: var(--surface); background: var(--navy); cursor: pointer; font-family: inherit; letter-spacing: 0.04em; }
  .btn-reset { height: 36px; padding: 0 13px; font-size: 12px; font-weight: 600; border-radius: 6px; border: 1px solid var(--hair); color: var(--muted); background: var(--surface); cursor: pointer; font-family: inherit; }
  .btn-reset:hover { color: var(--amber); border-color: var(--amberLight); }
  .vsep { width: 1px; background: var(--hair); margin: 3px 4px; }
  .filter-btn { height: 36px; padding: 0 14px; font-size: 13px; font-weight: 500; border-radius: 6px; border: none; color: var(--muted); background: transparent; cursor: pointer; font-family: inherit; transition: all 0.15s ease; }
  .filter-btn.active { background: var(--navy); color: var(--surface); font-weight: 700; }

  /* 주간 스트립 */
  .week-strip { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; margin-bottom: 12px; }
  .day-pill { cursor: pointer; padding: 8px 6px; border-radius: 8px; border: 1px solid var(--hair); background: var(--surface); text-align: center; transition: all 0.15s ease; display: flex; align-items: center; justify-content: center; gap: 8px; }
  .day-pill:hover { border-color: var(--navy); }
  .day-pill.selected { background: var(--navyDeep); border-color: var(--navy); box-shadow: 0 4px 10px -2px rgba(14,40,65,0.4); }
  .day-pill.weekend { background: var(--surfaceLow); }
  .day-pill .wd { font-size: 11px; font-weight: 700; color: var(--muted); letter-spacing: 0.1em; }
  .day-pill.selected .wd { color: var(--faded); }
  .day-pill .dnum { font-size: 17px; font-weight: 800; font-family: var(--fm); letter-spacing: -0.04em; }
  .day-pill.selected .dnum { color: var(--surface); }
  .day-pill.today .dnum { color: var(--rose); }
  .day-pill.holiday .dnum { color: var(--amber); }
  .day-pill.weekend .dnum { color: var(--faded); }
  .day-pill .ddot { width: 5px; height: 5px; border-radius: 99px; }

  /* 메인 그리드 */
  .main { display: grid; grid-template-columns: 1.6fr minmax(0, 1fr); gap: 12px; }
  @media (max-width: 900px) { .main { grid-template-columns: 1fr; } }
  .card { background: var(--surface); border-radius: 12px; border: 1px solid var(--hair); padding: 14px; box-shadow: 0 1px 0 var(--hairSoft); min-width: 0; }
  .st { display: flex; align-items: stretch; justify-content: space-between; margin-bottom: 10px; padding-bottom: 9px; border-bottom: 1px solid var(--hairSoft); }
  .st-l { display: flex; gap: 10px; align-items: stretch; }
  .st-bar { width: 4px; border-radius: 3px; }
  .st-bar.navy { background: var(--navy); }
  .st-bar.sage { background: var(--sage); }
  .st-k { font-size: 11px; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; line-height: 1; margin-bottom: 5px; }
  .st-k.navy { color: var(--navy); }
  .st-k.sage { color: var(--sage); }
  .st-t { font-size: 17px; font-weight: 800; color: var(--ink); letter-spacing: -0.02em; line-height: 1; }
  .st-r { display: flex; flex-direction: column; align-items: flex-end; gap: 3px; justify-content: center; }
  .st-c { font-size: 22px; font-weight: 800; font-family: var(--fm); line-height: 1; letter-spacing: -0.03em; }
  .st-c.navy { color: var(--navy); }
  .st-c.sage { color: var(--sage); }
  .st-h { font-size: 10.5px; font-weight: 700; color: var(--faded); letter-spacing: 0.1em; text-transform: uppercase; }

  /* 할 일 */
  .task-list { display: flex; flex-direction: column; min-height: 120px; }
  .task-row { display: flex; align-items: center; gap: 11px; padding: 10px 9px; border-radius: 6px; border-bottom: 1px solid var(--hairSoft); border-left: 3px solid transparent; cursor: pointer; transition: all 0.13s ease; overflow: hidden; min-height: 42px; }
  .task-row:hover { background: var(--claudeMist); border-left-color: var(--claude); }
  .task-row:hover .task-title { color: var(--claude); font-weight: 600; }
  .task-row.done { opacity: 0.65; background: rgba(220,252,231,0.3); }
  .task-row.done .task-title { color: var(--muted); text-decoration: line-through; }
  .checkbox { width: 19px; height: 19px; border-radius: 4px; cursor: pointer; flex-shrink: 0; border: 2px solid var(--hair); background: transparent; display: inline-flex; align-items: center; justify-content: center; transition: all 0.15s ease; }
  .checkbox.checked { border-color: var(--sage); background: var(--sage); }
  .pdot { display: inline-block; width: 9px; height: 9px; border-radius: 999px; flex-shrink: 0; }
  .pdot.urgent { background: var(--amberLight); box-shadow: 0 0 0 3px rgba(217,119,6,0.13); }
  .pdot.normal { background: var(--gold); box-shadow: 0 0 0 3px rgba(168,132,69,0.13); }
  .pdot.relax  { background: var(--sageLight); box-shadow: 0 0 0 3px rgba(22,163,74,0.13); }
  .task-title { flex: 1 1 0; min-width: 0; font-size: 15px; color: var(--ink); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 500; line-height: 1.4; transition: color 0.13s ease; }
  .date-badge { font-size: 12.5px; font-family: var(--fm); font-weight: 700; color: var(--muted); white-space: nowrap; flex-shrink: 0; }
  .date-badge.overdue { color: var(--amber); }
  .date-badge.done { font-size: 12px; padding: 3px 8px; border-radius: 4px; display: inline-flex; align-items: center; gap: 5px; background: var(--sageMist); border: 1px solid var(--sageHaze); }
  .date-badge.done.late { background: var(--amberMist); border-color: var(--amberHaze); }
  .status-pill { font-size: 10px; font-weight: 800; padding: 2px 5px; border-radius: 3px; color: #fff; letter-spacing: 0.04em; }
  .ico-btn { cursor: pointer; flex-shrink: 0; line-height: 1; text-align: center; transition: color 0.13s ease; color: var(--faded); }
  .ico-btn.edit { font-size: 15px; font-weight: 700; width: 20px; }
  .ico-btn.del  { font-size: 15px; font-weight: 500; width: 18px; }
  .task-row:hover .ico-btn.edit { color: var(--navy); }
  .task-row:hover .ico-btn.del { color: var(--amber); }
  .empty-state { padding: 36px 12px; text-align: center; color: var(--faded); font-size: 14px; font-style: italic; }
  .legend { margin-top: 9px; padding-top: 8px; border-top: 1px dashed var(--hairSoft); display: flex; flex-wrap: wrap; gap: 4px 14px; font-size: 11.5px; color: var(--faded); align-items: center; }
  .legend .claude-tag { color: var(--claude); font-weight: 700; }

  /* 우측 컬럼 */
  .right-col { display: flex; flex-direction: column; gap: 10px; min-width: 0; }
  .day-card { padding: 12px 14px; border-radius: 12px; border: 1px solid var(--hair); background: var(--surface); }
  .day-card.companyOff { background: linear-gradient(135deg, #FEF3C7 0%, #FDE68A 100%); border-color: var(--amberLight); }
  .day-card.holiday { background: linear-gradient(135deg, #FFFBEB 0%, #FEF3C7 100%); border-color: var(--amberHaze); }
  .day-card.today { background: linear-gradient(135deg, #FDF2F8 0%, #FCE7F3 100%); border-color: var(--rose); }
  .day-card.openday { background: linear-gradient(135deg, #F0FDF4 0%, #DCFCE7 100%); border-color: var(--sageLight); }
  .day-card-row { display: flex; align-items: center; gap: 12px; justify-content: space-between; }
  .day-card-l { display: flex; gap: 10px; align-items: center; min-width: 0; }
  .day-bar { width: 4px; height: 38px; border-radius: 3px; flex-shrink: 0; background: var(--navy); }
  .day-bar.amber { background: var(--amber); }
  .day-bar.rose { background: var(--rose); }
  .day-bar.sage { background: var(--sage); }
  .day-info { min-width: 0; }
  .day-wkk { font-size: 10.5px; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; line-height: 1; margin-bottom: 5px; }
  .day-wkk.navy { color: var(--navy); }
  .day-wkk.amber { color: var(--amber); }
  .day-wkk.rose { color: var(--rose); }
  .day-wkk.sage { color: var(--sage); }
  .day-date { font-size: 21px; font-weight: 800; line-height: 1; letter-spacing: -0.03em; font-family: var(--fm); color: var(--ink); white-space: nowrap; }
  .day-wkkr { font-size: 13.5px; color: var(--muted); margin-left: 7px; font-family: var(--fd); font-weight: 600; }
  .day-tag { font-size: 11.5px; font-weight: 700; padding: 4px 10px; color: var(--surface); border-radius: 99px; letter-spacing: 0.05em; flex-shrink: 0; white-space: nowrap; }
  .day-tag.amber-bg { background: var(--amber); }
  .day-tag.amberLight-bg { background: var(--amberLight); }
  .day-tag.rose-bg { background: var(--rose); }
  .day-tag.sage-bg { background: var(--sage); }

  /* 시간대별 일과 */
  .hour-block { display: grid; grid-template-columns: 100px minmax(0, 1fr); gap: 9px; padding: 6px 10px; border-radius: 6px; align-items: center; min-height: 32px; border-left: 3px solid var(--navy); }
  .hour-block + .hour-block { margin-top: 4px; }
  .hour-block.meeting { border-left-color: var(--navy); background: var(--navyMist); }
  .hour-block.task { background: var(--surface); }
  .hour-block.task.urgent { border-left-color: var(--amberLight); }
  .hour-block.task.normal { border-left-color: var(--gold); }
  .hour-block.lunch { border-left-color: var(--faded); background: var(--surfaceMute); }
  .hour-block.buffer { border-left-color: var(--goldLight); background: var(--goldHaze); }
  .hour-block.flex { border-left-color: var(--sageLight); background: var(--sageMist); border: 1px dashed var(--sageHaze); border-left: 3px dashed var(--sageLight); }
  .hb-time { font-size: 12.5px; font-weight: 700; color: var(--ink); font-family: var(--fm); letter-spacing: -0.02em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .hb-time .arrow { color: var(--faded); }
  .hb-content { display: flex; align-items: center; gap: 7px; min-width: 0; overflow: hidden; }
  .hb-chip { font-size: 10.5px; font-weight: 800; padding: 2px 7px; border-radius: 3px; letter-spacing: 0.06em; flex-shrink: 0; }
  .hb-chip.meeting { background: var(--navy); color: #fff; }
  .hb-chip.lunch { background: var(--surfaceMute); color: var(--muted); border: 1px solid var(--hair); font-weight: 700; }
  .hb-chip.buffer { background: transparent; color: var(--gold); border: 1px solid var(--goldLight); font-weight: 700; }
  .hb-chip.flex { background: transparent; color: var(--sage); border: 1px dashed var(--sageLight); font-weight: 700; }
  .hb-title { flex: 1 1 0; min-width: 0; font-size: 13.5px; color: var(--ink); font-weight: 500; line-height: 1.3; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .hb-title.meeting { font-weight: 700; }
  .hb-title.lunch { color: var(--muted); font-style: italic; }
  .hb-loc { color: var(--muted); margin-left: 6px; font-size: 12.5px; font-style: italic; }
  .hb-note { color: var(--muted); margin-left: 6px; font-size: 12.5px; font-family: var(--fm); }
  .openday-banner { background: var(--sageMist); border: 1px solid var(--sageHaze); border-radius: 6px; padding: 8px 11px; margin-bottom: 7px; font-size: 12.5px; color: var(--sage); font-weight: 600; display: flex; align-items: center; gap: 8px; }
  .rest-card { padding: 28px 14px; text-align: center; background: linear-gradient(135deg, var(--amberMist) 0%, var(--amberHaze) 100%); border-radius: 9px; border: 1px dashed var(--amberLight); }
  .rest-icon { font-size: 36px; margin-bottom: 7px; line-height: 1; }
  .rest-title { font-size: 16px; font-weight: 800; color: var(--amber); margin-bottom: 5px; }
  .rest-sub { font-size: 13px; color: var(--amber); font-weight: 500; opacity: 0.85; }

  /* 편집 행 */
  .edit-row { padding: 9px 9px; background: var(--navyMist); border-left: 3px solid var(--navy); border-bottom: 1px solid var(--hairSoft); border-radius: 6px; margin: 2px 0; box-shadow: 0 3px 10px -3px rgba(14,40,65,0.2); }
  .edit-grid { display: grid; grid-template-columns: 19px 1fr 30px 30px; gap: 9px; align-items: center; margin-bottom: 7px; }
  .edit-meta { display: flex; gap: 8px; align-items: center; padding-left: 28px; flex-wrap: wrap; }
  .edit-inp { width: 100%; height: 30px; padding: 0 10px; font-size: 14px; border: 1px solid var(--hair); border-radius: 5px; background: var(--surface); font-family: inherit; color: var(--ink); outline: none; }
  .edit-btn { width: 30px; height: 30px; border-radius: 5px; cursor: pointer; font-weight: 700; display: flex; align-items: center; justify-content: center; font-family: inherit; flex-shrink: 0; }
  .edit-btn.save { background: var(--sage); color: #fff; border: none; font-size: 15px; }
  .edit-btn.cancel { background: var(--surface); color: var(--muted); border: 1px solid var(--hair); font-size: 13px; }

  /* 모달 */
  .modal-backdrop { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(14,40,65,0.45); backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; z-index: 999; padding: 20px; }
  .modal { background: var(--surface); border-radius: 14px; padding: 22px; max-width: 700px; width: 100%; box-shadow: 0 25px 70px -10px rgba(0,0,0,0.35); max-height: 92vh; overflow-y: auto; }
  .modal-header { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; padding-bottom: 12px; border-bottom: 1px solid var(--hairSoft); }
  .modal-title { font-size: 18px; font-weight: 800; color: var(--ink); flex: 1; }
  .modal-close { width: 30px; height: 30px; border-radius: 6px; border: 1px solid var(--hair); background: var(--surface); cursor: pointer; font-size: 16px; color: var(--muted); }
  .modal-body { display: flex; flex-direction: column; gap: 12px; }
  .modal-info { font-size: 13.5px; color: var(--muted); line-height: 1.6; }
  .modal-info b { color: var(--ink); }
  .modal-textarea { width: 100%; min-height: 130px; padding: 12px; border: 1px solid var(--hair); border-radius: 7px; font-family: var(--fm); font-size: 13px; color: var(--ink); resize: vertical; outline: none; background: var(--surfaceLow); line-height: 1.5; }
  .modal-textarea:focus { border-color: var(--claude); background: var(--surface); }
  .modal-input { width: 100%; height: 38px; padding: 0 12px; font-size: 14px; border: 1px solid var(--hair); border-radius: 7px; font-family: var(--fm); color: var(--ink); outline: none; background: var(--surface); }
  .modal-input:focus { border-color: var(--navy); }
  .modal-label { font-size: 12px; font-weight: 700; color: var(--ink); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 5px; }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 10px; flex-wrap: wrap; }
  .modal-btn { height: 38px; padding: 0 18px; font-size: 14px; font-weight: 700; border-radius: 7px; cursor: pointer; font-family: inherit; }
  .modal-btn.primary { background: var(--claude); color: #fff; border: none; }
  .modal-btn.secondary { background: var(--surface); color: var(--muted); border: 1px solid var(--hair); }
  .modal-btn.danger { background: var(--surface); color: var(--amber); border: 1px solid var(--amberLight); }

// 동적 캘린더 생성 (오늘부터 7일)
function generateCalendar() {
  const today = new Date(TODAY_ISO + "T00:00:00");
  const result = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(today); d.setDate(today.getDate() + i);
    const iso = d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0");
    const dow = d.getDay();
    const event = calendarEvents[iso] || {};
    const holiday = KOREAN_HOLIDAYS[iso];
    const isHoliday = !!holiday;
    const isWeekend = dow === 0 || dow === 6;
    let hourly;
    if (event.hourly) hourly = event.hourly;
    else if (isHoliday) hourly = { kind: "rest", icon: "🎉", title: holiday + " · 휴무", sub: "공휴일입니다" };
    else if (isWeekend) hourly = { kind: "rest", icon: "🌿", title: (dow === 6 ? "토요일" : "일요일") + " · 휴무", sub: "주말입니다" };
    else hourly = { kind: "blocks", blocks: [
      { t: "09:00", e: "10:00", k: "buffer", l: "오전 업무 시작" },
      { t: "10:00", e: "12:00", k: "buffer", l: "주요 업무" },
      { t: "12:00", e: "13:00", k: "lunch" },
      { t: "13:00", e: "15:00", k: "buffer", l: "오후 업무" },

      { t: "17:00", e: "18:00", k: "buffer", l: "일과 정리" },
    ]};
    result.push({
      iso, date: (d.getMonth() + 1) + "/" + d.getDate(),
      weekday: ENGLISH_WEEKDAY[dow], weekdayKr: KOREAN_WEEKDAY[dow],
      isWeekend, isToday: i === 0, isHoliday, holidayName: holiday,
      isCompanyOff: event.isCompanyOff, offName: event.offName, isOpenDay: event.isOpenDay,
      hourly,
    });
  }
  return result;
}

// ── localStorage 영속화 ──
function loadTasks() { try { const r = localStorage.getItem(STORAGE_KEY); if (r) { const p = JSON.parse(r); if (Array.isArray(p) && p.length > 0) return p; } } catch (e) {} return SEED_TASKS.slice(); }

function loadGistConfig() { try { const r = localStorage.getItem(GIST_CONFIG_KEY); return r ? JSON.parse(r) : null; } catch (e) { return null; } }

function isGistConfigured() { const c = loadGistConfig(); return !!(c && c.gistId && c.pat); }

// ── Gist 동기화 ──
let gistETag = null;
let lastGistUpdatedAt = null;
let pushInProgress = false;
let syncStatus = "unconfigured";
let syncStatusMsg = "";

async function pullFromGist(force) {
  const cfg = loadGistConfig();
  if (!cfg || !cfg.gistId) return null;
  try {
    setSyncStatus("syncing");
    const headers = { "Accept": "application/vnd.github+json" };
    if (cfg.pat) headers["Authorization"] = "token " + cfg.pat;
    if (gistETag && !force) headers["If-None-Match"] = gistETag;
    const resp = await fetch("https://api.github.com/gists/" + cfg.gistId, { headers });
    if (resp.status === 304) { setSyncStatus("synced"); return { unchanged: true }; }
    if (!resp.ok) { let m = "HTTP " + resp.status; try { const e = await resp.json(); m = e.message || m; } catch (e) {} throw new Error(m); }
    gistETag = resp.headers.get("ETag");
    const data = await resp.json();
    const filename = cfg.filename || "data.json";
    const file = data.files[filename]; if (!file) throw new Error("파일 없음: " + filename);
    let parsed; try { parsed = JSON.parse(file.content); } catch (e) { throw new Error("JSON 파싱 실패"); }
    setSyncStatus("synced");
    return { tasks: parsed.tasks || [], updatedAt: parsed.updatedAt || data.updated_at, device: parsed.device || "?", gistUpdatedAt: data.updated_at };
  } catch (err) { console.error("pullFromGist failed:", err); setSyncStatus("error", err.message); return null; }
}

async function pushToGist() {
  const cfg = loadGistConfig();
  if (!cfg || !cfg.gistId || !cfg.pat) return false;
  if (pushInProgress) return false;
  pushInProgress = true;
  try {
    setSyncStatus("syncing");
    const filename = cfg.filename || "data.json";
    const payload = { version: "S1", updatedAt: new Date().toISOString(), device: cfg.device || "unknown", tasks: tasks };
    const body = { files: {} }; body.files[filename] = { content: JSON.stringify(payload, null, 2) };
    const resp = await fetch("https://api.github.com/gists/" + cfg.gistId, {
      method: "PATCH",
      headers: { "Authorization": "token " + cfg.pat, "Accept": "application/vnd.github+json", "Content-Type": "application/json" },
      body: JSON.stringify(body)
    });
    if (!resp.ok) { let m = "HTTP " + resp.status; try { const e = await resp.json(); m = e.message || m; } catch (e) {} throw new Error(m); }
    gistETag = resp.headers.get("ETag"); lastGistUpdatedAt = payload.updatedAt;
    setSyncStatus("synced"); return true;
  } catch (err) { console.error("pushToGist failed:", err); setSyncStatus("error", err.message); return false; } finally { pushInProgress = false; }
}

let pushTimer = null;
function debouncedPushToGist() { if (!isGistConfigured()) return; if (pushTimer) clearTimeout(pushTimer); pushTimer = setTimeout(() => { pushToGist(); }, DEBOUNCE_PUSH_MS); }

let pollTimer = null;
function startPolling() {
  if (pollTimer) clearInterval(pollTimer);
  pollTimer = setInterval(async () => {
    if (!isGistConfigured()) return;
    if (pushInProgress || pushTimer) return;
    const r = await pullFromGist(false);
    if (!r || r.unchanged) return;
    if (r.updatedAt && lastGistUpdatedAt && r.updatedAt <= lastGistUpdatedAt) return;
    if (JSON.stringify(r.tasks) === JSON.stringify(tasks)) { lastGistUpdatedAt = r.updatedAt; return; }
    tasks = r.tasks; lastGistUpdatedAt = r.updatedAt; saveTasksLocal(); render();
    showToast("☁ Gist에서 " + r.tasks.length + "건 동기화됨 (" + (r.device || "?") + ")", "success");
  }, POLL_INTERVAL_MS);
}

function setSyncStatus(status, msg) {
  syncStatus = status; syncStatusMsg = msg || "";
  const el = document.querySelector(".sync-status");
  if (el) {
    el.className = "sync-status " + status;
    const dot = el.querySelector(".sync-dot"); if (dot) dot.className = "sync-dot " + status;
    const text = el.querySelector(".sync-text");
    if (text) text.textContent = ({ unconfigured: "미연결", syncing: "동기화 중", synced: "동기화됨", error: "오류" })[status] || "?";
    if (msg) el.title = msg;
  }
}

// ── S1 코덱 ──
function encodeState() {
  const compact = tasks.map(t => [t.id, t.p === "긴급" ? 0 : t.p === "보통" ? 1 : 2, t.title, t.due || "", t.createdAt || "", t.done ? 1 : 0, t.completedAt || ""]);
  return SYNC_VERSION + ":" + btoa(unescape(encodeURIComponent(JSON.stringify(compact))));
}
function decodeState(code) {
  if (!code || typeof code !== "string") throw new Error("코드가 비어있습니다");
  let body = code.trim();
  if (body.indexOf(SYNC_VERSION + ":") === 0) body = body.substring(SYNC_VERSION.length + 1);
  const hi = body.indexOf("#s="); if (hi >= 0) body = body.substring(hi + 3);
  body = body.split(/\s/)[0]; if (!body) throw new Error("디코딩할 데이터 없음");
  const compact = JSON.parse(decodeURIComponent(escape(atob(body))));
  if (!Array.isArray(compact)) throw new Error("배열이 아님");
  return compact.map(c => ({ id: c[0], p: c[1] === 0 ? "긴급" : c[1] === 1 ? "보통" : "여유", title: c[2], due: c[3] || null, createdAt: c[4] || null, done: c[5] === 1, completedAt: c[6] || null }));
}

function copySyncCode() { const code = encodeState(); navigator.clipboard.writeText(code).then(() => showToast("📤 동기화 코드 복사됨", "success")).catch(() => showImportModal("복사", code, true)); }

function closeModal(e) { if (e && e.target && !e.target.classList.contains("modal-backdrop")) return; document.getElementById("modal-host").innerHTML = ""; }
function copyTextarea() { const ta = document.getElementById("sync-textarea"); if (!ta) return; ta.select(); document.execCommand("copy"); showToast("📋 복사됨", "success"); closeModal(); }
function applyImport() {
  const ta = document.getElementById("sync-textarea"); if (!ta) return;
  const code = ta.value.trim(); if (!code) { showToast("코드가 비어있음", "error"); return; }
  try {
    const incoming = decodeState(code);
    if (!Array.isArray(incoming) || incoming.length === 0) throw new Error("유효하지 않은 코드");
    tasks = incoming; saveTasks(); closeModal(); render();
    showToast("✓ Claude 데이터 적용됨 (" + incoming.length + "건)", "success");
  } catch (err) { showToast("❌ 파싱 실패: " + err.message, "error"); }
}

function showToast(msg, kind) {
  const host = document.getElementById("toast-host");
  const klass = kind === "error" ? "error" : kind === "success" ? "success" : "";
  host.innerHTML = '<div class="toast ' + klass + '">' + msg + '</div>';
  const el = host.querySelector(".toast");
  setTimeout(() => el.classList.add("show"), 10);
  setTimeout(() => el.classList.remove("show"), 2800);
  setTimeout(() => host.innerHTML = "", 3200);
}

// Worker 코드 (별도 배포용)
const WORKER_CODE = `export default {
  async fetch(request, env) {
    const url = new URL(request.url);
    const auth = url.searchParams.get('auth');
    if (auth !== env.SHARED_SECRET) return new Response('forbidden', { status: 403 });

    if (url.pathname === '/get') {
      const r = await fetch('https://api.github.com/gists/' + env.GIST_ID, {
        headers: { 'Authorization': 'token ' + env.GH_PAT, 'User-Agent': 'sir-worker', 'Accept': 'application/vnd.github+json' }
      });
      if (!r.ok) return new Response('gist fetch failed: ' + await r.text(), { status: 500 });
      const d = await r.json();
      const f = d.files['data.json'];
      return new Response(f ? f.content : '{}', { headers: { 'Content-Type': 'application/json', 'Access-Control-Allow-Origin': '*' } });
    }

    if (url.pathname === '/update') {
      const dataB64 = url.searchParams.get('data');
      if (!dataB64) return new Response('missing data', { status: 400 });
      let payload;
      try { payload = JSON.parse(atob(dataB64)); }
      catch (e) { return new Response('invalid: ' + e.message, { status: 400 }); }

      const r = await fetch('https://api.github.com/gists/' + env.GIST_ID, {
        method: 'PATCH',
        headers: { 'Authorization': 'token ' + env.GH_PAT, 'Accept': 'application/vnd.github+json', 'Content-Type': 'application/json', 'User-Agent': 'sir-worker' },
        body: JSON.stringify({ files: { 'data.json': { content: JSON.stringify(payload, null, 2) } } })
      });
      if (!r.ok) return new Response('gist update failed: ' + await r.text(), { status: 500 });
      return new Response(JSON.stringify({ ok: true, count: (payload.tasks || []).length, ts: new Date().toISOString() }), {
        headers: { 'Content-Type': 'application/json', 'Access-Control-Allow-Origin': '*' }
      });
    }

    return new Response('not found', { status: 404 });
  }
};`;

function copyWorkerCode() { navigator.clipboard.writeText(WORKER_CODE).then(() => showToast("📋 Worker 코드 복사됨", "success")); }

function buildClaudePrompt(workerUrl, secret) {
  return `[중요] 내 todo 동기화 시스템 정보:
- Worker URL: ${workerUrl}
- Shared Secret: ${secret || "[설정 안 됨]"}
- 현재 데이터 조회: web_fetch GET ${workerUrl}/get?auth=${secret || "SECRET"}
- 데이터 업데이트: web_fetch GET ${workerUrl}/update?auth=${secret || "SECRET"}&data=BASE64ENCODED_JSON

JSON 형식 (data 파라미터에 base64 인코딩):
{"version":"S1","updatedAt":"ISO8601","device":"Claude","tasks":[{"id":1,"p":"긴급|보통|여유","title":"...","due":"YYYY-MM-DD","createdAt":"YYYY-MM-DD","done":false,"completedAt":null}]}

내가 변경 요청 시:
1. /get으로 현재 데이터 조회
2. 변경 적용 후 새 JSON 작성
3. base64 인코딩 후 /update GET 호출
4. 성공 응답 시 "✓ Gist 갱신 완료 (N건)" 보고

이렇게 하면 모든 기기가 30초 내 자동 동기화됩니다.`;
}

async function testAndSaveGist() {
  const gistId = document.getElementById("cfg-gistId").value.trim();
  const pat = document.getElementById("cfg-pat").value.trim();
  const filename = document.getElementById("cfg-filename").value.trim() || "data.json";
  const device = document.getElementById("cfg-device").value.trim() || "unknown";
  if (!gistId) { showToast("Gist ID 필요", "error"); return; }
  if (!pat) { showToast("PAT 필요", "error"); return; }
  showToast("🔌 연결 테스트 중...", "info");
  try {
    const resp = await fetch("https://api.github.com/gists/" + gistId, { headers: { "Authorization": "token " + pat, "Accept": "application/vnd.github+json" } });
    if (!resp.ok) { let m = "HTTP " + resp.status; try { const e = await resp.json(); m = e.message || m; } catch (e) {} throw new Error(m); }
    const data = await resp.json();
    const file = data.files[filename];
    saveGistConfig({ gistId, pat, filename, device });
    closeModal();
    if (file) {
      let remoteData = null; try { remoteData = JSON.parse(file.content); } catch (e) {}
      if (remoteData && Array.isArray(remoteData.tasks) && remoteData.tasks.length > 0) {
        if (confirm("Gist에 " + remoteData.tasks.length + "건의 데이터가 있습니다.\n[OK] = Gist 데이터로 덮어쓰기\n[취소] = 로컬 데이터를 Gist에 푸시")) {
          tasks = remoteData.tasks; saveTasksLocal(); lastGistUpdatedAt = remoteData.updatedAt;
          showToast("✓ Gist에서 " + tasks.length + "건 가져옴", "success"); render();
        } else { await pushToGist(); showToast("✓ 로컬 " + tasks.length + "건 푸시", "success"); }
      } else { await pushToGist(); showToast("✓ 초기 푸시 완료 (" + tasks.length + "건)", "success"); }
    } else { await pushToGist(); showToast("✓ " + filename + " 신규 생성 완료", "success"); }
    startPolling(); render();
  } catch (err) { showToast("❌ 연결 실패: " + err.message, "error"); }
}

function disconnectGist() {
  if (!confirm("Gist 연결을 해제하시겠습니까? 로컬 데이터는 유지됩니다.")) return;
  clearGistConfig();
  if (pollTimer) clearInterval(pollTimer);
  setSyncStatus("unconfigured"); closeModal(); render();
  showToast("Gist 연결 해제됨", "info");
}

  const url = document.getElementById("wcfg-url").value.trim().replace(/\/$/, "");
  const secret = document.getElementById("wcfg-secret").value.trim();
  if (!url) { showToast("Worker URL 필요", "error"); return; }
  if (!secret) { showToast("Shared Secret 필요", "error"); return; }
  showToast("⚡ Worker 연결 테스트 중...", "info");
  try {
    const resp = await fetch(url + "/get?auth=" + encodeURIComponent(secret));
    if (!resp.ok) { let m = "HTTP " + resp.status; try { const t = await resp.text(); m = t || m; } catch (e) {} throw new Error(m); }
    saveWorkerConfig({ url, secret });
    closeModal(); render();
    showToast("✓ Worker 연결 성공", "success");
    showSettingsModal("worker");
  } catch (err) { showToast("❌ Worker 연결 실패: " + err.message, "error"); }
}

function disconnectWorker() {
  if (!confirm("Worker 연결을 해제하시겠습니까?")) return;

async function manualSync() {
  if (!isGistConfigured()) { showSettingsModal("gist"); return; }
  showToast("🔄 수동 동기화 중...", "info");
  const r = await pullFromGist(true);
  if (!r) return;
  if (r.unchanged) { showToast("✓ 이미 최신 상태", "success"); return; }
  if (JSON.stringify(r.tasks) !== JSON.stringify(tasks)) {
    if (confirm("Gist 데이터가 다릅니다.\n[OK] = 가져오기 / [취소] = 로컬을 Gist에 푸시")) {
      tasks = r.tasks; lastGistUpdatedAt = r.updatedAt; saveTasksLocal(); render();
      showToast("✓ Gist에서 " + tasks.length + "건 가져옴", "success");
    } else { await pushToGist(); showToast("✓ 로컬 " + tasks.length + "건 푸시", "success"); }
  } else { showToast("✓ 동기화됨 (변경 없음)", "success"); }
}

// ── URL Hash 자동 적용 (북마크릿/단축어용) ──
function tryLoadFromUrlHash() {
  try {
    const hash = window.location.hash;
    const params = new URLSearchParams(hash.startsWith("#") ? hash.substring(1) : hash);
    const sCode = params.get("s");
    const autoApply = params.get("auto") === "1";
    if (!sCode) return false;
    const code = SYNC_VERSION + ":" + sCode;
    const incoming = decodeState(code);
    const apply = autoApply || confirm("URL에서 동기화 데이터 감지됨. 적용하시겠습니까?");
    if (apply) {
      tasks = incoming;
      saveTasks(); render();
      showToast("✓ URL에서 " + tasks.length + "건 자동 적용", "success");
      history.replaceState(null, "", window.location.pathname + window.location.search);
      return true;
    }
  } catch (e) { console.warn("URL hash parse failed:", e); }
  return false;
}

// ── postMessage 수신 (iframe/iOS Shortcut 지원) ──
window.addEventListener("message", (e) => {
  if (e.data && e.data.type === "SIR_TODO_SYNC" && e.data.code) {
    try {
      const incoming = decodeState(e.data.code);
      tasks = incoming; saveTasks(); render();
      showToast("✓ 외부 메시지에서 " + tasks.length + "건 동기화", "success");
    } catch (err) { showToast("❌ postMessage 파싱 실패", "error"); }
  }
});

// ── 초기화 ──
async function bootstrap() {
  const fromHash = tryLoadFromUrlHash();
  render();
  if (isGistConfigured() && !fromHash) {
    setSyncStatus("syncing");
    const r = await pullFromGist(true);
    if (r && !r.unchanged && r.tasks.length > 0 && JSON.stringify(r.tasks) !== JSON.stringify(tasks)) {
      tasks = r.tasks; lastGistUpdatedAt = r.updatedAt; saveTasksLocal(); render();
      showToast("☁ Gist에서 " + tasks.length + "건 로드됨", "success");
    }
    startPolling();
  } else if (isGistConfigured()) { startPolling(); }
  else { setSyncStatus("unconfigured"); }
}
bootstrap();

// ── 24시간 후 자동 새로고침 (날짜 갱신용) ──
setTimeout(() => location.reload(), 24 * 60 * 60 * 1000);
</script>
</body>
</html>
