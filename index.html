<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#F0E7D5" />
<title>Sir's Tasks · v6</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.min.css" rel="stylesheet">
<style>
:root{
--bg:#F0E7D5;--bg-soft:#F5EEDD;--surface:#FFFFFF;
--hair:#E5DDC9;--hair-soft:#F2EBD9;--hair-d:#D4C9AF;
--t1:#1F2937;--t2:#6B7280;--t3:#9CA3AF;--t-inv:#FFFFFF;
--c-red:#DC2626;--c-red-s:#FEE2E2;--c-amb:#D97706;--c-amb-s:#FEF3C7;
--c-grn:#16A34A;--c-grn-s:#DCFCE7;--c-teal:#0D9488;--c-teal-s:#CCFBF1;
--c-lime:#84CC16;--c-lime-s:#ECFCCB;--c-blue:#3B82F6;
--font-sans:'Pretendard Variable',Pretendard,-apple-system,BlinkMacSystemFont,sans-serif;
--font-mono:ui-monospace,SFMono-Regular,"SF Mono",Menlo,Consolas,monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:var(--font-sans);background:var(--bg);color:var(--t1);font-size:13px;line-height:1.5;font-feature-settings:"ss01","tnum";-webkit-font-smoothing:antialiased;overflow-x:hidden}
button{font:inherit;cursor:pointer;border:none;background:none;color:inherit}
.app{max-width:1280px;margin:0 auto;padding:24px 28px 36px}
.top{background:var(--surface);border:1px solid var(--hair);border-radius:14px;padding:14px 20px;display:grid;grid-template-columns:auto 1fr auto;gap:18px;align-items:center;margin-bottom:18px}
.top-brand{display:flex;align-items:baseline;gap:10px}
.top-brand .ey{font-family:var(--font-mono);font-size:10px;font-weight:600;letter-spacing:.2em;color:var(--t3);text-transform:uppercase}
.top-brand .ti{font-size:18px;font-weight:700;color:var(--t1);letter-spacing:-.02em}
.top-brand .dt{font-family:var(--font-mono);font-size:12px;color:var(--t3);letter-spacing:.04em;margin-left:6px}
.top-input{display:flex;align-items:center;gap:10px;padding:8px 14px;border-radius:8px;background:var(--bg-soft);border:1px solid transparent;transition:border-color 120ms}
.top-input:focus-within{border-color:var(--hair-d);background:var(--surface)}
.top-input .plus{color:var(--t3);font-size:16px;font-weight:300}
.top-input input{flex:1;border:none;outline:none;background:transparent;font:inherit;color:var(--t1);font-size:13px;min-width:0}
.top-input input::placeholder{color:var(--t3)}
.top-input .kbd{display:flex;gap:4px;color:var(--t3)}
.kbd-key{font-family:var(--font-mono);font-size:10px;font-weight:500;padding:2px 6px;border-radius:4px;background:var(--surface);border:1px solid var(--hair);color:var(--t2)}
.top-actions{display:flex;gap:6px}
.top-icon{width:34px;height:34px;border-radius:8px;background:var(--surface);border:1px solid var(--hair);display:flex;align-items:center;justify-content:center;color:var(--t2);font-size:16px;transition:all 120ms}
.top-icon:hover{background:var(--bg-soft);color:var(--t1)}
.filters{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.fbtn{padding:8px 14px;border-radius:8px;background:var(--surface);border:1px solid var(--hair);font-size:12.5px;font-weight:500;color:var(--t2);display:inline-flex;align-items:center;gap:8px;transition:all 120ms}
.fbtn:hover{background:var(--bg-soft);color:var(--t1)}
.fbtn.on{background:var(--t1);color:var(--t-inv);border-color:var(--t1);font-weight:600}
.fbtn .cnt{font-family:var(--font-mono);font-size:11px;font-weight:600;color:var(--t3);letter-spacing:-.02em}
.fbtn.on .cnt{color:rgba(255,255,255,.6)}
.fbtn.danger.on{background:var(--c-red);border-color:var(--c-red)}
.fbtn.success.on{background:var(--c-grn);border-color:var(--c-grn)}
.body{display:grid;grid-template-columns:1.6fr 1fr;gap:18px;align-items:start}
.tcol{background:var(--surface);border:1px solid var(--hair);border-radius:14px;padding:18px 20px;min-height:400px}
.tcol-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px}
.tcol-head .sort{font-size:11px;color:var(--t3);font-weight:500}
.grp{margin-top:18px}.grp:first-child{margin-top:0}
.grp-h{display:flex;align-items:baseline;gap:8px;padding-bottom:8px;margin-bottom:2px}
.grp-h .dot{width:8px;height:8px;border-radius:50%}
.grp-h .lbl{font-size:13px;font-weight:600;color:var(--t1);letter-spacing:-.005em}
.grp-h .cnt{font-family:var(--font-mono);font-size:12px;color:var(--t3);font-weight:500}
.grp.overdue .dot{background:var(--c-red)}.grp.overdue .lbl{color:var(--c-red)}
.grp.today .dot{background:var(--c-amb)}.grp.today .lbl{color:var(--c-amb)}
.grp.week .dot{background:var(--c-grn)}.grp.week .lbl{color:var(--c-grn)}
.grp.later .dot,.grp.done .dot{background:var(--t3)}
.grp.later .lbl,.grp.done .lbl{color:var(--t2)}
.tk{display:grid;grid-template-columns:18px 1fr auto;gap:14px;align-items:start;padding:13px 14px 13px 18px;border-bottom:1px solid var(--hair-soft);position:relative;cursor:pointer;transition:background 120ms}
.tk:last-child{border-bottom:none}.tk:hover{background:var(--bg-soft)}
.tk::before{content:'';position:absolute;left:0;top:8px;bottom:8px;width:4px;border-radius:2px;background:transparent}
.tk.bar-red::before{background:var(--c-red)}
.tk.bar-amb::before{background:var(--c-amb)}
.tk.bar-grn::before{background:var(--c-grn)}
.tk.bar-mute::before{background:var(--hair-d)}
.cb{width:18px;height:18px;border:1.5px solid var(--hair-d);border-radius:5px;background:var(--surface);position:relative;margin-top:1px;flex-shrink:0;transition:all 120ms}
.tk:hover .cb{border-color:var(--c-grn)}
.cb.on{background:var(--c-grn);border-color:var(--c-grn)}
.cb.on::after{content:'';position:absolute;left:5px;top:1px;width:5px;height:9px;border:solid white;border-width:0 1.6px 1.6px 0;transform:rotate(45deg)}
.tk-body{min-width:0}
.tk-title{font-size:14px;font-weight:600;color:var(--t1);letter-spacing:-.01em;line-height:1.4;word-break:keep-all}
.tk.done .tk-title{color:var(--t3);text-decoration:line-through;text-decoration-color:var(--hair-d);font-weight:500}
.tk-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:6px;font-size:12px}
.badge-overdue{display:inline-flex;align-items:center;gap:3px;background:var(--c-red);color:white;font-size:11px;font-weight:600;padding:3px 8px;border-radius:5px;letter-spacing:-.005em}
.badge-overdue::before{content:'\26A0';font-size:10px}
.pri-urg{color:var(--c-red);font-weight:600;font-size:12px}
.pri-hi{color:var(--c-amb);font-weight:600;font-size:12px}
.pri-norm{color:var(--c-grn);font-weight:600;font-size:12px}
.tk-meta .dotsep{color:var(--t3);font-size:10px}
.tk-meta .info{color:var(--t2);font-size:12px}
.tk-actions{display:flex;gap:4px;opacity:0;transition:opacity 120ms;align-items:center;margin-top:1px}
.tk:hover .tk-actions{opacity:1}
.tk-act{width:28px;height:28px;border-radius:6px;background:var(--bg-soft);border:1px solid var(--hair);color:var(--t2);font-size:12px;display:flex;align-items:center;justify-content:center;transition:all 120ms}
.tk-act:hover{background:var(--surface);color:var(--t1);border-color:var(--hair-d)}
.empty{padding:48px 24px;text-align:center;color:var(--t3);font-size:13px}
.empty-i{font-size:32px;margin-bottom:12px;opacity:.5}
.today{background:var(--surface);border:1px solid var(--hair);border-radius:14px;padding:18px 20px}
.today-h{display:flex;align-items:center;gap:6px;margin-bottom:4px;color:var(--t2)}
.today-h .ic{font-size:13px}
.today-h .lbl{font-family:var(--font-mono);font-size:11px;font-weight:600;letter-spacing:.14em;text-transform:uppercase}
.today-d{font-size:20px;font-weight:700;color:var(--t1);letter-spacing:-.02em;margin-bottom:14px}
.cap-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px;font-size:12px}
.cap-row .l{color:var(--t2)}.cap-row .r{color:var(--c-blue);font-weight:600}
.cap-bar{display:flex;height:6px;border-radius:3px;overflow:hidden;background:var(--hair-soft);margin-bottom:14px}
.cap-seg{height:100%}.cap-seg.busy{background:var(--c-grn)}
.cap-seg.lunch{background:var(--c-red)}.cap-seg.free{background:var(--hair)}
.slots{display:flex;flex-direction:column;gap:5px;margin-bottom:14px}
.slot{display:grid;grid-template-columns:24px 1fr;gap:8px;align-items:start;min-height:24px}
.slot-t{font-family:var(--font-mono);font-size:11px;color:var(--t3);letter-spacing:-.02em;padding-top:6px}
.slot-c{border-radius:6px;padding:6px 10px;font-size:12.5px;font-weight:500;color:var(--t1);display:flex;align-items:center;gap:8px;line-height:1.3}
.slot-c.teal{background:var(--c-teal-s);color:#0F766E}
.slot-c.lime{background:var(--c-lime-s);color:#4D7C0F}
.slot-c.beige{background:var(--bg-soft);color:var(--t2)}
.slot-c.teal-d{background:#5EEAD4;color:#134E4A}
.slot-c .cnum{font-family:var(--font-mono);font-size:10.5px;font-weight:600;letter-spacing:-.02em;opacity:.7}
.slot-empty{padding:5px 0;font-size:11.5px;color:var(--t3);font-style:italic;font-family:var(--font-mono);letter-spacing:-.01em;margin-left:32px}
.kbds{border-top:1px solid var(--hair);padding-top:14px;margin-top:6px}
.kbds-h{font-size:11px;color:var(--t2);margin-bottom:8px;font-weight:600}
.kbds-row{display:flex;justify-content:space-between;padding:4px 0;font-size:11.5px}
.kbds-row .l{color:var(--t2)}
.kbds-row .r{font-family:var(--font-mono);font-size:10.5px;color:var(--t1);font-weight:600}
.foot{margin-top:18px;padding-top:12px;display:flex;justify-content:space-between;align-items:center;font-family:var(--font-mono);font-size:10px;color:var(--t3);letter-spacing:.04em}
.foot .acts{display:flex;gap:14px}
.foot .acts a{color:var(--t2);cursor:pointer;text-decoration:none}.foot .acts a:hover{color:var(--t1)}
.foot .live{display:inline-flex;align-items:center;gap:5px}
.foot .live::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--c-grn)}
.modal-bg{position:fixed;inset:0;background:rgba(31,41,55,.4);display:none;align-items:center;justify-content:center;z-index:100;padding:20px}
.modal-bg.on{display:flex}
.modal{background:var(--surface);border-radius:14px;width:540px;max-width:100%;max-height:90vh;overflow-y:auto;border:1px solid var(--hair)}
.modal-h{padding:18px 22px 14px;border-bottom:1px solid var(--hair);display:flex;justify-content:space-between;align-items:center}
.modal-h .ti{font-size:15px;font-weight:700;color:var(--t1);letter-spacing:-.01em}
.modal-h .x{width:28px;height:28px;border-radius:6px;color:var(--t3);font-size:18px;display:flex;align-items:center;justify-content:center}
.modal-h .x:hover{background:var(--bg-soft);color:var(--t1)}
.modal-b{padding:18px 22px}
.modal-b h3{font-size:11px;font-weight:600;color:var(--t2);text-transform:uppercase;letter-spacing:.1em;margin:16px 0 8px;font-family:var(--font-mono)}
.modal-b h3:first-child{margin-top:0}
.modal-b p{font-size:12.5px;color:var(--t2);margin-bottom:8px;line-height:1.55}
.modal-b input[type=text],.modal-b input[type=url]{width:100%;padding:9px 12px;border:1px solid var(--hair);border-radius:7px;font-size:12.5px;background:var(--bg-soft);font-family:var(--font-sans);color:var(--t1);outline:none}
.modal-b input:focus{background:var(--surface);border-color:var(--hair-d)}
.modal-actions{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.btn{padding:9px 16px;border-radius:7px;font-size:12.5px;font-weight:600;background:var(--t1);color:var(--t-inv);transition:background 120ms;letter-spacing:-.005em}
.btn:hover{background:#000}
.btn.sec{background:var(--bg-soft);color:var(--t1);border:1px solid var(--hair)}
.btn.sec:hover{background:var(--surface);border-color:var(--hair-d)}
.btn.danger{background:var(--c-red)}.btn.danger:hover{background:#B91C1C}
.modal-msg{font-size:11.5px;color:var(--t2);margin-top:8px;padding:8px 12px;background:var(--bg-soft);border-radius:6px;line-height:1.5}
.modal-msg.ok{color:#15803D;background:var(--c-grn-s)}
.modal-msg.err{color:#B91C1C;background:var(--c-red-s)}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--t1);color:var(--t-inv);padding:11px 20px;border-radius:8px;font-size:12.5px;font-weight:500;z-index:200;box-shadow:0 6px 20px rgba(0,0,0,.18)}
@media(max-width:768px){
  .app{padding:16px}
  .top{grid-template-columns:1fr;gap:10px;padding:12px 14px}
  .top-brand{justify-content:center}
  .top-input .kbd{display:none}
  .body{grid-template-columns:1fr;gap:14px}
}
</style>
</head>
<body>
<div class="app">
  <header class="top">
    <div class="top-brand">
      <span class="ey">SIR'S</span>
      <span class="ti">Tasks</span>
      <span class="dt" id="topDate">5.9 SAT</span>
    </div>
    <div class="top-input">
      <span class="plus">+</span>
      <input id="quickInput" type="text" placeholder="새 할 일... 또는 검색" />
      <span class="kbd"><span class="kbd-key">N</span><span class="kbd-key">⌘K</span></span>
    </div>
    <div class="top-actions">
      <button class="top-icon" id="btnSync" title="캘린더 동기화">⟳</button>
      <button class="top-icon" id="btnSettings" title="설정">⚙</button>
    </div>
  </header>
  <div class="filters" id="filters"></div>
  <div class="body">
    <div class="tcol">
      <div class="tcol-head"><span></span><span class="sort">우선순위 정렬</span></div>
      <div id="taskList"></div>
    </div>
    <div class="today" id="todayPanel"></div>
  </div>
  <footer class="foot">
    <span id="footStatus" class="live">never synced</span>
    <div class="acts">
      <a id="actExport">export</a>
      <a id="actImport">import</a>
      <a id="actClear">reset</a>
    </div>
  </footer>
</div>
<div class="modal-bg" id="modal">
  <div class="modal">
    <div class="modal-h">
      <span class="ti">⚙ 설정</span>
      <button class="x" id="modalClose">×</button>
    </div>
    <div class="modal-b">
      <h3>캘린더 연동 (ICS)</h3>
      <p>Outlook 캘린더 게시 URL 또는 .ics 파일로 일정을 가져옵니다. URL이 CORS 차단되면 Worker proxy로 자동 우회.</p>
      <input id="icsUrl" type="url" placeholder="https://outlook.office365.com/.../calendar.ics" />
      <div class="modal-actions">
        <button class="btn" id="btnIcsFetch">URL에서 가져오기</button>
        <button class="btn sec" id="btnIcsFile">파일 업로드</button>
        <button class="btn sec" id="btnIcsAuto">5분 자동 동기화</button>
      </div>
      <div class="modal-msg" id="icsMsg" style="display:none"></div>
      <h3>Worker 동기화 (Gist)</h3>
      <div class="modal-actions">
        <button class="btn sec" id="btnSyncPull">Gist에서 가져오기</button>
        <button class="btn sec" id="btnSyncPush">Gist로 보내기</button>
      </div>
      <div class="modal-msg" id="syncMsg" style="display:none"></div>
      <h3>데이터</h3>
      <div class="modal-actions">
        <button class="btn sec" id="btnReseed">샘플 데이터로 초기화</button>
        <button class="btn danger" id="btnNuke">전체 삭제</button>
      </div>
    </div>
  </div>
</div>
<input type="file" id="icsFileInput" accept=".ics,text/calendar" style="display:none" />
<script>
const STORAGE_KEY='sir-todo-v3';
const ICS_URL_KEY='sir-ics-url';
const WORKER_URL='https://sir-todo-sync.playbwv.workers.dev';
const SHARED_SECRET='Sir-Kolon-2026-Sync';

const SEED={
  tasks:[
    {id:'t1',title:'KMG 임원/팀장/실무자 오전 교육 프로그램 확정',due:'2026-05-09',priority:'urgent',done:false,duration:60,category:'KMG'},
    {id:'t2',title:'한화솔루션 발표자료 수정',due:'2026-05-09',priority:'high',done:false,duration:90,category:'HWS'},
    {id:'t3',title:'KMG DX 교육 자료 최종 검토 — Lab 1·2·3',due:'2026-05-12',priority:'urgent',done:false,duration:120,category:'KMG'},
    {id:'t4',title:'KMC Sales KPI 보고서 정리 — 3-Tier 드릴다운',due:'2026-05-15',priority:'high',done:false,duration:120,category:'KMC'},
    {id:'t5',title:'데이터분석과제 정기점검 자료 정리',due:'2026-05-16',priority:'normal',done:false,duration:45,category:'PRJ'},
    {id:'t6',title:'M.AX 트랙강연 D-29 메일 + DX본부장 결재',due:'2026-05-18',priority:'urgent',done:false,duration:30,category:'MAX'},
    {id:'t7',title:'KDA-REF 자산 정리 및 Notion 동기화',due:'2026-05-30',priority:'normal',done:false,duration:60,category:'ADMIN'},
    {id:'t8',title:'4월 영업회계 마감 정산 확인',due:'2026-05-09',priority:'urgent',done:true,duration:30,category:'ADMIN'},
    {id:'t9',title:'Tampermonkey 유저스크립트 첫 동기화 검증',due:'2026-05-09',priority:'normal',done:true,duration:15,category:'DEV'}
  ],
  events:[
    {date:'2026-05-12',time:'10:00',title:'제조DX 영업회의',duration:90,type:'outlook',color:'teal'},
    {date:'2026-05-13',time:'14:00',title:'DX본부 주간회의',duration:60,type:'outlook',color:'teal-d'},
    {date:'2026-05-14',time:'10:00',title:'KMG DX 교육 Day 1',duration:480,type:'outlook',color:'lime'}
  ],
  lastSync:''
};

let state=load();
let activeFilter='all';

function load(){
  try{
    const raw=localStorage.getItem(STORAGE_KEY);
    if(!raw)return structuredClone(SEED);
    const p=JSON.parse(raw);
    if(!p.tasks)p.tasks=[];if(!p.events)p.events=[];
    return p;
  }catch(e){return structuredClone(SEED)}
}
function save(){
  state.lastSync=new Date().toISOString();
  localStorage.setItem(STORAGE_KEY,JSON.stringify(state));
  render();
}

const fmtDate=(d)=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
const today=()=>fmtDate(new Date());
const dayDiff=(a,b)=>Math.round((new Date(a)-new Date(b))/86400000);
const weekday=['SUN','MON','TUE','WED','THU','FRI','SAT'];

function group(t){
  if(t.done)return 'done';
  const d=dayDiff(t.due,today());
  if(d<0)return 'overdue';
  if(d===0)return 'today';
  if(d<=7)return 'week';
  return 'later';
}
function priLabel(p){return p==='urgent'?'긴급':(p==='high'?'보통':'여유')}
function priClass(p){return p==='urgent'?'pri-urg':(p==='high'?'pri-hi':'pri-norm')}
function barClass(t){
  if(t.done)return 'bar-mute';
  const g=group(t);
  if(g==='overdue')return 'bar-red';
  if(g==='today')return t.priority==='urgent'?'bar-red':'bar-amb';
  if(g==='week')return 'bar-grn';
  return 'bar-mute';
}
function dueDisplay(t){
  const d=dayDiff(t.due,today());
  if(d<0)return null;
  const dt=new Date(t.due);
  return `${dt.getMonth()+1}.${dt.getDate()} 마감`;
}
function esc(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c])}

function render(){
  renderTopDate();renderFilters();renderTasks();renderToday();renderFoot();
}

function renderTopDate(){
  const now=new Date();
  document.getElementById('topDate').textContent=`${now.getMonth()+1}.${now.getDate()} ${weekday[now.getDay()]}`;
}

function renderFilters(){
  const t=state.tasks;
  const tabs=[
    {k:'all',l:'전체',c:t.length,cls:''},
    {k:'today',l:'오늘',c:t.filter(x=>!x.done&&x.due===today()).length,cls:''},
    {k:'overdue',l:'지연',c:t.filter(x=>!x.done&&dayDiff(x.due,today())<0).length,cls:'danger'},
    {k:'done',l:'완료',c:t.filter(x=>x.done).length,cls:'success'}
  ];
  document.getElementById('filters').innerHTML=tabs.map(tb=>
    `<button class="fbtn ${tb.cls} ${activeFilter===tb.k?'on':''}" data-f="${tb.k}">${tb.l} <span class="cnt">${tb.c}</span></button>`
  ).join('');
  document.querySelectorAll('.fbtn').forEach(b=>b.addEventListener('click',()=>{activeFilter=b.dataset.f;render()}));
}

function renderTasks(){
  let list=state.tasks.slice();
  if(activeFilter==='today')list=list.filter(t=>!t.done&&t.due===today());
  else if(activeFilter==='overdue')list=list.filter(t=>!t.done&&dayDiff(t.due,today())<0);
  else if(activeFilter==='done')list=list.filter(t=>t.done);
  const groups={
    overdue:{lbl:'지연',cls:'overdue',tasks:[]},
    today:{lbl:'오늘 마감',cls:'today',tasks:[]},
    week:{lbl:'이번 주',cls:'week',tasks:[]},
    later:{lbl:'다음 주+',cls:'later',tasks:[]},
    done:{lbl:'완료',cls:'done',tasks:[]}
  };
  list.forEach(t=>groups[group(t)].tasks.push(t));
  const priOrder={urgent:0,high:1,normal:2};
  Object.values(groups).forEach(g=>g.tasks.sort((a,b)=>(priOrder[a.priority]-priOrder[b.priority])||(a.due.localeCompare(b.due))));
  const order=['overdue','today','week','later','done'];
  const html=order.filter(k=>groups[k].tasks.length>0).map(k=>{
    const g=groups[k];
    return `<div class="grp ${g.cls}"><div class="grp-h"><span class="dot"></span><span class="lbl">${g.lbl}</span><span class="cnt">${g.tasks.length}</span></div>${g.tasks.map(taskHTML).join('')}</div>`;
  }).join('');
  document.getElementById('taskList').innerHTML=html||`<div class="empty"><div class="empty-i">∅</div>표시할 항목이 없습니다</div>`;
  document.querySelectorAll('.tk').forEach(el=>{
    el.addEventListener('click',e=>{if(e.target.closest('.cb')||e.target.closest('.tk-act'))return;editTask(el.dataset.id)});
    el.querySelector('.cb').addEventListener('click',e=>{e.stopPropagation();toggleTask(el.dataset.id)});
    const sn=el.querySelector('.act-snooze');if(sn)sn.addEventListener('click',e=>{e.stopPropagation();snoozeTask(el.dataset.id)});
    const ed=el.querySelector('.act-edit');if(ed)ed.addEventListener('click',e=>{e.stopPropagation();editTask(el.dataset.id)});
  });
}

function taskHTML(t){
  const overdueDays=!t.done&&dayDiff(t.due,today())<0?Math.abs(dayDiff(t.due,today())):0;
  const overdueBadge=overdueDays>0?`<span class="badge-overdue">${overdueDays}d 지연</span>`:'';
  const dueLbl=dueDisplay(t);
  return `<div class="tk ${barClass(t)}${t.done?' done':''}" data-id="${t.id}">
    <span class="cb${t.done?' on':''}"></span>
    <div class="tk-body">
      <div class="tk-title">${esc(t.title)}</div>
      <div class="tk-meta">
        ${overdueBadge}
        <span class="${priClass(t.priority)}">${priLabel(t.priority)}</span>
        ${dueLbl?`<span class="dotsep">·</span><span class="info">${dueLbl}</span>`:''}
        ${t.duration?`<span class="dotsep">·</span><span class="info">${t.duration}min</span>`:''}
        ${t.scheduled?`<span class="dotsep">·</span><span class="info">${t.scheduled} 배치</span>`:''}
      </div>
    </div>
    <div class="tk-actions">
      <button class="tk-act act-snooze" title="기한 +1일">⏱</button>
      <button class="tk-act act-edit" title="편집">✎</button>
    </div>
  </div>`;
}

function renderToday(){
  const t=today();
  const evs=state.events.filter(e=>e.date===t).sort((a,b)=>a.time.localeCompare(b.time));
  let busyMin=0,lunchMin=0;
  evs.forEach(e=>{if(e.color==='beige')lunchMin+=e.duration||60;else busyMin+=e.duration||60});
  const totalMin=8*60;
  const freeMin=Math.max(0,totalMin-busyMin-lunchMin);
  const usableMin=totalMin-lunchMin;
  const busyPct=Math.min(100,(busyMin/totalMin)*100);
  const lunchPct=Math.min(100,(lunchMin/totalMin)*100);
  const freePct=Math.max(0,100-busyPct-lunchPct);
  const slotsHTML=[];
  const usedHours=new Set(evs.map(e=>parseInt(e.time.split(':')[0])));
  for(let h=10;h<=17;h++){
    const hourLabel=String(h).padStart(2,'0');
    const hourEvs=evs.filter(e=>parseInt(e.time.split(':')[0])===h);
    if(hourEvs.length>0){
      hourEvs.forEach(e=>{
        slotsHTML.push(`<div class="slot"><span class="slot-t">${hourLabel}</span><div class="slot-c ${e.color||'teal'}"><span class="cnum">${hourLabel}</span><span>${esc(e.title)}</span></div></div>`);
      });
    }else if(!usedHours.has(h)){
      slotsHTML.push(`<div class="slot-empty">${hourLabel}:00 빈 시간</div>`);
    }
  }
  const now=new Date();
  document.getElementById('todayPanel').innerHTML=`
    <div class="today-h"><span class="ic">⏰</span><span class="lbl">TODAY</span></div>
    <div class="today-d">${now.getMonth()+1}.${now.getDate()} ${weekday[now.getDay()]}</div>
    <div class="cap-row"><span class="l">가용 ${Math.round(usableMin/60)}h</span><span class="r">배치 ${Math.round(busyMin/60)}h · 남은 ${Math.round(freeMin/60)}h</span></div>
    <div class="cap-bar">
      <div class="cap-seg busy" style="width:${busyPct}%"></div>
      <div class="cap-seg lunch" style="width:${lunchPct}%"></div>
      <div class="cap-seg free" style="width:${freePct}%"></div>
    </div>
    <div class="slots">${slotsHTML.join('')||'<div class="slot-empty">오늘 일정 없음</div>'}</div>
    <div class="kbds">
      <div class="kbds-h">단축키</div>
      <div class="kbds-row"><span class="l">새 할 일</span><span class="r">N</span></div>
      <div class="kbds-row"><span class="l">검색</span><span class="r">⌘K</span></div>
      <div class="kbds-row"><span class="l">완료</span><span class="r">Space</span></div>
      <div class="kbds-row"><span class="l">편집</span><span class="r">E</span></div>
    </div>`;
}

function renderFoot(){
  const last=state.lastSync?new Date(state.lastSync):null;
  document.getElementById('footStatus').innerHTML=last
    ?`synced — ${last.getFullYear()}.${String(last.getMonth()+1).padStart(2,'0')}.${String(last.getDate()).padStart(2,'0')} ${String(last.getHours()).padStart(2,'0')}:${String(last.getMinutes()).padStart(2,'0')}`
    :'never synced';
}

function toggleTask(id){const t=state.tasks.find(x=>x.id===id);if(t){t.done=!t.done;save()}}
function editTask(id){
  const t=state.tasks.find(x=>x.id===id);if(!t)return;
  const newTitle=prompt('수정 (비우면 삭제)',t.title);
  if(newTitle===null)return;
  if(newTitle.trim()==='')state.tasks=state.tasks.filter(x=>x.id!==id);
  else t.title=newTitle.trim();
  save();
}
function snoozeTask(id){
  const t=state.tasks.find(x=>x.id===id);if(!t)return;
  const d=new Date(t.due);d.setDate(d.getDate()+1);t.due=fmtDate(d);
  save();flash('기한 +1일');
}

const quickInput=document.getElementById('quickInput');
quickInput.addEventListener('keydown',e=>{
  if(e.key==='Enter'){
    const title=quickInput.value.trim();if(!title)return;
    state.tasks.push({id:'t'+Date.now(),title,due:today(),priority:'normal',done:false,duration:30,category:''});
    quickInput.value='';save();flash('추가됨');

});

document.addEventListener('keydown',e=>{
  if(document.querySelector('.modal-bg.on'))return;
  const inField=['INPUT','TEXTAREA'].includes(document.activeElement.tagName);
  if(inField){if(e.key==='Escape')document.activeElement.blur();return}
  if(e.key==='n'||e.key==='N'){e.preventDefault();quickInput.focus()}
  if((e.metaKey||e.ctrlKey)&&e.key==='k'){e.preventDefault();quickInput.focus();quickInput.select()}
});

/* ─── ICS Calendar ─── */
function parseICSDate(v){
  const isUTC=v.endsWith('Z');
  const clean=v.replace(/[TZ]/g,'').replace(/[-:]/g,'');
  const Y=parseInt(clean.substr(0,4));
  const M=parseInt(clean.substr(4,2))-1;
  const D=parseInt(clean.substr(6,2));
  const h=parseInt(clean.substr(8,2)||'0');
  const m=parseInt(clean.substr(10,2)||'0');
  return isUTC?new Date(Date.UTC(Y,M,D,h,m)):new Date(Y,M,D,h,m);
}
function parseICS(text){
  const unfolded=text.replace(/\r\n[ \t]/g,'').replace(/\n[ \t]/g,'');
  const lines=unfolded.split(/\r?\n/);
  const events=[];let cur=null;
  for(const line of lines){
    if(line==='BEGIN:VEVENT')cur={};
    else if(line==='END:VEVENT'&&cur){if(cur.dtstart)events.push(cur);cur=null}
    else if(cur){
      const idx=line.indexOf(':');if(idx<=0)continue;
      const key=line.substring(0,idx).split(';')[0];
      const val=line.substring(idx+1);
      if(key==='SUMMARY')cur.summary=val.replace(/\\,/g,',').replace(/\\n/g,' ');
      else if(key==='DTSTART')cur.dtstart=parseICSDate(val);
      else if(key==='DTEND')cur.dtend=parseICSDate(val);
      else if(key==='UID')cur.uid=val;
    }
  }
  return events;
}
function hashStr(s){let h=0;for(const c of s)h=((h<<5)-h+c.charCodeAt(0))|0;return h}
function icsToEvents(icsEvents){
  const colors=['teal','lime','teal-d'];
  return icsEvents.map(e=>{
    const start=e.dtstart;
    const end=e.dtend||new Date(start.getTime()+60*60*1000);
    const dur=Math.max(15,Math.round((end-start)/60000));
    const ci=Math.abs(hashStr(e.uid||e.summary||''))%colors.length;
    return {date:fmtDate(start),time:`${String(start.getHours()).padStart(2,'0')}:${String(start.getMinutes()).padStart(2,'0')}`,title:e.summary||'(제목 없음)',duration:dur,type:'outlook',color:colors[ci]};
  });
}
async function fetchICS(url){
  try{
    const r=await fetch(url,{headers:{'Accept':'text/calendar'}});
    if(r.ok){const text=await r.text();if(text.includes('BEGIN:VCALENDAR'))return text}
  }catch(e){}
  const proxyUrl=`${WORKER_URL}/calendar?url=${encodeURIComponent(url)}&secret=${encodeURIComponent(SHARED_SECRET)}`;
  const r=await fetch(proxyUrl);
  if(r.ok)return await r.text();
  throw new Error(`직접 fetch 및 Worker proxy 모두 실패 (HTTP ${r.status})`);
}
async function importICSFromUrl(url){
  showIcsMsg('가져오는 중...','');
  try{
    const text=await fetchICS(url);
    const parsed=parseICS(text);
    if(parsed.length===0){showIcsMsg('VEVENT 0개 — URL은 가져왔으나 일정 없음','err');return}
    const evs=icsToEvents(parsed);
    state.events=state.events.filter(e=>e.type!=='outlook');
    state.events.push(...evs);
    localStorage.setItem(ICS_URL_KEY,url);
    save();showIcsMsg(`✓ ${evs.length}개 일정 가져옴`,'ok');
  }catch(e){showIcsMsg('❌ '+e.message,'err')}
}
function importICSFromFile(file){
  const r=new FileReader();
  r.onload=()=>{
    try{
      const parsed=parseICS(r.result);
      if(parsed.length===0){showIcsMsg('VEVENT 0개','err');return}
      const evs=icsToEvents(parsed);
      state.events=state.events.filter(e=>e.type!=='outlook');
      state.events.push(...evs);
      save();showIcsMsg(`✓ ${evs.length}개 일정 가져옴`,'ok');
    }catch(e){showIcsMsg('파싱 실패: '+e.message,'err')}
  };
  r.readAsText(file);
}
let icsAutoTimer=null;
function startIcsAutoSync(){
  const url=localStorage.getItem(ICS_URL_KEY);
  if(!url){showIcsMsg('먼저 ICS URL을 저장하고 가져오세요','err');return}
  if(icsAutoTimer)clearInterval(icsAutoTimer);
  icsAutoTimer=setInterval(()=>importICSFromUrl(url),5*60*1000);
  showIcsMsg(`✓ 5분마다 자동 동기화 시작`,'ok');
}
function showIcsMsg(msg,kind){const el=document.getElementById('icsMsg');el.style.display='block';el.textContent=msg;el.className='modal-msg'+(kind?' '+kind:'')}
function showSyncMsg(msg,kind){const el=document.getElementById('syncMsg');el.style.display='block';el.textContent=msg;el.className='modal-msg'+(kind?' '+kind:'')}

const modal=document.getElementById('modal');
document.getElementById('btnSettings').addEventListener('click',()=>{

  const u=localStorage.getItem(ICS_URL_KEY);if(u)document.getElementById('icsUrl').value=u;
});
document.getElementById('modalClose').addEventListener('click',()=>modal.classList.remove('on'));
modal.addEventListener('click',e=>{if(e.target===modal)modal.classList.remove('on')});
document.getElementById('btnIcsFetch').addEventListener('click',()=>{
  const url=document.getElementById('icsUrl').value.trim();
  if(!url){showIcsMsg('URL을 입력하세요','err');return}
  importICSFromUrl(url);
});
document.getElementById('btnIcsFile').addEventListener('click',()=>document.getElementById('icsFileInput').click());
document.getElementById('icsFileInput').addEventListener('change',e=>{const f=e.target.files[0];if(f)importICSFromFile(f)});
document.getElementById('btnIcsAuto').addEventListener('click',startIcsAutoSync);

document.getElementById('btnSyncPull').addEventListener('click',async()=>{
  showSyncMsg('Worker GET...','');
  try{
    const r=await fetch(`${WORKER_URL}/?secret=${encodeURIComponent(SHARED_SECRET)}`);
    if(!r.ok)throw new Error(`HTTP ${r.status}`);
    const data=await r.json();
    if(data.tasks)state.tasks=data.tasks;
    if(data.events)state.events=data.events;
    save();showSyncMsg('✓ Gist에서 가져옴','ok');
  }catch(e){showSyncMsg('❌ '+e.message,'err')}
});
document.getElementById('btnSyncPush').addEventListener('click',async()=>{
  showSyncMsg('Worker POST...','');
  try{
    const json=JSON.stringify({tasks:state.tasks,events:state.events});
    const utf8=new TextEncoder().encode(json);
    let bin='';for(let i=0;i<utf8.length;i++)bin+=String.fromCharCode(utf8[i]);
    const r=await fetch(WORKER_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({secret:SHARED_SECRET,device:'pwa-v6',data:btoa(bin)})});
    if(!r.ok)throw new Error(`HTTP ${r.status}`);
    showSyncMsg('✓ Gist로 전송됨','ok');
  }catch(e){showSyncMsg('❌ '+e.message,'err')}
});
document.getElementById('btnReseed').addEventListener('click',()=>{if(confirm('샘플 데이터로 초기화?')){state=structuredClone(SEED);save();flash('초기화됨')}});
document.getElementById('btnNuke').addEventListener('click',()=>{if(confirm('모든 데이터 삭제?')){state={tasks:[],events:[],lastSync:''};save();flash('전체 삭제됨')}});
document.getElementById('btnSync').addEventListener('click',()=>{
  const u=localStorage.getItem(ICS_URL_KEY);
  if(u){importICSFromUrl(u).then(()=>flash('캘린더 동기화'))}
  else{modal.classList.add('on');flash('먼저 ICS URL을 등록하세요')}
});

document.getElementById('actExport').addEventListener('click',()=>{
  const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);const a=document.createElement('a');
  a.href=url;a.download=`sir-todo-${today()}.json`;a.click();
});
document.getElementById('actImport').addEventListener('click',()=>{
  const i=document.createElement('input');i.type='file';i.accept='application/json';
  i.onchange=e=>{
    const f=e.target.files[0];if(!f)return;
    const r=new FileReader();
    r.onload=()=>{try{const p=JSON.parse(r.result);if(p.tasks)state.tasks=p.tasks;if(p.events)state.events=p.events;save();flash('import 완료')}catch(err){alert('파싱 실패: '+err.message)}};
    r.readAsText(f);
  };
  i.click();
});
document.getElementById('actClear').addEventListener('click',()=>{if(confirm('초기화?')){state=structuredClone(SEED);save()}});

function flash(msg){const t=document.createElement('div');t.className='toast';t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),2400)}

function applyHashSync(){
  const m=location.hash.match(/#s=([^&]+)/);if(!m)return;
  try{
    const binStr=atob(m[1]);
    const bytes=Uint8Array.from(binStr,c=>c.charCodeAt(0));
    const decoded=new TextDecoder('utf-8').decode(bytes);
    const incoming=JSON.parse(decoded);
    if(incoming.tasks)state.tasks=incoming.tasks;
    if(incoming.events)state.events=incoming.events;
    save();history.replaceState(null,'',location.pathname);
    flash('Claude → 사이트 동기화 완료');
  }catch(e){console.warn('hash sync failed',e)}
}

applyHashSync();
render();
setInterval(renderTopDate,60000);
