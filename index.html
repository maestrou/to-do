<!DOCTYPE html>
<html lang="ko">
<head>

<style>
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body {
  margin: 0; padding: 0;
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Pretendard', sans-serif;
  background: #f8fafc;
  color: #0f172a;
  font-size: 15px;
  overscroll-behavior-y: contain;
  -webkit-font-smoothing: antialiased;
}
input, button, textarea, select { font-family: inherit; -webkit-appearance: none; appearance: none; }
button { border: none; cursor: pointer; }

.app {
  min-height: 100vh;
  min-height: 100dvh;
  padding: env(safe-area-inset-top) 0 0 0;
}

.header {
  background: #fff;
  padding: 14px 16px 12px;
  border-bottom: 1px solid #e2e8f0;
  position: sticky;
  top: 0;
  top: env(safe-area-inset-top);
  z-index: 10;
}
.header-top {
  display: flex; justify-content: space-between; align-items: flex-end;
  margin-bottom: 12px;
}
.title-block .eyebrow {
  font-size: 10px; font-weight: 600; color: #94a3b8;
  letter-spacing: 0.8px; text-transform: uppercase; margin-bottom: 2px;
}
.title-block h1 {
  margin: 0; font-size: 22px; font-weight: 700;
  color: #0f172a; letter-spacing: -0.6px;
}
.title-block .date {
  margin: 2px 0 0; font-size: 12px; color: #64748b; font-weight: 500;
}
.save-status {
  display: flex; align-items: center; gap: 5px;
  padding: 5px 10px; background: #f0fdf4; border-radius: 8px;
  border: 1px solid #bbf7d0; font-size: 11px; font-weight: 500;
  color: #15803d;
}
.save-status.saving { background: #fffbeb; border-color: #fde68a; color: #b45309; }
.save-status .spin { animation: spin 0.9s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

.stats {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px;
}
.stat {
  display: flex; flex-direction: column; align-items: center;
  padding: 8px 4px; background: #f8fafc;
  border-radius: 10px; border: 1px solid #e2e8f0;
}
.stat.urgent { border-color: #f43f5e; box-shadow: 0 0 0 2px rgba(244, 63, 94, 0.08); }
.stat-label { font-size: 10px; color: #94a3b8; font-weight: 500; }
.stat-value { font-size: 18px; font-weight: 700; letter-spacing: -0.5px; line-height: 1.1; margin-top: 1px; }

.tabs {
  display: flex; gap: 2px; background: #fff;
  padding: 8px 16px 0; border-bottom: 1px solid #e2e8f0;
  position: sticky; top: 0; z-index: 9;
}
.tab {
  padding: 10px 14px; font-size: 13px; font-weight: 600;
  color: #64748b; background: transparent;
  border-bottom: 2px solid transparent;
  display: flex; align-items: center; gap: 6px;
  transition: all 0.15s ease;
}
.tab.active { color: #0f172a; border-bottom-color: #0f172a; }
.tab-cnt {
  font-size: 11px; padding: 1px 6px; border-radius: 8px;
  background: #f1f5f9; color: #94a3b8; min-width: 18px; text-align: center;
}
.tab.active .tab-cnt { background: #0f172a; color: #fff; }

.list { padding: 8px 12px 100px; display: flex; flex-direction: column; gap: 6px; }
.task {
  background: #fff; border-radius: 12px;
  border: 1px solid #e2e8f0; overflow: hidden;
  position: relative; animation: slideIn 0.25s ease;
}
@keyframes slideIn {
  from { opacity: 0; transform: translateY(4px); }
  to { opacity: 1; transform: translateY(0); }
}
.task-bar { position: absolute; left: 0; top: 0; bottom: 0; width: 4px; }
.bar-high { background: #f43f5e; }
.bar-medium { background: #f59e0b; }
.bar-low { background: #10b981; }

.task-row {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 14px 12px 18px;
  -webkit-user-select: none; user-select: none;
}
.check {
  width: 24px; height: 24px; border-radius: 8px;
  border: 2px solid #cbd5e1; background: #fff;
  flex-shrink: 0; display: flex; align-items: center; justify-content: center;
  position: relative; transition: all 0.15s ease;
}
.check.done { border: none; background: #10b981; }
.check::after {
  content: ""; position: absolute; top: -2px; right: -2px;
  width: 8px; height: 8px; border-radius: 50%; border: 2px solid #fff;
}
.check.priority-high::after { background: #f43f5e; }
.check.priority-medium::after { background: #f59e0b; }
.check.priority-low::after { background: #10b981; }
.check.done::after { display: none; }

.task-content { flex: 1; min-width: 0; }
.task-text {
  font-size: 14px; font-weight: 500; color: #0f172a;
  line-height: 1.35; letter-spacing: -0.1px;
  word-break: keep-all; overflow-wrap: anywhere;
}
.task-text.done { color: #94a3b8; text-decoration: line-through; }
.task-meta {
  display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
  font-size: 11px; color: #94a3b8; font-weight: 500; margin-top: 4px;
}
.task-meta .dot { color: #cbd5e1; }
.task-meta .completed-tag { color: #10b981; font-weight: 600; }

.task-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }
.priority-badge {
  font-size: 10px; font-weight: 700; padding: 3px 8px;
  border-radius: 5px; letter-spacing: 0.2px;
}
.priority-badge.high { background: #fff1f2; color: #be123c; }
.priority-badge.medium { background: #fffbeb; color: #b45309; }
.priority-badge.low { background: #ecfdf5; color: #047857; }

.dday-badge {
  font-size: 11px; font-weight: 700; padding: 3px 8px;
  border-radius: 6px; min-width: 44px; text-align: center; letter-spacing: -0.2px;
}
.dday-overdue { background: #fff1f2; color: #be123c; border: 1px solid #fecdd3; }
.dday-urgent { background: #fff7ed; color: #c2410c; border: 1px solid #fed7aa; }
.dday-warn { background: #fefce8; color: #a16207; border: 1px solid #fde68a; }
.dday-safe { background: #f0fdf4; color: #15803d; border: 1px solid #bbf7d0; }
.dday-done { background: #ecfdf5; color: #047857; border: 1px solid #a7f3d0; }
.dday-none { color: #cbd5e1; font-size: 11px; padding: 3px 8px; min-width: 44px; text-align: center; }

.expanded {
  border-top: 1px solid #f1f5f9; background: #fafbfc;
  padding: 14px; display: flex; flex-direction: column; gap: 12px;
}
.field-label {
  font-size: 10px; font-weight: 600; color: #64748b;
  letter-spacing: 0.4px; text-transform: uppercase; margin-bottom: 6px;
}
.text-input, .date-input, .textarea {
  width: 100%; padding: 9px 12px; font-size: 14px;
  border: 1px solid #e2e8f0; border-radius: 8px;
  background: #fff; color: #0f172a; outline: none;
}
.textarea { resize: vertical; min-height: 60px; line-height: 1.4; }

.priority-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
.priority-btn {
  padding: 8px 10px; font-size: 12px; font-weight: 600;
  background: #fff; border: 1.5px solid #e2e8f0;
  border-radius: 8px; color: #94a3b8;
  display: flex; align-items: center; justify-content: center; gap: 5px;
  transition: all 0.15s ease;
}
.priority-btn .pdot { width: 6px; height: 6px; border-radius: 50%; background: #cbd5e1; }
.priority-btn.sel-high { color: #be123c; background: #fff1f2; border-color: #f43f5e; }
.priority-btn.sel-high .pdot { background: #f43f5e; }
.priority-btn.sel-medium { color: #b45309; background: #fffbeb; border-color: #f59e0b; }
.priority-btn.sel-medium .pdot { background: #f59e0b; }
.priority-btn.sel-low { color: #047857; background: #ecfdf5; border-color: #10b981; }
.priority-btn.sel-low .pdot { background: #10b981; }

.delete-btn {
  padding: 8px 14px; font-size: 12px; font-weight: 600;
  color: #be123c; background: #fff1f2; border: 1px solid #fecdd3; border-radius: 8px;
}

.empty { padding: 80px 20px; text-align: center; color: #94a3b8; }
.empty-icon { font-size: 36px; opacity: 0.4; margin-bottom: 8px; }
.empty-text { font-size: 14px; font-weight: 500; }

.fab {
  position: fixed;
  bottom: 24px; bottom: calc(24px + env(safe-area-inset-bottom));
  right: 20px; width: 56px; height: 56px; border-radius: 50%;
  background: #0f172a; color: #fff; font-size: 28px; font-weight: 300;
  box-shadow: 0 8px 24px rgba(15, 23, 42, 0.25);
  display: flex; align-items: center; justify-content: center;
  z-index: 50; transition: transform 0.15s ease;
}
.fab:active { transform: scale(0.92); }

.sheet-overlay {
  position: fixed; inset: 0;
  background: rgba(15, 23, 42, 0.4);
  backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
  z-index: 100; opacity: 0; pointer-events: none;
  transition: opacity 0.25s ease;
}
.sheet-overlay.open { opacity: 1; pointer-events: auto; }

.sheet {
  position: fixed; left: 0; right: 0; bottom: 0;
  background: #fff; border-radius: 20px 20px 0 0;
  padding: 12px 20px calc(20px + env(safe-area-inset-bottom));
  z-index: 101; transform: translateY(100%);
  transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  box-shadow: 0 -10px 40px rgba(15, 23, 42, 0.2);
}
.sheet.open { transform: translateY(0); }
.sheet-handle { width: 40px; height: 5px; border-radius: 3px; background: #cbd5e1; margin: 0 auto 16px; }
.sheet h3 { margin: 0 0 16px; font-size: 18px; font-weight: 700; letter-spacing: -0.5px; }
.sheet .field { margin-bottom: 14px; }
.sheet-actions { display: flex; gap: 8px; margin-top: 8px; }
.sheet-btn { flex: 1; padding: 13px; font-size: 14px; font-weight: 600; border-radius: 10px; }
.sheet-btn.cancel { background: #f1f5f9; color: #64748b; }
.sheet-btn.confirm { background: #0f172a; color: #fff; }
.sheet-btn:disabled { opacity: 0.4; }

.toast {
  position: fixed; bottom: 100px;
  left: 50%; transform: translateX(-50%) translateY(20px);
  padding: 10px 18px; background: #0f172a; color: #fff;
  font-size: 13px; font-weight: 600; border-radius: 10px;
  box-shadow: 0 8px 20px rgba(15, 23, 42, 0.25);
  opacity: 0; pointer-events: none;
  transition: all 0.25s ease; z-index: 200;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.success { background: #10b981; }

@supports(padding: max(0px)) { .fab { bottom: max(24px, env(safe-area-inset-bottom)); } }
</style>
</head>
<body>
<div class="app">
<header class="header">
  <div class="header-top">
    <div class="title-block">
      <div class="eyebrow">Today</div>
      <h1>나의 할 일</h1>
      <p class="date" id="dateText"></p>
    </div>
    <div class="save-status" id="saveStatus">
      <svg width="11" height="11" viewBox="0 0 12 12" fill="none">
        <path d="M2 6L5 9L10 3" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span id="saveText">자동 저장</span>
    </div>
  </div>
  <div class="stats">
    <div class="stat"><div class="stat-label">전체</div><div class="stat-value" id="statAll" style="color:#64748b">0</div></div>
    <div class="stat"><div class="stat-label">진행</div><div class="stat-value" id="statPending" style="color:#0ea5e9">0</div></div>
    <div class="stat" id="statUrgentCard"><div class="stat-label">긴급</div><div class="stat-value" id="statUrgent" style="color:#f43f5e">0</div></div>
    <div class="stat"><div class="stat-label">완료</div><div class="stat-value" id="statDone" style="color:#10b981">0</div></div>
  </div>
</header>
<nav class="tabs">
  <button class="tab active" data-filter="all">전체 <span class="tab-cnt" id="cntAll">0</span></button>
  <button class="tab" data-filter="active">진행 <span class="tab-cnt" id="cntActive">0</span></button>
  <button class="tab" data-filter="done">완료 <span class="tab-cnt" id="cntDone">0</span></button>
</nav>
<main class="list" id="list"></main>
<button class="fab" id="fab" aria-label="할 일 추가">+</button>
<div class="sheet-overlay" id="overlay"></div>
<div class="sheet" id="sheet">
  <div class="sheet-handle"></div>
  <h3 id="sheetTitle">새 할 일</h3>
  <div class="field">
    <div class="field-label">업무 내용</div>
    <input type="text" class="text-input" id="newText" placeholder="할 일을 입력하세요" autocomplete="off" />
  </div>
  <div class="field">
    <div class="field-label">우선순위</div>
    <div class="priority-grid" id="prioGrid">
      <button class="priority-btn" data-prio="high"><span class="pdot"></span>긴급</button>
      <button class="priority-btn sel-medium" data-prio="medium"><span class="pdot"></span>보통</button>
      <button class="priority-btn" data-prio="low"><span class="pdot"></span>여유</button>
    </div>
  </div>
  <div class="field">
    <div class="field-label">완료 예정일 (선택)</div>
    <input type="date" class="date-input" id="newDue" />
  </div>
  <div class="sheet-actions">
    <button class="sheet-btn cancel" id="cancelBtn">취소</button>
    <button class="sheet-btn confirm" id="confirmBtn" disabled>추가</button>
  </div>
</div>
<div class="toast" id="toast"></div>
</div>
<script>
const STORAGE_KEY = "kolon_personal_todos_v2";
const PRIO = { high: "긴급", medium: "보통", low: "여유" };
const PRIO_ORDER = { high: 0, medium: 1, low: 2 };

let state = {
  tasks: [], filter: "all", expandedId: null,
  editingPriority: "medium", saveTimer: null, lastSavedAt: null,
};

const SEED_TASKS = [
  { id: 1, text: "2단계 교육 프로그램/실습과제 내용 확정", priority: "high", done: false, note: "", createdAt: "2026-04-28", dueDate: "", completedAt: "" },
  { id: 2, text: "KMG 과제정의서 3개 작성", priority: "high", done: false, note: "", createdAt: "2026-04-28", dueDate: "", completedAt: "" },
  { id: 3, text: "한화 발표자료 작성", priority: "medium", done: false, note: "", createdAt: "2026-04-28", dueDate: "", completedAt: "" },
  { id: 4, text: "KII 과제별 센터장 보고자료 점검", priority: "high", done: false, note: "", createdAt: "2026-04-29", dueDate: "2026-04-30", completedAt: "" },
  { id: 5, text: "개인별 personal goal 계획 알림", priority: "medium", done: false, note: "", createdAt: "2026-04-29", dueDate: "2026-04-30", completedAt: "" },
  { id: 6, text: "sas 발표자료 시나리오 확인", priority: "high", done: false, note: "", createdAt: "2026-04-29", dueDate: "2026-04-30", completedAt: "" },
  { id: 7, text: "데이터플랫폼 KLS 탈퇴 회의 개최 방안 논의", priority: "medium", done: false, note: "", createdAt: "2026-04-29", dueDate: "2026-04-30", completedAt: "" },
  { id: 8, text: "KMG 계약서 날인", priority: "high", done: false, note: "", createdAt: "2026-04-29", dueDate: "2026-04-30", completedAt: "" },
  { id: 9, text: "KMG 임원급, 팀장, 실무자 오전 교육 프로그램 확정", priority: "high", done: false, note: "", createdAt: "2026-04-29", dueDate: "2026-04-30", completedAt: "" },
  { id: 10, text: "한화솔루션 발표자료 수정", priority: "high", done: false, note: "", createdAt: "2026-04-29", dueDate: "2026-04-30", completedAt: "" },
];

function loadFromStorage() {
  try { const raw = localStorage.getItem(STORAGE_KEY); if (!raw) return null; return JSON.parse(raw); }
  catch (e) { return null; }
}
function saveToStorage(silent = true) {
  try {
    const now = new Date();
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ tasks: state.tasks, savedAt: now.toISOString() }));
    state.lastSavedAt = now;
    updateSaveStatus(false);
    if (!silent) showToast("저장되었습니다", "success");
  } catch (e) { showToast("저장 실패: " + e.message); }
}
function scheduleAutoSave() {
  updateSaveStatus(true);
  if (state.saveTimer) clearTimeout(state.saveTimer);
  state.saveTimer = setTimeout(() => saveToStorage(true), 600);
}

function todayISO() { return new Date().toISOString().split('T')[0]; }
function getDday(dueDate) {
  if (!dueDate) return null;
  const today = new Date(); today.setHours(0, 0, 0, 0);
  const due = new Date(dueDate); due.setHours(0, 0, 0, 0);
  return Math.ceil((due - today) / (1000 * 60 * 60 * 24));
}
function ddayLabel(d) {
  if (d === null) return "";
  if (d === 0) return "D-Day";
  if (d < 0) return `+${Math.abs(d)}`;
  return `D−${d}`;
}
function ddayClass(d) {
  if (d === null) return "dday-none";
  if (d <= 1) return "dday-overdue";
  if (d <= 3) return "dday-urgent";
  if (d <= 7) return "dday-warn";
  return "dday-safe";
}
function formatDate(s) {
  if (!s) return "";
  const d = new Date(s);
  return `${d.getMonth() + 1}.${String(d.getDate()).padStart(2, "0")}`;
}
function formatDateTime(date) {
  if (!date) return "";
  const m = date.getMonth() + 1, d = date.getDate();
  const hh = String(date.getHours()).padStart(2, "0");
  const mm = String(date.getMinutes()).padStart(2, "0");
  return `${m}/${d} ${hh}:${mm}`;
}
function getDateHeader() {
  const d = new Date();
  const w = ["일","월","화","수","목","금","토"][d.getDay()];
  return `${d.getFullYear()}년 ${d.getMonth() + 1}월 ${d.getDate()}일 ${w}요일`;
}

function computeStats() {
  const all = state.tasks.length;
  const done = state.tasks.filter(t => t.done).length;
  const pending = all - done;
  const urgent = state.tasks.filter(t => !t.done && t.dueDate && getDday(t.dueDate) <= 3).length;
  return { all, done, pending, urgent };
}
function sortedTasks() {
  const filtered = state.tasks.filter(t => {
    if (state.filter === "active") return !t.done;
    if (state.filter === "done") return t.done;
    return true;
  });
  return [...filtered].sort((a, b) => {
    if (a.done !== b.done) return a.done ? 1 : -1;
    if (PRIO_ORDER[a.priority] !== PRIO_ORDER[b.priority]) return PRIO_ORDER[a.priority] - PRIO_ORDER[b.priority];
    if (a.dueDate && b.dueDate) return a.dueDate.localeCompare(b.dueDate);
    if (a.dueDate) return -1;
    if (b.dueDate) return 1;
    return b.id - a.id;
  });
}

function render() {
  const stats = computeStats();
  document.getElementById("statAll").textContent = stats.all;
  document.getElementById("statPending").textContent = stats.pending;
  document.getElementById("statUrgent").textContent = stats.urgent;
  document.getElementById("statDone").textContent = stats.done;
  document.getElementById("statUrgentCard").classList.toggle("urgent", stats.urgent > 0);
  document.getElementById("cntAll").textContent = stats.all;
  document.getElementById("cntActive").textContent = stats.pending;
  document.getElementById("cntDone").textContent = stats.done;
  document.querySelectorAll(".tab").forEach(tab => {
    tab.classList.toggle("active", tab.dataset.filter === state.filter);
  });
  const list = document.getElementById("list");
  const tasks = sortedTasks();
  if (tasks.length === 0) {
    list.innerHTML = `<div class="empty"><div class="empty-icon">○</div><div class="empty-text">${state.filter === "done" ? "완료한 할 일이 없습니다" : state.filter === "active" ? "진행 중인 할 일이 없습니다" : "할 일이 없습니다"}</div></div>`;
    return;
  }
  list.innerHTML = tasks.map(t => renderTask(t)).join("");
}
function renderTask(t) {
  const dday = getDday(t.dueDate), ddc = ddayClass(dday), dlbl = ddayLabel(dday);
  const isExpanded = state.expandedId === t.id;
  const metaParts = [];
  metaParts.push(`<span>입력 ${formatDate(t.createdAt) || "오늘"}</span>`);
  if (t.done && t.completedAt) metaParts.push(`<span class="dot">·</span><span class="completed-tag">✓ 완료 ${formatDate(t.completedAt)}</span>`);
  else if (t.dueDate) metaParts.push(`<span class="dot">·</span><span>마감 ${formatDate(t.dueDate)}</span>`);
  if (t.note && !isExpanded) {
    const sn = t.note.length > 25 ? t.note.slice(0, 25) + "…" : t.note;
    metaParts.push(`<span class="dot">·</span><span>${escapeHtml(sn)}</span>`);
  }
  const ddayBadge = t.done
    ? `<div class="dday-badge dday-done">✓ 완료</div>`
    : t.dueDate ? `<div class="dday-badge ${ddc}">${dlbl}</div>` : `<div class="dday-none">—</div>`;
  return `<div class="task" data-id="${t.id}">
    <div class="task-bar bar-${t.priority}"></div>
    <div class="task-row" onclick="onTaskClick(${t.id}, event)">
      <div class="check ${t.done ? "done" : ""} priority-${t.priority}" onclick="onCheckClick(${t.id}, event)">
        ${t.done ? '<svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M2 7L5.5 10.5L12 4" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>' : ''}
      </div>
      <div class="task-content">
        <div class="task-text ${t.done ? "done" : ""}">${escapeHtml(t.text)}</div>
        <div class="task-meta">${metaParts.join("")}</div>
      </div>
      <div class="task-right">
        <div class="priority-badge ${t.priority}">${PRIO[t.priority]}</div>
        ${ddayBadge}
      </div>
    </div>
    ${isExpanded ? renderExpanded(t) : ""}
  </div>`;
}
function renderExpanded(t) {
  return `<div class="expanded" onclick="event.stopPropagation()">
    <div><div class="field-label">업무 내용</div>
      <input type="text" class="text-input" value="${escapeAttr(t.text)}" onchange="updateTask(${t.id}, 'text', this.value)" /></div>
    <div><div class="field-label">우선순위</div>
      <div class="priority-grid">
        ${["high","medium","low"].map(p => `<button class="priority-btn ${t.priority === p ? "sel-" + p : ""}" onclick="updateTask(${t.id}, 'priority', '${p}')"><span class="pdot"></span>${PRIO[p]}</button>`).join("")}
      </div></div>
    <div><div class="field-label">완료 예정일</div>
      <input type="date" class="date-input" value="${t.dueDate || ""}" onchange="updateTask(${t.id}, 'dueDate', this.value)" /></div>
    <div><div class="field-label">메모</div>
      <textarea class="textarea" placeholder="메모를 추가하세요..." onchange="updateTask(${t.id}, 'note', this.value)">${escapeHtml(t.note)}</textarea></div>
    <div style="display:flex;justify-content:space-between;align-items:center;padding-top:6px;border-top:1px solid #f1f5f9">
      <span style="font-size:11px;color:#94a3b8">생성: ${formatDate(t.createdAt) || "오늘"}${t.done && t.completedAt ? ` · 완료: <span style="color:#10b981;font-weight:600">${formatDate(t.completedAt)}</span>` : ""}</span>
      <button class="delete-btn" onclick="deleteTask(${t.id})">삭제</button>
    </div>
  </div>`;
}
function escapeHtml(s) { return String(s || "").replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
function escapeAttr(s) { return escapeHtml(s).replace(/'/g, "&#39;"); }

function onTaskClick(id, ev) { state.expandedId = state.expandedId === id ? null : id; render(); }
function onCheckClick(id, ev) {
  ev.stopPropagation();
  const t = state.tasks.find(x => x.id === id); if (!t) return;
  const nowDone = !t.done;
  t.done = nowDone;
  t.completedAt = nowDone ? todayISO() : "";
  scheduleAutoSave(); render();
}
function updateTask(id, field, value) {
  const t = state.tasks.find(x => x.id === id); if (!t) return;
  t[field] = value; scheduleAutoSave();
  if (field === "priority" || field === "dueDate") render();
}
function deleteTask(id) {
  if (!confirm("이 할 일을 삭제하시겠습니까?")) return;
  state.tasks = state.tasks.filter(t => t.id !== id);
  state.expandedId = null; scheduleAutoSave(); render();
  showToast("삭제되었습니다", "success");
}

function openAddSheet() {
  document.getElementById("newText").value = "";
  document.getElementById("newDue").value = "";
  state.editingPriority = "medium";
  updatePrioGrid(); validateConfirm();
  document.getElementById("overlay").classList.add("open");
  document.getElementById("sheet").classList.add("open");
  setTimeout(() => document.getElementById("newText").focus(), 350);
}
function closeAddSheet() {
  document.getElementById("overlay").classList.remove("open");
  document.getElementById("sheet").classList.remove("open");
}
function updatePrioGrid() {
  document.querySelectorAll("#prioGrid .priority-btn").forEach(btn => {
    btn.className = "priority-btn";
    if (btn.dataset.prio === state.editingPriority) btn.classList.add("sel-" + btn.dataset.prio);
  });
}
function validateConfirm() {
  const text = document.getElementById("newText").value.trim();
  document.getElementById("confirmBtn").disabled = !text;
}
function confirmAdd() {
  const text = document.getElementById("newText").value.trim();
  if (!text) return;
  const dueDate = document.getElementById("newDue").value;
  state.tasks.push({
    id: Date.now(), text, priority: state.editingPriority,
    done: false, note: "", createdAt: todayISO(), dueDate, completedAt: "",
  });
  scheduleAutoSave(); closeAddSheet(); render();
  showToast("추가되었습니다", "success");
}

function updateSaveStatus(saving) {
  const el = document.getElementById("saveStatus");
  const text = document.getElementById("saveText");
  if (saving) {
    el.classList.add("saving");
    el.querySelector("svg").style.display = "none";
    text.textContent = "저장 중...";
  } else {
    el.classList.remove("saving");
    el.querySelector("svg").style.display = "";
    text.textContent = state.lastSavedAt ? `저장됨 ${formatDateTime(state.lastSavedAt)}` : "자동 저장";
  }
}

let toastTimer;
function showToast(message, type = "") {
  const t = document.getElementById("toast");
  t.textContent = message;
  t.className = "toast show " + type;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.className = "toast " + type, 1800);
}

function init() {
  document.getElementById("dateText").textContent = getDateHeader();
  const data = loadFromStorage();
  if (data && Array.isArray(data.tasks)) {
    state.tasks = data.tasks;
    if (data.savedAt) state.lastSavedAt = new Date(data.savedAt);
  } else {
    state.tasks = SEED_TASKS;
    saveToStorage(true);
  }
  updateSaveStatus(false);
  document.querySelectorAll(".tab").forEach(tab => {
    tab.addEventListener("click", () => {
      state.filter = tab.dataset.filter;
      state.expandedId = null;
      render();
    });
  });
  document.getElementById("fab").addEventListener("click", openAddSheet);
  document.getElementById("overlay").addEventListener("click", closeAddSheet);
  document.getElementById("cancelBtn").addEventListener("click", closeAddSheet);
  document.getElementById("confirmBtn").addEventListener("click", confirmAdd);
  document.getElementById("newText").addEventListener("input", validateConfirm);
  document.getElementById("newText").addEventListener("keydown", e => { if (e.key === "Enter") confirmAdd(); });
  document.querySelectorAll("#prioGrid .priority-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      state.editingPriority = btn.dataset.prio;
      updatePrioGrid();
    });
  });
  let touchStartY = 0;
  const sheet = document.getElementById("sheet");
  sheet.addEventListener("touchstart", e => { touchStartY = e.touches[0].clientY; }, { passive: true });
  sheet.addEventListener("touchmove", e => {
    const dy = e.touches[0].clientY - touchStartY;
    if (dy > 100) closeAddSheet();
  }, { passive: true });
  render();
}
document.addEventListener("DOMContentLoaded", init);

if ('serviceWorker' in navigator) {
  const swCode = `
    self.addEventListener('install', e => self.skipWaiting());
    self.addEventListener('activate', e => self.clients.claim());
    self.addEventListener('fetch', e => { e.respondWith(fetch(e.request).catch(() => caches.match(e.request))); });
  `;
  try {
    const blob = new Blob([swCode], { type: 'application/javascript' });
    const url = URL.createObjectURL(blob);
    navigator.serviceWorker.register(url).catch(() => {});
  } catch (e) {}
}
</script>
</body>
</html>
